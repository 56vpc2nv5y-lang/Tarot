<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="tarot-build" content="2026-01-31-02">
    <title>Mystic Tarot | 神秘塔罗</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --card-width: clamp(120px, 20vw, 200px);
            --card-height: calc(var(--card-width) * 1.75);
            --bg-dark: #050510;
            --accent-gold: #d4af37;
            --accent-glow: rgba(212, 175, 55, 0.6);
        }

        @media (max-width: 768px) and (orientation: portrait) {
            :root { --card-width: clamp(92px, 24vw, 150px); }
        }

        @media (max-width: 480px) and (orientation: portrait) {
            :root { --card-width: clamp(86px, 26vw, 140px); }
        }

        @media (orientation: landscape) and (max-height: 520px) {
            :root { --card-width: clamp(96px, 26vh, 140px); }
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Cinzel', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #eee;
            user-select: none;
            touch-action: none; /* 防止移动端原生滚动干扰 */
        }

        /* Background Effects */
        #stars-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; opacity: 0.8;
        }

        #fog-layer {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 40%;
            background: linear-gradient(to top, rgba(10,10,30, 0.9), transparent);
            z-index: 1; pointer-events: none;
        }

        #asset-loader {
            position: fixed; inset: 0; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
            background: rgba(5, 5, 16, 0.92); backdrop-filter: blur(6px); pointer-events: auto;
        }

        #asset-progress-container {
            width: min(320px, 80vw); height: 8px;
            background: rgba(255, 255, 255, 0.15); border-radius: 999px; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 0 12px rgba(255, 255, 255, 0.08);
        }

        #asset-progress-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.7), rgba(240, 230, 140, 0.9));
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.35); transition: width 0.15s linear;
        }

        /* Main Game Container */
        #game-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            perspective: 1200px; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 3D Scene for Cards */
        #scene {
            width: 100%; height: 60vh; position: relative;
            transform-style: preserve-3d; display: flex; justify-content: center; align-items: center;
            cursor: grab;
        }
        #scene:active { cursor: grabbing; }

        /* Card Styles */
        .card-wrapper {
            position: absolute;
            width: var(--card-width); height: var(--card-height);
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.3s;
            cursor: pointer; border-radius: 15px;
        }

        .card-wrapper.selected {
            box-shadow: 0 0 30px var(--accent-glow); z-index: 100;
        }

        .card-inner {
            position: relative; width: 100%; height: 100%;
            text-align: center; transition: transform 0.8s;
            transform-style: preserve-3d; border-radius: 15px;
        }

        .card-wrapper.flipped .card-inner { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); overflow: hidden; border: 2px solid #333;
        }

        .card-back {
            background: repeating-linear-gradient(45deg, #1a1a2e, #1a1a2e 10px, #16213e 10px, #16213e 20px);
            background-image: url('https://www.transparenttextures.com/patterns/black-thread.png');
            display: flex; align-items: center; justify-content: center;
        }
        
        .card-back::after {
            content: '✦'; font-size: 3rem; color: rgba(212, 175, 55, 0.3);
            border: 2px solid rgba(212, 175, 55, 0.3); border-radius: 50%;
            width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;
        }

        .card-front {
            background-color: #fff; transform: rotateY(180deg);
            background-size: cover; background-position: center;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 20px; box-sizing: border-box;
        }

        #header { text-align: center; text-shadow: 0 0 10px var(--accent-gold); margin-top: 20px; }
        h1 { margin: 0; font-weight: 300; letter-spacing: 5px; color: var(--accent-gold); }
        #status-text { text-align: center; font-size: 1.2rem; color: #aaa; margin-top: 10px; text-shadow: 0 0 5px black; }

        #controls {
            pointer-events: auto; display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 30px;
        }

        .btn {
            background: rgba(0,0,0,0.5); border: 1px solid var(--accent-gold); color: var(--accent-gold);
            padding: 10px 30px; font-size: 1rem; cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 2px; border-radius: 30px; pointer-events: auto;
        }

        .btn:hover { background: var(--accent-gold); color: #000; box-shadow: 0 0 20px var(--accent-glow); }

        #webcam-preview {
            position: absolute; bottom: 20px; right: 20px; width: 160px; height: 120px;
            border: 1px solid var(--accent-gold); opacity: 0.5; border-radius: 10px;
            transform: scaleX(-1); z-index: 100;
        }

        /* Modals */
        #interpretation-modal, #question-prompt-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 800px; max-height: 80%;
            background: rgba(10, 10, 20, 0.95); border: 1px solid var(--accent-gold);
            padding: 30px; border-radius: 20px; color: #eee; overflow-y: auto;
            display: none; pointer-events: auto; box-shadow: 0 0 50px rgba(0,0,0,0.8); z-index: 250;
        }

        #question-prompt-modal {
            max-width: 500px; text-align: center;
        }

        #interpretation-content { line-height: 1.6; font-size: 1.1rem; }
        #interpretation-content h3 { color: var(--accent-gold); border-bottom: 1px solid #333; padding-bottom: 10px; }

        /* Guide & Cursor */
        #gesture-guide {
            position: absolute; bottom: 150px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; opacity: 0; transition: opacity 0.5s; pointer-events: none; width: 100%; justify-content: center;
        }
        
        .guide-zone {
            position: absolute; top: 0; bottom: 0; width: 30%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: rgba(212, 175, 55, 0.5); opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        #zone-left { left: 0; justify-content: flex-start; padding-left: 50px; }
        #zone-right { right: 0; justify-content: flex-end; padding-right: 50px; }
        #zone-center { left: 30%; width: 40%; align-items: flex-end; padding-bottom: 180px; }
        .guide-zone.active { opacity: 1; text-shadow: 0 0 20px var(--accent-gold); }
        
        .guide-icon {
            width: 60px; height: 60px; background: rgba(255,255,255,0.1); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 24px; border: 1px solid transparent;
        }
        .guide-icon.active {
            border-color: var(--accent-gold); background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 15px var(--accent-glow); transform: scale(1.2);
        }

        #hand-cursor {
            position: absolute; width: 20px; height: 20px; border: 2px solid var(--accent-gold);
            border-radius: 50%; pointer-events: none; z-index: 1000; transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--accent-glow); display: none;
        }

        .cursor-trail {
            position: absolute; width: 10px; height: 10px; background: var(--accent-glow);
            border-radius: 50%; pointer-events: none; z-index: 999; opacity: 0.8; animation: fadeTrail 0.5s forwards;
        }
        @keyframes fadeTrail { to { opacity: 0; transform: scale(0.2); } }

        .particle {
            position: absolute; width: 4px; height: 4px; background: #ffffff; border-radius: 50%;
            pointer-events: none; z-index: 2001; animation: riseAndFade 0.8s ease-out forwards;
            box-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff;
        }
        @keyframes riseAndFade {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -150px) scale(0.2); opacity: 0; }
        }

        #charge-progress-container {
            width: 200px; height: 6px; background: rgba(255, 255, 255, 0.2);
            border-radius: 3px; margin: 10px auto; overflow: hidden; display: none;
            border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }
        #charge-progress-bar { width: 0%; height: 100%; background: #fff; box-shadow: 0 0 10px #fff; transition: width 0.1s linear; }

        /* Picked Card Zone */
        #picked-zone {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: none; gap: 20px; z-index: 50; pointer-events: none;
        }
        .picked-slot {
            width: calc(var(--card-width) * 0.5); height: calc(var(--card-height) * 0.5);
            border: 2px dashed rgba(212, 175, 55, 0.3); border-radius: 8px;
            display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); transition: all 0.5s;
        }
        @media (max-width: 480px) { #picked-zone { bottom: 20px; gap: 12px; } }
        .picked-slot.filled { border-style: solid; border-color: var(--accent-gold); background: rgba(0,0,0,0.6); }

        .mini-card {
            width: 100%; height: 100%; border-radius: 8px; background-size: cover; background-position: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.5); animation: flyIn 0.5s ease-out;
        }
        @keyframes flyIn {
            from { transform: translateY(-300px) scale(1.5); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1); width: 36px; height: 36px;
            border-radius: 50%; border-left-color: var(--accent-gold); animation: spin 1s linear infinite;
            display: none; margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Settings Icon & Modal */
        #settings-btn {
            position: absolute; top: 20px; right: 20px; width: 40px; height: 40px;
            color: var(--accent-gold); cursor: pointer; z-index: 1000; transition: transform 0.5s;
            pointer-events: auto; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.3); border-radius: 50%; border: 1px solid transparent;
        }
        #settings-btn:hover { transform: rotate(90deg); border-color: var(--accent-gold); background: rgba(212, 175, 55, 0.1); }
        
        #settings-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 3000; backdrop-filter: blur(5px); pointer-events: auto;
        }
        .settings-content {
            background: #111; border: 2px solid var(--accent-gold); width: 90%; max-width: 400px;
            margin: 15vh auto; padding: 30px; border-radius: 10px; text-align: center; color: #eee; box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .settings-content input { width: 80%; padding: 10px; margin: 20px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; font-size: 1rem; }
        .settings-content a { color: var(--accent-gold); text-decoration: underline; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

    </style>
</head>
<body>

    <canvas id="stars-canvas"></canvas>
    <div id="fog-layer"></div>

    <div id="asset-loader">
        <div style="font-size: 1.25rem; color: var(--accent-gold); letter-spacing: 2px;">资源加载中 · v2026-01-31-02</div>
        <div id="asset-progress-text" style="color: #ddd; font-size: 0.95rem;">0%</div>
        <div id="asset-progress-container"><div id="asset-progress-bar"></div></div>
        <button id="asset-retry-btn" class="btn" style="display:none">重试加载</button>
    </div>

    <div id="ui-layer">
        <div id="settings-btn">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
            </svg>
        </div>
        <div id="hand-cursor"></div>
        <div id="header">
            <h1>神秘塔罗</h1>
            <div id="status-text">正在启动...</div>
            <div id="charge-progress-container"><div id="charge-progress-bar"></div></div>
        </div>

        <div id="picked-zone">
            <div class="picked-slot" id="slot-0"></div>
            <div class="picked-slot" id="slot-1"></div>
            <div class="picked-slot" id="slot-2"></div>
        </div>

        <div id="gesture-guide">
            <div id="zone-left" class="guide-zone">向右挥动 / 拖拽 ➡</div>
            <div id="zone-right" class="guide-zone">⬅ 向左挥动 / 拖拽</div>
            <div id="zone-center" class="guide-zone">
                <div class="guide-icon" id="icon-select">✊</div>
                <div style="font-size: 1rem; margin-top: 10px; text-shadow: 0 0 5px black;">握拳 / 点击选牌</div>
            </div>
        </div>

        <div id="controls">
            <button id="start-btn" class="btn" style="display:none">开始体验</button>
            <div class="spinner" id="loading-spinner"></div>
        </div>
    </div>

    <video id="webcam-preview" playsinline></video>

    <div id="game-container">
        <div id="scene">
            </div>
    </div>

    <div id="question-prompt-modal">
        <h3 style="color: var(--accent-gold); margin-top: 0; font-weight: 300; letter-spacing: 2px;">你在寻求什么指引？</h3>
        <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 20px;">在心中默念你的问题，或在此写下它以增强联结</p>
        <textarea id="user-focus-question" placeholder="例如：我近期的职业发展会有怎样的转机？或者面临的感情困惑..." style="width: 100%; height: 80px; background: rgba(0,0,0,0.5); border: 1px solid #555; color: #fff; padding: 10px; border-radius: 8px; resize: none; margin-bottom: 20px; font-family: inherit; box-sizing: border-box;"></textarea>
        <div style="display: flex; gap: 15px; justify-content: center;">
            <button id="confirm-question-btn" class="btn" style="background: var(--accent-gold); color: #000; font-weight: bold;">🔮 开启命运解读</button>
            <button id="skip-question-btn" class="btn" style="background: transparent;">跳过，直接解读</button>
        </div>
    </div>

    <div id="interpretation-modal">
        <h2 style="color: var(--accent-gold); text-align: center; margin-top: 0;">命运启示</h2>
        <div id="interpretation-content"></div>
        <div style="text-align: center; margin-top: 30px;">
            <button class="btn" onclick="document.getElementById('interpretation-modal').style.display='none'; document.getElementById('status-text').innerText='解读已完成';">关闭</button>
        </div>
    </div>

    <div id="settings-modal">
        <div class="settings-content">
            <h2 style="color: var(--accent-gold);">API Key 配置</h2>
            <p>请输入您的 DeepSeek API Key 以开启 AI 解读功能。</p>
            <input type="password" id="api-token-input" placeholder="sk-...">
            <button id="save-settings-btn" class="btn">保存配置</button>
            <button id="close-settings-btn" class="btn" style="background: transparent; border: 1px solid #444; margin-top: 10px;">关闭</button>
        </div>
    </div>

    <script>
        // --- 1. Card Data & Configuration ---
        const ASSETS_PATH = 'assets/tarot/pkt/';
        const generateCards = () => {
            const cards = [];
            const majorNames = ["The Fool", "The Magician", "The High Priestess", "The Empress", "The Emperor", "The Hierophant", "The Lovers", "The Chariot", "Strength", "The Hermit", "Wheel of Fortune", "Justice", "The Hanged Man", "Death", "Temperance", "The Devil", "The Tower", "The Star", "The Moon", "The Sun", "Judgement", "The World"];
            majorNames.forEach((name, i) => cards.push({ id: `ar${String(i).padStart(2, '0')}`, name, type: 'major', img: `${ASSETS_PATH}ar${String(i).padStart(2, '0')}.jpg` }));
            const suits = [{ code: 'wa', name: 'Wands' }, { code: 'cu', name: 'Cups' }, { code: 'sw', name: 'Swords' }, { code: 'pe', name: 'Pentacles' }];
            const ranks = [{ code: 'ac', name: 'Ace' }, { code: '02', name: 'Two' }, { code: '03', name: 'Three' }, { code: '04', name: 'Four' }, { code: '05', name: 'Five' }, { code: '06', name: 'Six' }, { code: '07', name: 'Seven' }, { code: '08', name: 'Eight' }, { code: '09', name: 'Nine' }, { code: '10', name: 'Ten' }, { code: 'pa', name: 'Page' }, { code: 'kn', name: 'Knight' }, { code: 'qu', name: 'Queen' }, { code: 'ki', name: 'King' }];
            suits.forEach(suit => ranks.forEach(rank => cards.push({ id: `${suit.code}${rank.code}`, name: `${rank.name} of ${suit.name}`, type: 'minor', img: `${ASSETS_PATH}${suit.code}${rank.code}.jpg` })));
            return cards;
        };

        const FULL_DECK = generateCards();
        let currentDeck = [];
        let pickedCards = [];
        let cardElements = []; // DOM 缓存优化
        let assetsReady = false, assetsFailed = false, cameraReady = false, cameraError = false;

        function setAssetProgress(progress, label) {
            const text = document.getElementById('asset-progress-text');
            const bar = document.getElementById('asset-progress-bar');
            if (text) text.innerText = label ? `${label} ${Math.round(progress)}%` : `${Math.round(progress)}%`;
            if (bar) bar.style.width = `${Math.max(0, Math.min(100, progress))}%`;
        }

        function updateIdleStatus() {
            if (currentState !== STATE.IDLE || cameraError) return;
            const status = document.getElementById('status-text');
            if (assetsFailed) { status.innerText = "资源加载失败，点击重试"; return; }
            if (!assetsReady) { status.innerText = "资源加载中..."; return; }
            status.innerText = cameraReady ? "张开你的五指开始，或直接点击体验" : "系统就绪，点击开始体验";
            document.getElementById('start-btn').style.display = 'inline-block';
        }

        function preloadDeckAssets() {
            // 保持原样，如果无图环境快速跳过
            const loader = document.getElementById('asset-loader');
            if(loader) loader.style.display = 'none';
            assetsReady = true; updateIdleStatus();
        }

        // --- 2. Game State & Logic ---
        const STATE = { IDLE: 'IDLE', INTRO: 'INTRO', PICKING: 'PICKING', REVEALING: 'REVEALING', INTERPRETING: 'INTERPRETING' };
        let currentState = STATE.IDLE;
        let currentIndex = 0, velocity = 0;

        // --- 3. 3D Scene & Rendering ---
        const scene = document.getElementById('scene');
        
        function initStars() {
            const canvas = document.getElementById('stars-canvas');
            const ctx = canvas.getContext('2d');
            let width, height, stars = [];
            function resize() {
                width = window.innerWidth; height = window.innerHeight;
                canvas.width = width; canvas.height = height;
                stars = Array.from({length: 200}, () => ({ x: Math.random() * width, y: Math.random() * height, size: Math.random() * 2, opacity: Math.random(), speed: Math.random() * 0.5 }));
            }
            function animate() {
                ctx.clearRect(0, 0, width, height); ctx.fillStyle = 'white';
                stars.forEach(star => {
                    ctx.globalAlpha = star.opacity; ctx.beginPath(); ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2); ctx.fill();
                    star.y -= star.speed; if(star.y < 0) star.y = height;
                    if(Math.random() > 0.95) star.opacity = Math.random();
                });
                requestAnimationFrame(animate);
            }
            window.addEventListener('resize', resize); resize(); animate();
        }

        function createCardElement(card, index) {
            const wrapper = document.createElement('div');
            wrapper.className = 'card-wrapper'; wrapper.dataset.index = index;
            const inner = document.createElement('div'); inner.className = 'card-inner';
            const back = document.createElement('div'); back.className = 'card-face card-back';
            const front = document.createElement('div'); front.className = 'card-face card-front';
            front.style.backgroundImage = `url('${card.img}')`;
            inner.appendChild(back); inner.appendChild(front); wrapper.appendChild(inner);
            return wrapper;
        }

        function renderDeck() {
            scene.innerHTML = '';
            cardElements = []; // 清空缓存
            if (currentState === STATE.PICKING || currentState === STATE.INTRO) {
                currentDeck.forEach((card, i) => {
                    const el = createCardElement(card, i);
                    // 添加点击事件用于触控/鼠标降级操作
                    el.addEventListener('pointerup', (e) => handleCardClick(i, e));
                    scene.appendChild(el);
                    cardElements.push(el); // 存入缓存
                });
                updateCardPositions();
            } else if (currentState === STATE.REVEALING || currentState === STATE.INTERPRETING) {
                pickedCards.forEach((item, i) => {
                    const el = createCardElement(item.card, i);
                    scene.appendChild(el);
                    cardElements.push(el);
                });
                updatePickedPositions();
            }
        }

        function updateCardPositions() {
            if (currentState !== STATE.PICKING && currentState !== STATE.INTRO) return;
            const width = window.innerWidth;
            const cardWidthPx = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--card-width').trim()) || 200;
            const isMobile = width <= 480;
            const gap = Math.min(Math.max(cardWidthPx * (isMobile ? 0.85 : 1.15), width * (isMobile ? 0.12 : 0.18)), cardWidthPx * (isMobile ? 1.25 : 2));
            const visibleSideCount = Math.ceil((width / 2) / (gap * 0.5)) + 3;

            // 性能优化：使用缓存的 cardElements 代替 querySelectorAll
            cardElements.forEach((card, i) => {
                if (card.classList.contains('picked')) return;
                const dist = i - currentIndex;
                if (Math.abs(dist) > visibleSideCount) { card.style.display = 'none'; return; } 
                else { card.style.display = 'block'; }

                const x = dist * gap;
                const z = -Math.pow(Math.abs(dist), 1.3) * 50; 
                let rotateY = Math.max(-45, Math.min(45, dist * 5)); 
                let scale = 1;
                const isSelected = Math.round(currentIndex) === i;
                
                if (Math.abs(dist) < 0.5) {
                    scale = (isMobile ? 1.06 : 1.2) - Math.abs(dist) * (isMobile ? 0.22 : 0.4);
                    card.style.zIndex = 1000;
                } else {
                    scale = 1 - Math.min(Math.abs(dist) * 0.08, 0.4);
                    card.style.zIndex = 1000 - Math.floor(Math.abs(dist) * 10);
                }
                
                if (isSelected) card.classList.add('selected'); else card.classList.remove('selected');
                if (isFistHeld && chargeTargetIndex !== null && i === chargeTargetIndex) {
                    scale *= chargeExtraScale; card.style.zIndex = 2000;
                }
                card.style.transform = `translateX(${x}px) translateZ(${z}px) rotateY(${rotateY}deg) scale(${scale})`;
            });
        }

        function updatePickedPositions() {
            const width = window.innerWidth;
            const spread = width <= 480 ? Math.min(width * 0.18, 180) : Math.min(width * 0.3, 400);
            const positions = [-spread, 0, spread];
            const labels = ["过去", "现在", "未来"];
            
            cardElements.forEach((card, i) => {
                const x = positions[i];
                if (i < pickedCards.length) {
                    const picked = pickedCards[i];
                    setTimeout(() => {
                        card.classList.add('flipped');
                        if (picked.reversed) {
                            const front = card.querySelector('.card-front');
                            if (front) front.style.transform = 'rotateX(180deg)';
                        }
                    }, i * 500 + 500);
                }
                card.style.transform = `translateX(${x}px) scale(1.1)`; card.style.zIndex = 10;
                if (!card.querySelector('.label')) {
                    const label = document.createElement('div');
                    label.className = 'label'; label.innerText = labels[i];
                    label.style.position = 'absolute'; label.style.bottom = '-40px';
                    label.style.width = '100%'; label.style.textAlign = 'center';
                    label.style.color = '#d4af37'; label.style.textShadow = '0 0 5px black';
                    label.style.fontSize = '1.2rem'; card.appendChild(label);
                }
            });
        }

        // --- 4. Controls & Fallbacks ---
        // 手势相关变量
        let lastHandX = -1, lastHandY = -1;
        let fistHoldStart = 0, isFistHeld = false, lockedSelectIndex = null, chargeTargetIndex = null, chargeExtraScale = 1;
        const SELECTION_HOLD_TIME = 1000, INTERPRET_HOLD_TIME = 1500;
        let isPalmHeld = false, palmHoldStart = 0;

        // 触控/鼠标相关变量 (降级方案)
        let isDraggingDeck = false;
        let hasDragged = false; 
        let lastPointerX = 0;

        const FRICTION = 0.92;
        
        // --- 触控/鼠标事件监听 ---
        const gameContainer = document.getElementById('game-container');
        
        gameContainer.addEventListener('pointerdown', (e) => {
            if (currentState !== STATE.PICKING) return;
            isDraggingDeck = true;
            hasDragged = false; // 重置拖拽标志
            lastPointerX = e.clientX;
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDraggingDeck || currentState !== STATE.PICKING) return;
            const deltaX = e.clientX - lastPointerX;
            if (Math.abs(deltaX) > 3) hasDragged = true; // 区分点击和拖拽
            
            // 阻力/灵敏度映射
            velocity -= deltaX * 0.003; 
            lastPointerX = e.clientX;
            
            if (deltaX < 0) highlightDirection('right');
            else if (deltaX > 0) highlightDirection('left');
            setTimeout(resetHighlights, 200);
        });

        window.addEventListener('pointerup', () => {
            isDraggingDeck = false;
        });

        // 牌的点击逻辑
        function handleCardClick(index, event) {
            if (currentState !== STATE.PICKING || hasDragged) return; 
            const currentCenter = Math.round(currentIndex);
            if (index === currentCenter) {
                // 点击了正中间的牌，直接选择
                lockedSelectIndex = index;
                selectCard();
                highlightDirection('select');
                setTimeout(resetHighlights, 500);
            } else {
                // 点击了边缘的牌，滚动过去
                currentIndex = index;
                velocity = 0;
            }
        }

        // --- 视觉特效 ---
        function spawnChargeParticles(rect) {
            const x = rect.left + rect.width / 2; const y = rect.top + rect.height / 2;
            for(let i=0; i<2; i++) {
                const p = document.createElement('div'); p.className = 'particle';
                const ox = (Math.random() - 0.5) * rect.width * 0.9; const oy = (Math.random() - 0.5) * rect.height * 0.9;
                p.style.left = (x + ox) + 'px'; p.style.top = (y + oy) + 'px';
                const size = 2 + Math.random() * 6; p.style.width = size + 'px'; p.style.height = size + 'px';
                if(Math.random() > 0.6) { p.style.background = 'var(--accent-gold)'; p.style.boxShadow = '0 0 8px var(--accent-gold)'; }
                document.body.appendChild(p); setTimeout(() => p.remove(), 800);
            }
        }

        // --- 手势识别逻辑保持 ---
        function isFist(lm) { const w=lm[0]; return [8,12,16,20].reduce((s,i)=>s+Math.hypot(lm[i].x-w.x,lm[i].y-w.y),0)/4 < 0.23; }
        function isOpenPalm(lm) { const w=lm[0]; return [8,12,16,20].reduce((s,i)=>s+Math.hypot(lm[i].x-w.x,lm[i].y-w.y),0)/4 > 0.4; }

        function handleGesture(handLandmarks) {
            if (![STATE.PICKING, STATE.INTERPRETING, STATE.IDLE].includes(currentState)) return;
            const x = handLandmarks[9].x, y = handLandmarks[9].y;
            if (lastHandX === -1) { lastHandX = x; lastHandY = y; return; }

            const screenX = (1 - x) * window.innerWidth, screenY = y * window.innerHeight;
            const cursor = document.getElementById('hand-cursor');
            cursor.style.display = 'block'; cursor.style.left = screenX + 'px'; cursor.style.top = screenY + 'px';

            if (currentState === STATE.IDLE || currentState === STATE.INTERPRETING) {
                // 张开五指开始/解读的逻辑不变
                if (isOpenPalm(handLandmarks)) {
                    if (!isPalmHeld) { isPalmHeld = true; palmHoldStart = Date.now(); document.getElementById('charge-progress-container').style.display = 'block'; }
                    const p = Math.min((Date.now() - palmHoldStart) / INTERPRET_HOLD_TIME, 1.0);
                    document.getElementById('charge-progress-bar').style.width = (p * 100) + '%';
                    if (p >= 1.0) {
                        isPalmHeld = false; document.getElementById('charge-progress-container').style.display = 'none';
                        if (currentState === STATE.IDLE) startGame();
                        else {
                            // 手势触发时，如果有输入框，自动点击确认（这里为了简便，如果处于INTERPRETING直接走解答流程）
                            if(document.getElementById('question-prompt-modal').style.display === 'block') {
                                document.getElementById('confirm-question-btn').click();
                            }
                        }
                    }
                } else {
                    if (isPalmHeld) { isPalmHeld = false; document.getElementById('charge-progress-container').style.display = 'none'; document.getElementById('charge-progress-bar').style.width = '0%'; }
                }
                return;
            }

            const width = window.innerWidth;
            if (screenX < width * 0.33) { velocity = -Math.min(((width * 0.33) - screenX)/(width * 0.33), 1.0) * 0.2; highlightDirection('left'); }
            else if (screenX > width * 0.66) { velocity = Math.min((screenX - (width * 0.66))/(width * 0.34), 1.0) * 0.2; highlightDirection('right'); }
            else { if (!isFistHeld) resetHighlights(); }

            if (isFist(handLandmarks) && screenX > width * 0.33 && screenX < width * 0.66) {
                if (!isFistHeld) { isFistHeld = true; fistHoldStart = Date.now(); lockedSelectIndex = Math.round(currentIndex); chargeTargetIndex = lockedSelectIndex; highlightDirection('select'); }
                const p = Math.min((Date.now() - fistHoldStart) / SELECTION_HOLD_TIME, 1.0);
                chargeExtraScale = 1 + p * 0.15;
                
                cardElements.forEach(card => {
                    if (parseInt(card.dataset.index) === chargeTargetIndex) {
                        card.style.boxShadow = `0 0 ${30+p*100}px rgba(255, 255, 255, ${0.8+p*0.2})`;
                        card.style.filter = `brightness(${1+p*1.5})`; card.style.zIndex = 2000;
                        spawnChargeParticles(card.getBoundingClientRect());
                    }
                });
                if (p >= 1.0) { selectCard(); isFistHeld = false; lockedSelectIndex = null; chargeTargetIndex = null; }
            } else if (isFistHeld) {
                isFistHeld = false; lockedSelectIndex = null; chargeTargetIndex = null; chargeExtraScale = 1; resetHighlights();
                cardElements.forEach(card => { card.style.filter = ''; card.style.boxShadow = ''; });
            }
        }

        function highlightDirection(dir) {
            resetHighlights();
            if (dir === 'left') document.getElementById('zone-left').classList.add('active');
            if (dir === 'right') document.getElementById('zone-right').classList.add('active');
            if (dir === 'select') { document.getElementById('zone-center').classList.add('active'); document.getElementById('icon-select').classList.add('active'); }
        }
        function resetHighlights() {
            ['zone-left', 'zone-right', 'zone-center', 'icon-select'].forEach(id => document.getElementById(id).classList.remove('active'));
        }

        let targetIndex = 0;
        function gameLoop() {
            if (currentState === STATE.INTRO) {
                currentIndex += (targetIndex - currentIndex) * 0.05;
                if (Math.abs(targetIndex - currentIndex) < 0.1) {
                    currentIndex = targetIndex; currentState = STATE.PICKING;
                    document.getElementById('status-text').innerText = "握拳或点击选中你的命运之牌";
                    document.getElementById('picked-zone').style.display = 'flex';
                    document.getElementById('gesture-guide').style.opacity = '1';
                }
                updateCardPositions();
            }
            if (currentState === STATE.PICKING && !isDraggingDeck) { // 如果在拖拽，暂停自动衰减以防止冲突
                if (isFistHeld && lockedSelectIndex !== null) {
                    currentIndex = lockedSelectIndex; velocity = 0;
                } else {
                    currentIndex += velocity; velocity *= FRICTION;
                    if (Math.abs(velocity) < 0.0001) velocity = 0;
                    if (currentIndex < 0) { currentIndex = 0; velocity *= -0.5; }
                    if (currentIndex > currentDeck.length - 1) { currentIndex = currentDeck.length - 1; velocity *= -0.5; }
                }
                updateCardPositions();
            }
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);

        function selectCard() {
            if (currentState !== STATE.PICKING) return;
            const selectedIdxInt = lockedSelectIndex !== null ? lockedSelectIndex : Math.round(currentIndex);
            if (selectedIdxInt < 0 || selectedIdxInt >= currentDeck.length) return;
            const selectedCard = currentDeck[selectedIdxInt];
            if (pickedCards.some(p => p.card.id === selectedCard.id)) return;
            
            cardElements.forEach(el => {
                if (parseInt(el.dataset.index) === selectedIdxInt) { el.classList.add('picked'); el.style.opacity = '0'; }
            });

            pickedCards.push({ card: selectedCard, reversed: Math.random() < 0.3, position: ['过去', '现在', '未来'][pickedCards.length] });
            document.getElementById('status-text').innerText = `已选卡牌 ${pickedCards.length}/3`;

            const slot = document.getElementById(`slot-${pickedCards.length - 1}`);
            if (slot) {
                slot.classList.add('filled');
                slot.innerHTML = `<div class="mini-card" style="background-image:url('https://www.transparenttextures.com/patterns/black-scales.png');"><div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2rem;color:rgba(212,175,55,0.5);">✦</div></div>`;
            }
            if (pickedCards.length === 3) setTimeout(finishPicking, 1000);
        }

        // --- 5. 修改后的结束环节：增加专注问题输入 ---
        function finishPicking() {
            currentState = STATE.REVEALING;
            document.getElementById('status-text').innerText = "命运已揭示";
            document.getElementById('gesture-guide').style.opacity = '0';
            document.getElementById('picked-zone').style.opacity = '0';
            
            renderDeck(); 
            
            setTimeout(() => {
                currentState = STATE.INTERPRETING;
                document.getElementById('status-text').innerText = "请写下你心中的疑问，以增强连接";
                document.getElementById('question-prompt-modal').style.display = 'block';
            }, 2500);
        }

        // --- 6. 提问确认逻辑与 AI 解读 ---
        function triggerAI() {
            const token = localStorage.getItem('deepseek_token');
            if (token) {
                document.getElementById('question-prompt-modal').style.display = 'none';
                getAIInterpretation(token);
            } else {
                alert('系统需要开启灵性连接 (请在右上角配置 DeepSeek API Key)');
                document.getElementById('settings-modal').style.display = 'block';
            }
        }

        document.getElementById('confirm-question-btn').addEventListener('click', triggerAI);
        document.getElementById('skip-question-btn').addEventListener('click', () => {
            document.getElementById('user-focus-question').value = ''; // 清空问题
            triggerAI();
        });

        async function getAIInterpretation(token) {
            document.getElementById('loading-spinner').style.display = 'block';
            document.getElementById('status-text').innerText = "神谕连接中...";
            
            const rawQuestion = document.getElementById('user-focus-question').value.trim();
            const userQuestionText = rawQuestion ? rawQuestion : "求问者没有提出具体问题，请对这三张牌的因果、当下的状态和未来的趋势做综合且深度的灵性解读。";
            
            const prompt = `你是一位精通神秘学、荣格心理学与象征符号的资深塔罗占卜师。
求问者当前最关心的问题/境遇是：【${userQuestionText}】

我抽取了三张牌（时间之流牌阵）：
1. 过去: ${pickedCards[0].card.name} (${pickedCards[0].reversed ? '逆位' : '正位'})
2. 现在: ${pickedCards[1].card.name} (${pickedCards[1].reversed ? '逆位' : '正位'})
3. 未来: ${pickedCards[2].card.name} (${pickedCards[2].reversed ? '逆位' : '正位'})

请结合求问者的【核心问题】，用中文为我深度解读。语言风格应当神秘、优雅、充满同理心。
请按以下 Markdown 格式输出：
### 🔮 整体启示
（结合问题总结核心主题，100字左右）
---
### 🃏 牌面深度解析
#### 1. 过去之因：${pickedCards[0].card.name} ${pickedCards[0].reversed ? '(逆)' : '(正)'}
* **牌面意象**：
* **针对问题的核心含义**：
#### 2. 当下之境：${pickedCards[1].card.name} ${pickedCards[1].reversed ? '(逆)' : '(正)'}
* **牌面意象**：
* **针对问题的核心含义**：
#### 3. 未来之果：${pickedCards[2].card.name} ${pickedCards[2].reversed ? '(逆)' : '(正)'}
* **牌面意象**：
* **针对问题的核心含义**：
---
### 💡 命运指引
（给出具体且富有启发性的建议行动指南）
> （附上一句简短有力的箴言）`;

            const modal = document.getElementById('interpretation-modal');
            const content = document.getElementById('interpretation-content');
            content.innerHTML = ''; modal.style.display = 'block';

            try {
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({
                        model: "deepseek-chat", 
                        messages: [
                            {"role": "system", "content": "你是一位精通神秘学、心理学与象征符号的资深塔罗占卜师。语言风格神秘、优雅、富有哲理且充满同理心。"},
                            {"role": "user", "content": prompt}
                        ],
                        stream: true,
                        temperature: 0.75, // 微调参数：增加创造力和神性随机性
                        presence_penalty: 0.2
                    })
                });
                if (!response.ok) throw new Error("连接失败: " + response.statusText);
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let fullText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const lines = decoder.decode(value, { stream: true }).split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const jsonStr = line.slice(6);
                            if (jsonStr === '[DONE]') break;
                            try {
                                const json = JSON.parse(jsonStr);
                                if (json.choices && json.choices[0].delta.content) {
                                    fullText += json.choices[0].delta.content;
                                    content.innerHTML = window.marked ? window.marked.parse(fullText) : fullText;
                                }
                            } catch (e) {}
                        }
                    }
                }
                document.getElementById('status-text').innerText = "命运已揭晓";
            } catch (e) {
                console.error(e);
                content.innerHTML += `<p style="color:red">连接中断: ${e.message}</p>`;
            } finally {
                document.getElementById('loading-spinner').style.display = 'none';
            }
        }

        // --- 7. 初始化 ---
        const settingsBtn = document.getElementById('settings-btn');
        const settingsModal = document.getElementById('settings-modal');
        const tokenInput = document.getElementById('api-token-input');

        function updateTokenStatus() { tokenInput.value = localStorage.getItem('deepseek_token') || ""; }
        updateTokenStatus();

        settingsBtn.addEventListener('click', () => { updateTokenStatus(); settingsModal.style.display = 'block'; });
        document.getElementById('close-settings-btn').addEventListener('click', () => settingsModal.style.display = 'none');
        document.getElementById('save-settings-btn').addEventListener('click', () => {
            localStorage.setItem('deepseek_token', tokenInput.value.trim());
            settingsModal.style.display = 'none'; alert("配置已保存到本地");
        });

        function startGame() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('status-text').innerText = "命运之轮开始转动...";
            currentDeck = [...FULL_DECK].sort(() => Math.random() - 0.5); 
            pickedCards = [];
            currentState = STATE.INTRO;
            targetIndex = Math.floor(currentDeck.length / 2); currentIndex = currentDeck.length + 5; 
            renderDeck(); 
        }

        document.getElementById('start-btn').addEventListener('click', startGame);

        async function initCameraFlow() {
             try {
                const videoElement = document.getElementById('webcam-preview');
                const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
                hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
                hands.onResults((r) => { if(r.multiHandLandmarks?.length > 0) handleGesture(r.multiHandLandmarks[0]); });
                
                const camera = new Camera(videoElement, { onFrame: async () => await hands.send({image: videoElement}), width: 320, height: 240 });
                await camera.start();
                cameraReady = true; cameraError = false; updateIdleStatus();
             } catch (e) {
                console.error("Camera init failed, using fallback UI", e);
                cameraReady = false; cameraError = true; updateIdleStatus();
             }
        }
        
        preloadDeckAssets();
        initCameraFlow();
        initStars();
    </script>
</body>
</html>
