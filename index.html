<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手势交互塔罗牌 - 参考版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        /* CSS 样式升级 - 替换旧样式，添加参考样式的牌背和布局 */
        body {
            margin: 0; overflow: hidden; background-color: #0c0d21;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #d8dee9; user-select: none;
        }
        #video-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; opacity: 0.12; transform: scaleX(-1); /* 镜像翻转 */
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #ui-layer {
            position: absolute; top: 20px; left: 0; width: 100%; text-align: center; z-index: 10;
            pointer-events: none;
        }
        #status-text { font-size: 20px; font-weight: bold; color: #f9ed69; text-shadow: 0 0 10px rgba(249,237,105,0.8); transition: opacity 0.5s;}

        #deck-container {
            position: absolute; top: 25%; left: 0; width: 100%; height: 250px;
            display: flex; align-items: center; justify-content: flex-start; /* 改为水平排列 */
            overflow: visible; /* 允许卡牌滚出视口 */
        }

        /* --- 3D 卡牌样式 --- */
        .card {
            width: 120px; height: 200px; position: absolute;
            perspective: 1200px; /* 赋予 3D 空间感 */
            transition: transform 0.2s, box-shadow 0.3s;
            margin-right: 10px; /* 卡牌间距 */
            will-change: transform; /* 性能优化 */
        }
        .card.grabbed { transition: none; z-index: 100; box-shadow: 0 0 40px #f9ed69;}
        .card.placed { transition: all 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94); z-index: 5;}

        .card-inner {
            position: relative; width: 100%; height: 100%; text-align: center;
            transition: transform 0.8s; transform-style: preserve-3d; /* 保持 3D 子元素 */
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }
        
        /* 翻转触发类 */
        .card.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; /* 隐藏背面 */
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            flex-direction: column; padding: 12px; box-sizing: border-box;
            border: 2px solid #533483;
        }
        
        /* 牌背 - 复杂的 SVG 图案，替换旧的准星 */
        .card-back {
            background: linear-gradient(135deg, #1a1b3a, #0c0d21);
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 100 166"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="%23d4af37"/><stop offset="1" stop-color="%23533483"/></linearGradient></defs><rect x="0" y="0" width="100" height="166" fill="%231a1b3a" stroke="%23533483" stroke-width="2"/><circle cx="50" cy="83" r="30" fill="none" stroke="%23d4af37" stroke-width="1.5" stroke-dasharray="2 4"/><path d="M50 33 L50 133 M0 83 L100 83" fill="none" stroke="%23d4af37" stroke-width="1"/><path d="M50 83 L80 113 L50 143 L20 113 Z" fill="%231a1b3a" stroke="%23533483" stroke-width="1.5"/><circle cx="50" cy="83" r="15" fill="%230c0d21"/><circle cx="50" cy="83" r="10" fill="none" stroke="%23f9ed69" stroke-width="2"/><path d="M47 80 L50 77 L53 80 L50 83 L47 86 L50 89 L53 86 Z" fill="%23f9ed69"/><circle cx="30" cy="53" r="5" fill="%23f9ed69"/><circle cx="70" cy="113" r="5" fill="%23f9ed69"/></svg>');
            background-size: cover;
        }
        
        /* 牌面占位符 */
        .card-front {
            background: #fdf5e6; color: #1a1a2e; border: 2px solid #d4af37;
            transform: rotateY(180deg); /* 初始翻转 180 度 */
        }
        .card-front h3 { font-size: 16px; margin: 0 0 10px 0; color: #8b0000; }
        .card-front img { width: 80%; border-radius: 6px; margin-bottom: 5px; }

        /* --- 槽位与解牌区域 --- */
        #slots-container {
            position: absolute; bottom: 180px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 40px;
        }
        .slot {
            width: 120px; height: 200px; border: 2px dashed #533483; border-radius: 12px;
        }

        #reading-area {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 650px; min-height: 140px;
            background: rgba(12, 13, 33, 0.88); border: 1px solid #d4af37; border-radius: 12px;
            padding: 22px; box-sizing: border-box; display: none;
            font-size: 17px; line-height: 1.7; text-shadow: 1px 1px 3px black;
        }
        .reading-title { color: #f9ed69; font-weight: bold; margin-bottom: 12px; font-size: 19px; text-transform: uppercase;}

        #hand-cursor {
            position: fixed; width: 34px; height: 34px; border-radius: 50%;
            background-color: rgba(249, 237, 105, 0.8); box-shadow: 0 0 18px rgba(249, 237, 105, 1);
            pointer-events: none; z-index: 999; top: -50px; left: -50px;
            transform: translate(-50%, -50%); transition: background-color 0.2s, transform 0.2s;
        }
        #hand-cursor.fist { background-color: #f9ed69; transform: translate(-50%, -50%) scale(0.65); box-shadow: 0 0 30px rgba(249, 237, 105, 1);}
        #hand-cursor.index { background-color: #d4af37; transform: translate(-50%, -50%) scale(0.85); border-radius: 6px; box-shadow: 0 0 20px rgba(212, 175, 55, 1);}

    </style>
</head>
<body>

    <div id="video-container"><video id="webcam" autoplay playsinline></video></div>

    <div id="ui-layer">
        <h1 style="margin-top: 10px; font-size: 26px; color: #f9ed69;">手势塔罗牌占卜</h1>
        <div id="status-text">正在加载 AI 模型...</div>
    </div>

    <div id="deck-container"></div>

    <div id="slots-container">
        <div class="slot" id="slot-1"></div>
        <div class="slot" id="slot-2"></div>
        <div class="slot" id="slot-3"></div>
    </div>

    <div id="reading-area">
        <div class="reading-title" id="reading-title">正在解读命运之签...</div>
        <div id="reading-text"></div>
    </div>

    <div id="hand-cursor"></div>

    <script>
        // --- 模拟塔罗牌数据库 (22张大阿卡纳) ---
        const tarotDatabase = [
            { id: 0, name: "愚者 (The Fool)", meaning: "代表无限的可能性、自发性和全新的旅程。现在是放下包袱，凭直觉大胆向前迈出一步的时候了。" },
            { id: 1, name: "魔术师 (The Magician)", meaning: "代表创造力、意志力和天赋。你已经拥有了实现目标所需的一切资源，请将你的想法化为现实。" },
            { id: 2, name: "女祭司 (The High Priestess)", meaning: "代表潜意识、直觉和神秘。答案不在外界，请向内寻求，倾听你内心深处的声音。" },
            { id: 3, name: "女皇 (The Empress)", meaning: "代表丰饶、创造力和感性。请拥抱自然和你的情感，培育生命中的美好。" },
            { id: 4, name: "皇帝 (The Emperor)", meaning: "代表权威、结构和稳定。你拥有建立秩序和实现目标的坚强意志，请发挥你的领导力。" },
            { id: 5, name: "教皇 (The Hierophant)", meaning: "代表传统、信仰和群体。你可能在寻求导师的指引，或在寻求更高层次的精神追求。" },
            { id: 6, name: "恋人 (The Lovers)", meaning: "代表选择、和谐和伴侣。你可能在做出一个重要的选择，或在处理一段关系中的承诺。" },
            { id: 7, name: "战车 (The Chariot)", meaning: "代表意志力、控制和胜利。通过坚强的意志和自我约束，你可以克服一切障碍。" },
            { id: 8, name: "力量 (Strength)", meaning: "代表勇气、韧性和耐心。真正的力量来自于内在，请以温柔的方式克服挑战。" },
            { id: 9, name: "隐士 (The Hermit)", meaning: "代表自省、孤独和内在的指引。你需要暂时远离人群的喧嚣，给自己留出思考的空间。" },
            { id: 10, name: "命运之轮 (The Wheel)", meaning: "代表命运的转折、不可预测性和周期的变化。好运即将降临，请顺应改变的洪流。" },
            { id: 11, name: "正义 (Justice)", meaning: "代表公平、真理和责任。请做出平衡和道德的选择，结果将取决于你的行动。" },
            { id: 12, name: "倒吊人 (The Hanged Man)", meaning: "代表牺牲、新视角和等待。接受牺牲可以带来更高层次的洞见，请换一个角度看问题。" },
            { id: 13, name: "死亡 (Death)", meaning: "代表结束、转变和新的开始。旧的东西必须结束，新的东西才能开始，请接受这个自然的过程。" },
            { id: 14, name: "节制 (Temperance)", meaning: "代表平衡、和谐和耐心。找到对立面之间的中间路径，请以温和的方式实现平衡。" },
            { id: 15, name: "恶魔 (The Devil)", meaning: "代表束缚、物质主义和诱惑。你可能被自己的物质欲望或消极想法束缚，请寻求真正的自由。" },
            { id: 16, name: "高塔 (The Tower)", meaning: "代表突如其来的变化、混乱和觉醒。虽然变化可能是破坏性的，但它也带来了新的洞见和自由。" },
            { id: 17, name: "星星 (The Star)", meaning: "代表希望、灵感和内心的平静。在经历了黑暗之后，你将迎来治愈和充满光芒的未来。" },
            { id: 18, name: "月亮 (The Moon)", meaning: "代表潜意识、幻想和直觉. 请倾听你的直觉,揭示隐藏在表面之下的真理,避免陷入幻觉。" },
            { id: 19, name: "太阳 (The Sun)", meaning: "代表活力、清晰和快乐。请庆祝你的成就在光明中，你将迎来明确的未来。" },
            { id: 20, name: "审判 (Judgement)", meaning: "代表觉醒、责任和决策。请做出重要的选择，评估你的过去，并拥抱新的旅程。" },
            { id: 21, name: "世界 (The World)", meaning: "代表完成、成就和整体。你已经完成了你的旅程，请庆祝你的整体和完整性。" }
        ];

        const videoElement = document.getElementById('webcam');
        const deckContainer = document.getElementById('deck-container');
        const cursor = document.getElementById('hand-cursor');
        const statusText = document.getElementById('status-text');
        const readingArea = document.getElementById('reading-area');
        const readingTitle = document.getElementById('reading-title');
        const readingText = document.getElementById('reading-text');
        
        const TOTAL_CARDS = 22;
        const CLONED_CARDS = 44; // 生成两倍卡牌以实现无限滚动布局
        let cards = [];
        let scrollOffset = 0;
        let targetScrollSpeed = 0;
        let currentScrollSpeed = 0;
        let isScrollingControlled = false; // 是否正被手势位置控制
        
        const CARD_WIDTH = 120;
        const CARD_GAP = 10;
        const TOTAL_DECK_WIDTH = CLONED_CARDS * (CARD_WIDTH + CARD_GAP);
        const MAX_SCROLL_SPEED = 18; // px/frame
        
        let handX = window.innerWidth / 2, handY = window.innerHeight / 2;
        let currentGesture = 'open';
        let grabbedCard = null;
        let drawnCardsCount = 0;
        const MAX_DRAW = 3;
        let drawnCardsElements = [];

        // 初始化卡牌 DOM (44张，两倍克隆)
        for (let i = 0; i < CLONED_CARDS; i++) {
            let card = document.createElement('div');
            card.className = 'card';
            card.dataset.index = i % TOTAL_CARDS; // 原始卡牌索引
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-back"></div>
                    <div class="card-front">
                        <h3 class="card-name"></h3>
                    </div>
                </div>
            `;
            deckContainer.appendChild(card);
            cards.push(card);
        }

        // --- 动画循环 (核心布局逻辑：实现水平无限滚动轮播) ---
        function renderLoop() {
            if (drawnCardsCount < MAX_DRAW) {
                // 1. 速度控制和惯性
                if (isScrollingControlled) {
                    currentScrollSpeed = currentScrollSpeed + (targetScrollSpeed - currentScrollSpeed) * 0.12; // 平滑移动到目标速度
                } else {
                    currentScrollSpeed *= 0.94; // 惯性减速
                }
                
                // 2. 更新滚动抵消量
                scrollOffset += currentScrollSpeed;
                
                // 3. 模运算实现无限滚动
                // 确保结果始终为正
                let modOffset = (scrollOffset % TOTAL_DECK_WIDTH + TOTAL_DECK_WIDTH) % TOTAL_DECK_WIDTH;
                
                // 4. 定位卡牌
                cards.forEach((card, index) => {
                    if (card === grabbedCard || card.classList.contains('placed')) return;
                    
                    let baseX = index * (CARD_WIDTH + CARD_GAP);
                    let currentX = (baseX - modOffset + TOTAL_DECK_WIDTH) % TOTAL_DECK_WIDTH;
                    let finalX = currentX;
                    
                    card.style.transform = `translateX(${finalX}px)`;
                    
                    // 可选：根据到中心的距离设置 z-index
                    let viewportCenter = window.innerWidth / 2;
                    let cardCenter = finalX + CARD_WIDTH / 2;
                    let distToCenter = Math.abs(cardCenter - viewportCenter);
                    let zFactor = Math.floor(50 - distToCenter / 20);
                    card.style.zIndex = zFactor;
                });
            }

            // 被抓取的牌跟随手部
            if (grabbedCard) {
                grabbedCard.style.left = `${handX - CARD_WIDTH / 2}px`;
                grabbedCard.style.top = `${handY - CARD_WIDTH * 1.6 / 2}px`;
                grabbedCard.style.transform = `rotate(0deg)`;
            }
            requestAnimationFrame(renderLoop);
        }
        renderLoop();

        // --- MediaPipe 识别 ---
        function detectGesture(landmarks) {
            const isFingerCurled = (tip, mcp) => landmarks[tip].y > landmarks[mcp].y;
            const indexCurled = isFingerCurled(8, 5);
            const middleCurled = isFingerCurled(12, 9);
            const ringCurled = isFingerCurled(16, 13);
            const pinkyCurled = isFingerCurled(20, 17);
            const curledCount = [indexCurled, middleCurled, ringCurled, pinkyCurled].filter(Boolean).length;

            if (curledCount >= 3) return 'fist';
            else if (!indexCurled && middleCurled && ringCurled && pinkyCurled) return 'index';
            else return 'open';
        }

        function onResults(results) {
            if (drawnCardsCount >= MAX_DRAW) return;
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const rawX = (landmarks[5].x + landmarks[0].x) / 2;
                const normalizedHandX = 1 - rawX; // 镜像后，0-1从左到右
                const rawY = (landmarks[5].y + landmarks[0].y) / 2;
                
                handX = handX + (normalizedHandX * window.innerWidth - handX) * 0.35;
                handY = handY + (rawY * window.innerHeight - handY) * 0.35;
                cursor.style.left = `${handX}px`;
                cursor.style.top = `${handY}px`;

                const newGesture = detectGesture(landmarks);
                
                // 核心逻辑：手势控制滑动方向和速度
                if (newGesture === 'open' && !grabbedCard) {
                    isScrollingControlled = true;
                    // 手越靠近右边，速度越快（正）；靠近左边，速度负。
                    targetScrollSpeed = (normalizedHandX - 0.5) * MAX_SCROLL_SPEED;
                    // 设置一个死区（中间区域），手在中间时停止
                    if (Math.abs(normalizedHandX - 0.5) < 0.08) targetScrollSpeed = 0;
                } else {
                    // 食指手势，明确停止滑动
                    if (newGesture === 'index') {
                        isScrollingControlled = true;
                        targetScrollSpeed = 0; // 明确停止
                    } else {
                         // 握拳抓取，由它自己惯性减速
                         isScrollingControlled = false;
                    }
                }

                if (newGesture !== currentGesture) {
                    currentGesture = newGesture;
                    handleGestureChange();
                }
            }
        }

        function handleGestureChange() {
            cursor.className = currentGesture;
            if (currentGesture === 'fist' && !grabbedCard) {
                let closestCard = null, minDistance = Infinity;
                cards.forEach(card => {
                    if (card.classList.contains('placed')) return;
                    const rect = card.getBoundingClientRect();
                    const dist = Math.hypot((rect.left + rect.width / 2) - handX, (rect.top + rect.height / 2) - handY);
                    if (dist < 150 && dist < minDistance) {
                        minDistance = dist; closestCard = card;
                    }
                });
                if (closestCard) {
                    grabbedCard = closestCard;
                    grabbedCard.classList.add('grabbed');
                    const rect = grabbedCard.getBoundingClientRect();
                    grabbedCard.style.left = `${rect.left}px`;
                    grabbedCard.style.top = `${rect.top}px`;
                }
            }

            if (currentGesture === 'open' && grabbedCard) {
                drawnCardsCount++;
                const targetSlot = document.getElementById(`slot-${drawnCardsCount}`);
                const slotRect = targetSlot.getBoundingClientRect();
                
                grabbedCard.classList.remove('grabbed');
                grabbedCard.classList.add('placed');
                grabbedCard.style.left = `${slotRect.left}px`;
                grabbedCard.style.top = `${slotRect.top}px`;
                grabbedCard.style.transform = 'rotate(0deg)';
                
                drawnCardsElements.push(grabbedCard);
                grabbedCard = null;

                if (drawnCardsCount >= MAX_DRAW) {
                    statusText.innerText = "抽取完毕，解读命运之时已到...";
                    cursor.style.display = 'none'; // 隐藏光标
                    setTimeout(startReading, 1800); // 稍长一点等待
                }
            }
        }

        // --- 打字机效果函数 ---
        function typeWriter(text, element, speed = 50) {
            return new Promise(resolve => {
                element.innerHTML = "";
                let i = 0;
                function type() {
                    if (i < text.length) {
                        element.innerHTML += text.charAt(i);
                        i++;
                        setTimeout(type, speed);
                    } else {
                        resolve(); // 打字完成后解除 Promise 阻塞
                    }
                }
                type();
            });
        }

        // --- 核心解牌逻辑 (自动翻牌 + 渐显) ---
        async function startReading() {
            readingArea.style.display = 'block';
            statusText.style.opacity = '0';
            
            // 随机选3张牌
            let shuffledDb = [...tarotDatabase].sort(() => 0.5 - Math.random());
            let selectedData = shuffledDb.slice(0, 3);
            const positions = ["【过去】", "【现在】", "【未来】"];

            for (let i = 0; i < 3; i++) {
                let cardEl = drawnCardsElements[i];
                let data = selectedData[i];

                // 1. 将数据写入卡牌正面 DOM
                let frontName = cardEl.querySelector('.card-name');
                frontName.innerText = data.name;
                
                // 如果有真实的图片，可以在这里动态添加 img 标签
                // let frontEl = cardEl.querySelector('.card-front');
                // frontEl.innerHTML += `<img src="/path/to/your/images/${data.id}.jpg" alt="${data.name}">`; // data.id 是 0-21

                // 2. 触发 CSS 3D 翻转
                cardEl.classList.add('flipped');

                // 3. 更新解牌区标题
                readingTitle.innerText = `${positions[i]} - ${data.name}`;
                
                // 4. 等待打字机效果完成
                await typeWriter(data.meaning, readingText, 65);

                // 5. 读完一张牌后，停顿 2 秒
                if (i < 2) {
                    await new Promise(r => setTimeout(r, 2200));
                }
            }

            // 结尾收尾
            setTimeout(() => {
                readingTitle.innerText = "命运占卜已完成";
                readingText.innerHTML += "<br><br><i>刷新页面可重新抽取。</i>";
            }, 1200);
        }

        // --- 初始化摄像头 ---
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.72, minTrackingConfidence: 0.72 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        
        camera.start().then(() => { statusText.innerText = "摄像头就绪，张开手掌体验"; })
        .catch(err => { statusText.innerText = "请允许摄像头访问以体验"; });

    </script>
</body>
</html>
