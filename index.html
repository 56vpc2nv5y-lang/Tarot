<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELA · 塔罗占卜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Sans:wght@400;500;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/vela.css">
</head>
<body data-theme="A">

<!-- ============== LOADING SCREEN ============== -->
<div class="loading" id="loading">
  <svg class="loading-star" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 2 L13.5 9 L20 10 L13.5 12.5 L15 19 L12 15 L9 19 L10.5 12.5 L4 10 L10.5 9 Z"></path>
  </svg>
  <div class="loading-name">VELA</div>
  <div class="loading-track"><div class="loading-fill" id="loading-fill"></div></div>
  <div class="loading-pct" id="loading-pct">0%</div>
  <button class="loading-force" id="loading-force">强行进入</button>
</div>

<!-- ============== BACKGROUND LAYERS ============== -->
<canvas class="bg-canvas" id="bg-canvas"></canvas>
<div class="bg-layer">
  <!-- Theme A: rays canvas drawn via CSS; stars+dust from canvas -->
  <div class="bg-rays"></div>
  <!-- Theme B -->
  <div class="bg-shafts"><span></span><span></span><span></span><span></span><span></span></div>
  <div class="bg-halo"></div>
  <!-- Theme C -->
  <div class="bg-grid"></div>
  <div class="bg-sweep"></div>
  <!-- Theme D -->
  <div class="bg-blobs"><span></span><span></span><span></span><span></span><span></span></div>
</div>

<!-- ============== MANDALA (during PICKING) ============== -->
<div class="mandala" id="mandala">
  <svg id="mandala-svg" width="100%" height="100%"></svg>
</div>

<!-- ============== APP ============== -->
<div class="app">

  <div class="checkin-banner" id="checkin-banner">
    <span>✦ 今日尚未签到</span>
    <button id="checkin-claim">领取 +10 积分</button>
  </div>

  <header class="topbar">
    <div class="topbar-brand" id="topbar-brand">VELA</div>
    <div class="topbar-actions">
      <button class="topbar-btn points" id="btn-points"><span class="icon">✦</span><span id="points-display">0</span></button>
      <button class="topbar-btn" id="btn-log"><span class="icon">📖</span><span>日志</span></button>
      <button class="topbar-btn" id="btn-settings"><span class="icon">⚙</span><span>设置</span></button>
    </div>
  </header>

  <main class="stage">
    <div class="spread-hint" id="spread-hint"></div>
    <div class="status-text" id="status-text">握拳 · 或点击开始</div>

    <div class="scene" id="scene"></div>

    <div class="slots" id="slots"></div>
  </main>
</div>

<!-- ============== CAMERA PREVIEW ============== -->
<div class="cam-preview" id="cam-preview"></div>

<!-- ============== TOAST STACKS ============== -->
<div class="toast-stack" id="toast-stack"></div>

<!-- ============== HELP BUTTON ============== -->
<button class="help-btn" id="help-btn">?</button>

<!-- ============== GESTURE ONBOARDING ============== -->
<div class="onboard" id="onboard">
  <div class="onboard-inner">
    <h2>用手势占卜</h2>
    <div class="gesture-demo">
      <div class="gesture-demo-item fist">
        <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent);">
          <circle cx="40" cy="48" r="22"/>
          <path d="M30 38 Q30 30 36 30 Q42 30 42 38"/>
          <path d="M38 36 Q38 28 44 28 Q50 28 50 36"/>
        </svg>
        <span class="label">握拳 · 开始</span>
      </div>
      <div class="gesture-demo-item palm">
        <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent);">
          <path d="M40 65 V35"/>
          <path d="M30 50 V25"/>
          <path d="M50 50 V25"/>
          <path d="M22 55 V35"/>
          <path d="M58 55 V35"/>
          <path d="M22 55 Q22 65 30 68 H50 Q58 65 58 55"/>
        </svg>
        <span class="label">张开手掌 · 悬停选牌</span>
      </div>
    </div>
    <p>握拳 0.8 秒开始占卜，<br/>张开手掌在中间悬停以选中卡牌，<br/>把手移到画面左右两侧可滚动牌阵。</p>
    <button class="btn-primary" id="onboard-ok">知道了 →</button>
  </div>
</div>

<!-- ============== MODALS (skeletons) ============== -->
<div class="modal-backdrop" id="mood-modal"><div class="modal-card"></div></div>
<div class="modal-backdrop" id="question-modal"><div class="modal-card"></div></div>
<div class="modal-backdrop" id="card-detail-modal"><div class="modal-card"></div></div>
<div class="modal-backdrop" id="deck-modal"><div class="modal-card large"></div></div>
<div class="modal-backdrop" id="log-modal"><div class="modal-card large"></div></div>

<!-- Settings as side panel -->
<aside class="panel" id="settings-panel"></aside>

<!-- AI panel slides up from bottom -->
<section class="ai-panel" id="ai-panel"></section>

<!-- ============== VELA EASTER EGG ============== -->
<div class="vela-egg" id="vela-egg">
  <h1>V E L A</h1>
  <svg class="star-map" viewBox="0 0 280 180" stroke="#e8c050" fill="#fff8c8">
    <!-- Vela constellation: γ δ κ λ μ (real-ish positions) -->
    <line x1="60"  y1="120" x2="115" y2="80"  stroke-width="0.4"/>
    <line x1="115" y1="80"  x2="160" y2="60"  stroke-width="0.4"/>
    <line x1="160" y1="60"  x2="220" y2="100" stroke-width="0.4"/>
    <line x1="220" y1="100" x2="180" y2="140" stroke-width="0.4"/>
    <line x1="180" y1="140" x2="115" y2="80"  stroke-width="0.4"/>
    <circle cx="60"  cy="120" r="2.8"/>
    <circle cx="115" cy="80"  r="3.5"/>
    <circle cx="160" cy="60"  r="2.5"/>
    <circle cx="220" cy="100" r="2.2"/>
    <circle cx="180" cy="140" r="3"/>
    <text x="68" y="125" fill="#80755a" font-family="DM Sans" font-size="6">γ</text>
    <text x="121" y="80" fill="#80755a" font-family="DM Sans" font-size="6">δ</text>
    <text x="165" y="58" fill="#80755a" font-family="DM Sans" font-size="6">κ</text>
    <text x="226" y="103" fill="#80755a" font-family="DM Sans" font-size="6">λ</text>
    <text x="184" y="148" fill="#80755a" font-family="DM Sans" font-size="6">μ</text>
  </svg>
  <div class="letter">
    <p>VELA 是南天星座「船帆座」的拉丁语名。</p>
    <p>大航海时代，水手们靠星辰导航，<br/>在茫茫大海中寻找方向。</p>
    <p>我们希望 VELA 做同样的事 ——<br/>不是替你决定命运，<br/>而是在你迷雾最深的时候，帮你看清自己。</p>
    <p>塔罗的 78 张牌，是 78 面镜子。<br/>VELA 不是一个算命的地方。</p>
    <p class="signoff">—— 来自 VELA 的初心</p>
  </div>
  <button id="vela-egg-close">[ 关闭 ]</button>
</div>

<!-- ============== TWEAKS PANEL ============== -->
<button class="tweaks-fab" id="tweaks-fab">Tweaks ✦</button>
<div class="tweaks-panel" id="tweaks-panel"></div>

<!-- ============== EXTERNAL LIBS ============== -->
<script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<!-- ============== APP SCRIPTS ============== -->
<script src="assets/js/vela-utils.js"></script>
<script src="assets/js/vela-data.js"></script>
<script src="assets/js/vela-themes.js"></script>
<script src="assets/js/vela-carousel.js"></script>
<script src="assets/js/vela-gestures.js"></script>
<script src="assets/js/vela-points.js"></script>
<script src="assets/js/vela-modals.js"></script>
<script src="assets/js/vela-app.js"></script>

</body>
</html>
