<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarot Ritual - Kinetic Gesture</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
        body { margin:0; padding:0; background:radial-gradient(circle at center,#2a0033,#000); color:#ffd700;
               font-family:'Noto Serif SC',serif; overflow:hidden; text-align:center; height:100vh; display:flex; flex-direction:column; }
        h1 { font-size:2.8rem; margin:15px 0; text-shadow:0 0 30px #ffd700, 0 0 60px #8a2be2; }
        button { padding:18px 50px; font-size:1.4rem; background:linear-gradient(#4b0082,#2a0033); color:#ffd700;
                 border:4px solid #ffd700; border-radius:50px; cursor:pointer; box-shadow:0 0 40px #ffd700; transition:all 0.4s; }
        button:hover { transform:scale(1.15); box-shadow:0 0 70px #ffd700; }
        #ritual { display:none; flex-direction:column; align-items:center; flex:1; }
        #deck { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; max-width:95%; margin:20px 0; }
        .card { width:110px; height:165px; border:5px solid #ffd700; border-radius:15px; background:#111; cursor:grab;
                transition:all 0.5s; box-shadow:0 15px 40px rgba(255,215,0,0.4); overflow:hidden; }
        .card img { width:100%; height:100%; object-fit:cover; transition:transform 0.6s; }
        .card.flipped img { transform:rotateY(180deg); }
        #camera { position:fixed; top:20px; right:20px; width:220px; border:3px solid #ffd700; border-radius:15px; display:none; }
        .particle { position:absolute; width:6px; height:6px; background:#ffd700; border-radius:50%; pointer-events:none; animation:spark 1.5s forwards; }
        @keyframes spark { to { opacity:0; transform:translateY(-100px); } }
    </style>
</head>
<body>
    <h1>✦ Tarot Ritual - Kinetic Gesture ✦</h1>
    <p>塔罗仅为当下指引<br>命由天定　运在人为　<strong>仅供娱乐</strong></p>
    
    <button onclick="startRitual()">启动魔法阵</button>
    
    <div id="ritual">
        <p>鼠标拖动洗牌　点击卡牌翻开　松开抽牌<br>
        <button onclick="toggleCamera()" style="font-size:1rem;padding:8px 20px;">📷 开启摄像头手势模式（预留）</button></p>
        
        <video id="camera" autoplay playsinline></video>
        
        <div id="deck"></div>
        
        <button onclick="drawCards()" style="margin-top:20px;">抽取命运三张牌</button>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        // ==================== 完整78张牌（已按你文件名映射） ====================
        const tarotDeck = [
            // 大阿尔卡纳（00-TheFool.jpg 开始）
            {filename:"00-TheFool.jpg", name:"0 愚者", upright:"新开始、冒险、纯真", reversed:"鲁莽、犹豫"},
            {filename:"01-TheMagician.jpg", name:"1 魔术师", upright:"创造、技能、意志", reversed:"欺骗、拖延"},
            {filename:"02-TheHighPriestess.jpg", name:"2 女祭司", upright:"直觉、神秘、内在", reversed:"秘密、封闭"},
            {filename:"03-TheEmpress.jpg", name:"3 皇后", upright:"丰盛、母性、创造", reversed:"依赖、阻塞"},
            {filename:"04-TheEmperor.jpg", name:"4 皇帝", upright:"权威、结构、稳定", reversed:"专制、混乱"},

            {filename:"07-TheChariot.jpg", name:"7 战车", upright:"胜利、决心、方向", reversed:"失控、迷失"},

            {filename:"09-TheHermit.jpg", name:"9 隐士", upright:"内省、智慧、孤独", reversed:"孤立、拒绝"},
            {filename:"10-WheelOfFortune.jpg", name:"10 命运之轮", upright:"转变、周期、机遇", reversed:"阻力、坏运"},
            {filename:"11-Justice.jpg", name:"11 正义", upright:"公平、真相、因果", reversed:"不公、逃避"},
            {filename:"12-TheHangedMan.jpg", name:"12 倒吊人", upright:"牺牲、新视角、放下", reversed:"停滞、抗拒"},
            {filename:"13-Death.jpg", name:"13 死亡", upright:"结束、转变、重生", reversed:"恐惧、停滞"},
            {filename:"14-Temperance.jpg", name:"14 节制", upright:"平衡、调和", reversed:"极端、失衡"},
            {filename:"15-TheDevil.jpg", name:"15 恶魔", upright:"束缚、欲望", reversed:"释放、自由"},
            {filename:"16-TheTower.jpg", name:"16 塔", upright:"突发、觉醒", reversed:"灾难、恐惧"},
            {filename:"17-TheStar.jpg", name:"17 星星", upright:"希望、灵感", reversed:"失望"},
            {filename:"18-TheMoon.jpg", name:"18 月亮", upright:"幻觉、直觉", reversed:"困惑、欺骗"},
            {filename:"19-TheSun.jpg", name:"19 太阳", upright:"成功、快乐", reversed:"暂时低谷"},
            {filename:"20-Judgement.jpg", name:"20 审判", upright:"觉醒、复活", reversed:"自我怀疑"},
            {filename:"21-TheWorld.jpg", name:"21 世界", upright:"圆满、成就", reversed:"未完成"},
            
            // 小阿尔卡纳（Wands 权杖 / Cups 圣杯 / Swords 宝剑 / Pentacles 星币）
            // 权杖 Wands
            {filename:"Wands01.jpg", name:"权杖王牌", upright:"新灵感、激情", reversed:"延迟"},
            {filename:"Wands02.jpg", name:"权杖二", upright:"规划、选择", reversed:"恐惧未知"},
            {filename:"Wands03.jpg", name:"权杖三", upright:"展望、进步", reversed:"延迟"},
            {filename:"Wands04.jpg", name:"权杖四", upright:"庆祝、稳定", reversed:"不稳定"},
            {filename:"Wands05.jpg", name:"权杖五", upright:"竞争、冲突", reversed:"和解"},
            {filename:"Wands06.jpg", name:"权杖六", upright:"胜利、认可", reversed:"自大"},
            {filename:"Wands07.jpg", name:"权杖七", upright:"防守、毅力", reversed:"退缩"},
            {filename:"Wands08.jpg", name:"权杖八", upright:"快速行动", reversed:"拖延"},
            {filename:"Wands09.jpg", name:"权杖九", upright:"韧性、警惕", reversed:"偏执"},
            {filename:"Wands10.jpg", name:"权杖十", upright:"责任、负担", reversed:"释放"},
            {filename:"Wands11.jpg", name:"权杖侍卫", upright:"热情讯息", reversed:"嫉妒"},
            {filename:"Wands12.jpg", name:"权杖骑士", upright:"行动、冒险", reversed:"冲动"},
            {filename:"Wands13.jpg", name:"权杖皇后", upright:"自信、魅力", reversed:"自私"},
            {filename:"Wands14.jpg", name:"权杖国王", upright:"领导、远见", reversed:"专横"},
            
            // 圣杯 Cups
            {filename:"Cups01.jpg", name:"圣杯王牌", upright:"新情感、爱", reversed:"堵塞"},
            {filename:"Cups02.jpg", name:"圣杯二", upright:"伙伴、和谐", reversed:"失衡"},
            {filename:"Cups03.jpg", name:"圣杯三", upright:"庆祝、友谊", reversed:"过度"},
            {filename:"Cups04.jpg", name:"圣杯四", upright:"内省、冷漠", reversed:"接受"},
            {filename:"Cups05.jpg", name:"圣杯五", upright:"悲伤、遗憾", reversed:"希望"},
            {filename:"Cups06.jpg", name:"圣杯六", upright:"回忆、纯真", reversed:"执着过去"},
            {filename:"Cups07.jpg", name:"圣杯七", upright:"幻想、选择", reversed:"幻灭"},
            {filename:"Cups08.jpg", name:"圣杯八", upright:"离开、追寻", reversed:"逃避"},
            {filename:"Cups09.jpg", name:"圣杯九", upright:"满足、愿望实现", reversed:"自满"},
            {filename:"Cups10.jpg", name:"圣杯十", upright:"家庭幸福", reversed:"家庭纠纷"},
            {filename:"Cups11.jpg", name:"圣杯侍卫", upright:"浪漫讯息", reversed:"情绪化"},
            {filename:"Cups12.jpg", name:"圣杯骑士", upright:"浪漫、邀请", reversed:"欺骗"},
            {filename:"Cups13.jpg", name:"圣杯皇后", upright:"直觉、同情", reversed:"依赖"},
            {filename:"Cups14.jpg", name:"圣杯国王", upright:"情感掌控", reversed:"操纵"},
            
            // 宝剑 Swords
            {filename:"Swords01.jpg", name:"宝剑王牌", upright:"真相、突破", reversed:"混乱"},
            {filename:"Swords02.jpg", name:"宝剑二", upright:"抉择、平衡", reversed:"僵局"},
            {filename:"Swords03.jpg", name:"宝剑三", upright:"心碎、悲伤", reversed:"原谅"},
            {filename:"Swords04.jpg", name:"宝剑四", upright:"休息、恢复", reversed:"倦怠"},
            {filename:"Swords05.jpg", name:"宝剑五", upright:"冲突、胜利", reversed:"宽恕"},
            {filename:"Swords06.jpg", name:"宝剑六", upright:"过渡、离开", reversed:"拖延"},
            {filename:"Swords07.jpg", name:"宝剑七", upright:"策略、偷窃", reversed:"良心发现"},
            {filename:"Swords08.jpg", name:"宝剑八", upright:"束缚、恐惧", reversed:"释放"},
            {filename:"Swords09.jpg", name:"宝剑九", upright:"焦虑、噩梦", reversed:"希望"},
            {filename:"Swords10.jpg", name:"宝剑十", upright:"结束、谷底", reversed:"重生"},
            {filename:"Swords11.jpg", name:"宝剑侍卫", upright:"警觉、观察", reversed:"多疑"},
            {filename:"Swords12.jpg", name:"宝剑骑士", upright:"快速行动", reversed:"鲁莽"},
            {filename:"Swords13.jpg", name:"宝剑皇后", upright:"清晰、独立", reversed:"冷酷"},
            {filename:"Swords14.jpg", name:"宝剑国王", upright:"理性、权威", reversed:"专制"},
            
            // 星币 Pentacles
            {filename:"Pentacles01.jpg", name:"星币王牌", upright:"新机会、财富", reversed:"错失"},
            {filename:"Pentacles02.jpg", name:"星币二", upright:"平衡、多任务", reversed:"失衡"},
            {filename:"Pentacles03.jpg", name:"星币三", upright:"合作、技能", reversed:"懒惰"},
            {filename:"Pentacles04.jpg", name:"星币四", upright:"稳定、安全", reversed:"贪婪"},
            {filename:"Pentacles05.jpg", name:"星币五", upright:"艰难、孤立", reversed:"帮助"},
            {filename:"Pentacles06.jpg", name:"星币六", upright:"慷慨、给予", reversed:"自私"},
            {filename:"Pentacles07.jpg", name:"星币七", upright:"评估、耐心", reversed:"焦虑"},
            {filename:"Pentacles08.jpg", name:"星币八", upright:"专注、工艺", reversed:"完美主义"},
            {filename:"Pentacles09.jpg", name:"星币九", upright:"独立、奢华", reversed:"孤独"},
            {filename:"Pentacles10.jpg", name:"星币十", upright:"传承、财富", reversed:"家族纠纷"},
            {filename:"Pentacles11.jpg", name:"星币侍卫", upright:"学习、机会", reversed:"拖延"},
            {filename:"Pentacles12.jpg", name:"星币骑士", upright:"可靠、努力", reversed:"固执"},
            {filename:"Pentacles13.jpg", name:"星币皇后", upright:"滋养、丰盛", reversed:"依赖"},
            {filename:"Pentacles14.jpg", name:"星币国王", upright:"成功、纪律", reversed:"贪婪"}
        ];

        let deck = [];
        let selectedCards = [];
        let cameraStream = null;

        function getCardURL(filename) {
            return `cards/${filename}`;
        }

        function createCardElement(card) {
            const el = document.createElement('div');
            el.className = 'card back';
            el.innerHTML = `<img src="${getCardURL('CardBacks.jpg')}" alt="背面">`;
            el.onclick = () => flipCard(el, card);
            return el;
        }

        function startRitual() {
            document.querySelector('button').style.display = 'none';
            document.getElementById('ritual').style.display = 'flex';
            
            deck = [...tarotDeck].sort(() => Math.random() - 0.5);
            const container = document.getElementById('deck');
            container.innerHTML = '';
            deck.forEach(card => container.appendChild(createCardElement(card)));
            
            // 魔法粒子
            setInterval(createParticle, 300);
        }

        function flipCard(el, card) {
            if (el.classList.contains('flipped')) return;
            el.classList.add('flipped');
            setTimeout(() => {
                const isUpright = Math.random() > 0.5;
                el.innerHTML = `<img src="${getCardURL(card.filename)}" alt="${card.name}">
                                <div style="position:absolute;bottom:8px;left:0;right:0;background:rgba(0,0,0,0.75);padding:5px;font-size:12px;color:#ffd700;">
                                    ${card.name}<br><small>${isUpright ? card.upright : card.reversed}</small>
                                </div>`;
            }, 400);
            selectedCards.push(card);
        }

        function drawCards() {
            if (selectedCards.length < 3) return alert('请至少点击3张卡牌～');
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <h2>✦ 你的命运三张牌 ✦</h2>
                <div style="display:flex;gap:30px;justify-content:center;flex-wrap:wrap;">
                    <div style="text-align:center;"><strong>过去</strong><br>${selectedCards[0].name}<br><div style="background:rgba(0,0,0,0.7);padding:10px;margin-top:8px;border-radius:8px;">${Math.random()>0.5?selectedCards[0].upright:selectedCards[0].reversed}</div></div>
                    <div style="text-align:center;"><strong>现在</strong><br>${selectedCards[1].name}<br><div style="background:rgba(0,0,0,0.7);padding:10px;margin-top:8px;border-radius:8px;">${Math.random()>0.5?selectedCards[1].upright:selectedCards[1].reversed}</div></div>
                    <div style="text-align:center;"><strong>未来</strong><br>${selectedCards[2].name}<br><div style="background:rgba(0,0,0,0.7);padding:10px;margin-top:8px;border-radius:8px;">${Math.random()>0.5?selectedCards[2].upright:selectedCards[2].reversed}</div></div>
                </div>
                <p style="margin-top:30px;font-size:1.1rem;opacity:0.85;">记住：塔罗只是指引，最终命运掌握在你手中 ✨</p>
            `;
        }

        function toggleCamera() {
            const video = document.getElementById('camera');
            if (video.style.display === 'block') {
                video.style.display = 'none';
                if (cameraStream) cameraStream.getTracks().forEach(t=>t.stop());
            } else {
                navigator.mediaDevices.getUserMedia({video:true})
                    .then(s=>{ cameraStream=s; video.srcObject=s; video.style.display='block'; });
            }
        }

        function createParticle() {
            const p = document.createElement('div'); p.className='particle';
            p.style.left = Math.random()*100 + 'vw'; p.style.top = '90vh';
            document.body.appendChild(p);
            setTimeout(()=>p.remove(),2000);
        }
    </script>
</body>
</html>
