<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="tarot-build" content="2026-03-12-02">
    <title>Mystic Tarot | 神秘塔罗</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --card-width: clamp(120px, 20vw, 200px);
            --card-height: calc(var(--card-width) * 1.75);
            --bg-dark: #050510;
            --accent-gold: #d4af37;
            --accent-glow: rgba(212, 175, 55, 0.6);
        }

        @media (max-width: 768px) and (orientation: portrait) {
            :root { --card-width: clamp(92px, 24vw, 150px); }
        }
        @media (max-width: 480px) and (orientation: portrait) {
            :root { --card-width: clamp(86px, 26vw, 140px); }
        }
        @media (orientation: landscape) and (max-height: 520px) {
            :root { --card-width: clamp(96px, 26vh, 140px); }
        }
        
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Cinzel', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #eee;
            user-select: none;
        }

        #stars-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; opacity: 0.8;
        }

        #fog-layer {
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 40%;
            background: linear-gradient(to top, rgba(10,10,30, 0.9), transparent);
            z-index: 1; pointer-events: none;
        }

        #asset-loader {
            position: fixed; inset: 0; z-index: 2000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 12px;
            background: rgba(5, 5, 16, 0.92);
            backdrop-filter: blur(6px);
            pointer-events: auto;
        }

        #asset-progress-container {
            width: min(320px, 80vw); height: 8px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 999px; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #asset-progress-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.7), rgba(240, 230, 140, 0.9));
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.35);
            transition: width 0.15s linear;
        }

        #game-container {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            perspective: 1200px;
            z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        #scene {
            width: 100%; height: 60vh;
            position: relative;
            transform-style: preserve-3d;
            display: flex; justify-content: center; align-items: center;
        }

        .card-wrapper {
            position: absolute;
            width: var(--card-width);
            height: var(--card-height);
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.3s;
            cursor: pointer;
            border-radius: 15px;
        }

        .card-wrapper.selected { box-shadow: 0 0 30px var(--accent-glow); z-index: 100; }

        .card-inner {
            position: relative; width: 100%; height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
            border-radius: 15px;
        }

        .card-wrapper.flipped .card-inner { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 2px solid #333;
        }

        .card-back {
            background: repeating-linear-gradient(45deg, #1a1a2e, #1a1a2e 10px, #16213e 10px, #16213e 20px);
            display: flex; align-items: center; justify-content: center;
        }
        .card-back::after {
            content: '✦';
            font-size: 3rem; color: rgba(212, 175, 55, 0.3);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 50%; width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center;
        }

        .card-front {
            background-color: #fff;
            transform: rotateY(180deg);
            background-size: cover; background-position: center;
        }

        #ui-layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 20; pointer-events: none;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 20px; box-sizing: border-box;
        }

        #header { text-align: center; text-shadow: 0 0 10px var(--accent-gold); margin-top: 20px; }
        
        h1 { margin: 0; font-weight: 300; letter-spacing: 5px; color: var(--accent-gold); }

        #status-text {
            text-align: center; font-size: 1.2rem;
            color: #aaa; margin-top: 10px;
            text-shadow: 0 0 5px black;
        }

        /* ── Gesture hint badge ── */
        #gesture-hint {
            display: flex;
            gap: 28px;
            justify-content: center;
            margin-top: 12px;
            pointer-events: none;
        }
        .g-hint {
            display: flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,0.45);
            border: 1px solid rgba(212,175,55,0.35);
            border-radius: 30px;
            padding: 5px 14px;
            font-size: 0.78rem;
            color: rgba(212,175,55,0.8);
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
        }
        .g-hint .icon { font-size: 1.1rem; }

        #controls {
            pointer-events: auto;
            display: flex; flex-direction: column;
            align-items: center; gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 10px 30px; font-size: 1rem;
            cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 2px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
        }
        .btn:hover {
            background: var(--accent-gold); color: #000;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        #webcam-preview {
            position: absolute; bottom: 20px; right: 20px;
            width: 160px; height: 120px;
            border: 1px solid var(--accent-gold);
            opacity: 0.5; border-radius: 10px;
            transform: scaleX(-1); z-index: 100;
        }

        /* ══════════════════════════════
           Question Input Panel
        ══════════════════════════════ */
        #question-panel {
            display: none;
            position: absolute;
            left: 50%; bottom: 120px;
            transform: translateX(-50%);
            width: min(520px, 90vw);
            background: rgba(8, 8, 22, 0.88);
            border: 1px solid rgba(212,175,55,0.5);
            border-radius: 18px;
            padding: 20px 24px 18px;
            pointer-events: auto;
            z-index: 60;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
            animation: panelIn 0.4s cubic-bezier(.22,1,.36,1);
        }
        @keyframes panelIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px) scale(0.96); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1); }
        }
        #question-panel label {
            display: block;
            font-size: 0.78rem;
            letter-spacing: 2px;
            color: rgba(212,175,55,0.7);
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        #question-input {
            width: 100%;
            box-sizing: border-box;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(212,175,55,0.3);
            color: #f0f0f0;
            font-family: inherit;
            font-size: 1rem;
            padding: 10px 14px;
            border-radius: 10px;
            resize: none;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            line-height: 1.5;
            min-height: 72px;
        }
        #question-input::placeholder { color: rgba(255,255,255,0.25); }
        #question-input:focus {
            border-color: rgba(212,175,55,0.7);
            box-shadow: 0 0 12px rgba(212,175,55,0.2);
        }
        #question-panel-hint {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.3);
            margin-top: 8px;
            text-align: center;
        }
        #question-panel-btns {
            display: flex; gap: 12px; margin-top: 14px; justify-content: center;
        }
        #question-panel-btns .btn {
            flex: 1; padding: 9px 0; font-size: 0.85rem;
        }
        #btn-confirm-question {
            background: linear-gradient(135deg, rgba(212,175,55,0.85), rgba(240,220,100,0.9));
            color: #0a0a15;
            border: none;
            font-weight: bold;
        }
        #btn-confirm-question:hover {
            box-shadow: 0 0 20px rgba(212,175,55,0.6);
        }
        #btn-skip-question {
            border-color: rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.45);
        }

        /* ══════════════════════════════
           Interpretation Modal
        ══════════════════════════════ */
        #interpretation-modal {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; max-width: 800px; max-height: 80%;
            background: rgba(10, 10, 20, 0.95);
            border: 1px solid var(--accent-gold);
            padding: 30px; border-radius: 20px;
            color: #eee; overflow-y: auto;
            display: none;
            pointer-events: auto;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            z-index: 50;
        }
        #interpretation-content { line-height: 1.6; font-size: 1.1rem; }
        #interpretation-content h3 { color: var(--accent-gold); border-bottom: 1px solid #333; padding-bottom: 10px; }

        /* Settings */
        #settings-btn {
            position: absolute; top: 20px; right: 20px;
            width: 40px; height: 40px;
            color: var(--accent-gold); cursor: pointer;
            z-index: 1000; transition: transform 0.5s;
            pointer-events: auto;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.3); border-radius: 50%;
            border: 1px solid transparent;
        }
        #settings-btn:hover { transform: rotate(90deg); border-color: var(--accent-gold); background: rgba(212, 175, 55, 0.1); }

        #settings-modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 3000;
            backdrop-filter: blur(5px);
        }
        .settings-content {
            background: #111; border: 2px solid var(--accent-gold);
            width: 90%; max-width: 400px;
            margin: 15vh auto; padding: 30px;
            border-radius: 10px; text-align: center; color: #eee;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .settings-content input {
            width: 80%; padding: 10px; margin: 20px 0;
            background: #222; border: 1px solid #444;
            color: white; border-radius: 5px; font-size: 1rem;
        }
        .settings-content a { color: var(--accent-gold); text-decoration: underline; }

        /* Misc */
        #hand-cursor {
            position: absolute; width: 20px; height: 20px;
            border: 2px solid var(--accent-gold); border-radius: 50%;
            pointer-events: none; z-index: 1000;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--accent-glow);
            transition: width 0.2s, height 0.2s, background-color 0.2s;
            display: none;
        }

        .cursor-trail {
            position: absolute; width: 10px; height: 10px;
            background: var(--accent-glow); border-radius: 50%;
            pointer-events: none; z-index: 999; opacity: 0.8;
            animation: fadeTrail 0.5s forwards;
        }
        @keyframes fadeTrail { to { opacity: 0; transform: scale(0.2); } }

        .particle {
            position: absolute; width: 4px; height: 4px;
            background: #ffffff; border-radius: 50%;
            pointer-events: none; z-index: 2001;
            animation: riseAndFade 0.8s ease-out forwards;
            box-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff;
        }
        @keyframes riseAndFade {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -150px) scale(0.2); opacity: 0; }
        }

        #charge-progress-container {
            width: 200px; height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px; margin: 10px auto;
            overflow: hidden; display: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        #charge-progress-bar {
            width: 0%; height: 100%;
            background: #fff; box-shadow: 0 0 10px #fff;
            transition: width 0.1s linear;
        }

        #charge-ring {
            position: absolute; width: 60px; height: 60px;
            border: 4px solid var(--accent-gold); border-radius: 50%;
            pointer-events: none; z-index: 1001;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0; transition: transform 0.1s linear;
        }

        #picked-zone {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            display: none; gap: 20px; z-index: 50; pointer-events: none;
        }

        .picked-slot {
            width: calc(var(--card-width) * 0.5);
            height: calc(var(--card-height) * 0.5);
            border: 2px dashed rgba(212, 175, 55, 0.3);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.3);
            transition: all 0.5s;
        }
        @media (max-width: 480px) { #picked-zone { bottom: 20px; gap: 12px; } }
        .picked-slot.filled { border-style: solid; border-color: var(--accent-gold); background: rgba(0,0,0,0.6); }

        .mini-card {
            width: 100%; height: 100%; border-radius: 8px;
            background-size: cover; background-position: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            animation: flyIn 0.5s ease-out;
        }
        @keyframes flyIn {
            from { transform: translateY(-300px) scale(1.5); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px; height: 36px; border-radius: 50%;
            border-left-color: var(--accent-gold);
            animation: spin 1s linear infinite;
            display: none; margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #gesture-guide {
            position: absolute; bottom: 150px; left: 50%;
            transform: translateX(-50%);
            display: none; gap: 20px; opacity: 0;
            transition: opacity 0.5s; pointer-events: none;
            width: 100%; justify-content: center;
        }
        .guide-zone {
            position: absolute; top: 0; bottom: 0; width: 30%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: rgba(212, 175, 55, 0.5);
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        #zone-left  { left: 0; justify-content: flex-start; padding-left: 50px; }
        #zone-right { right: 0; justify-content: flex-end; padding-right: 50px; }
        #zone-center { left: 30%; width: 40%; align-items: flex-end; padding-bottom: 180px; }
        .guide-zone.active { opacity: 1; text-shadow: 0 0 20px var(--accent-gold); }

        .guide-icon {
            width: 60px; height: 60px;
            background: rgba(255,255,255,0.1); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; border: 1px solid transparent;
        }
        .guide-icon.active {
            border-color: var(--accent-gold);
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 15px var(--accent-glow);
            transform: scale(1.2);
        }

        @keyframes pulseRing {
            0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 1; border-width: 5px; }
            100% { transform: translate(-50%, -50%) scale(2.0); opacity: 0; border-width: 0px; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>

    <canvas id="stars-canvas"></canvas>
    <div id="fog-layer"></div>

    <div id="asset-loader">
        <div style="font-size: 1.25rem; color: var(--accent-gold); letter-spacing: 2px;">资源加载中 · v2026-03-12-02</div>
        <div id="asset-progress-text" style="color: #ddd; font-size: 0.95rem;">0%</div>
        <div id="asset-progress-container">
            <div id="asset-progress-bar"></div>
        </div>
        <button id="asset-retry-btn" class="btn" style="display:none">重试加载</button>
    </div>

    <div id="ui-layer">
        <div id="settings-btn">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
            </svg>
        </div>

        <div id="hand-cursor"></div>
        <div id="charge-ring"></div>

        <div id="header">
            <h1>神秘塔罗</h1>
            <div id="status-text">正在启动...</div>
            <!-- Gesture hint bar -->
            <div id="gesture-hint" style="display:none">
                <div class="g-hint"><span class="icon">✋</span> 张开手掌 = 选牌</div>
                <div class="g-hint"><span class="icon">✊</span> 握拳 1s = 开始/解读</div>
            </div>
            <div id="charge-progress-container">
                <div id="charge-progress-bar"></div>
            </div>
        </div>

        <div id="picked-zone">
            <div class="picked-slot" id="slot-0"></div>
            <div class="picked-slot" id="slot-1"></div>
            <div class="picked-slot" id="slot-2"></div>
        </div>

        <div id="gesture-guide">
            <div id="zone-left"  class="guide-zone">向右挥动 ➡</div>
            <div id="zone-right" class="guide-zone">⬅ 向左挥动</div>
            <div id="zone-center" class="guide-zone">
                <div class="guide-icon" id="icon-select">✋</div>
                <div style="font-size: 1rem; margin-top: 10px; text-shadow: 0 0 5px black;">张开手掌选牌</div>
            </div>
        </div>

        <div id="controls">
            <button id="start-btn" class="btn" style="display:none">开始体验</button>
            <button id="interpret-btn" class="btn" style="display:none; background: linear-gradient(45deg, #d4af37, #f0e68c); color: #000; font-weight: bold; box-shadow: 0 0 20px rgba(212,175,55,0.6);">🔮 解读命运</button>
            <div class="spinner" id="loading-spinner"></div>
        </div>
    </div>

    <!-- Question Input Panel -->
    <div id="question-panel">
        <label>✦ 请说出你心中的问题（可选）</label>
        <textarea id="question-input" rows="3"
            placeholder="例如：我的感情走向如何？近期事业上的困境如何化解？…"></textarea>
        <div id="question-panel-hint">不填写则进行通用解读</div>
        <div id="question-panel-btns">
            <button class="btn" id="btn-skip-question" onclick="confirmQuestion(false)">跳过</button>
            <button class="btn" id="btn-confirm-question" onclick="confirmQuestion(true)">确认并解读 🔮</button>
        </div>
    </div>

    <video id="webcam-preview" playsinline></video>

    <div id="game-container">
        <div id="scene"></div>
    </div>

    <div id="interpretation-modal">
        <h2 style="color: var(--accent-gold); text-align: center; margin-top: 0;">命运启示</h2>
        <div id="interpretation-content"></div>
        <div style="text-align: center; margin-top: 30px;">
            <button class="btn" onclick="document.getElementById('interpretation-modal').style.display='none'">关闭</button>
        </div>
    </div>

    <div id="settings-modal">
        <div class="settings-content">
            <h2 style="color: var(--accent-gold);">API Key 配置（本地存储）</h2>
            <p>请输入您的 DeepSeek API Key 以开启 AI 解读功能。</p>
            <p style="font-size: 0.9rem; color: #aaa;">
                还没有 Key？前往 <a href="https://platform.deepseek.com/api_keys" target="_blank">DeepSeek Platform</a> 获取。
            </p>
            <input type="password" id="api-token-input" placeholder="sk-...">
            <div id="token-status" style="font-size: 0.8rem; margin: 10px 0; min-height: 1.2em;"></div>
            <button id="save-settings-btn" class="btn">保存配置</button>
            <button id="close-settings-btn" class="btn" style="background: transparent; border: 1px solid #444; margin-top: 10px;">关闭</button>
        </div>
    </div>

    <script>
    // ─────────────────────────────────────────────────────────────────
    //  1. Card Data
    // ─────────────────────────────────────────────────────────────────
    const ASSETS_PATH = 'assets/tarot/pkt/';

    const generateCards = () => {
        const cards = [];
        const majorNames = [
            "The Fool","The Magician","The High Priestess","The Empress","The Emperor",
            "The Hierophant","The Lovers","The Chariot","Strength","The Hermit",
            "Wheel of Fortune","Justice","The Hanged Man","Death","Temperance",
            "The Devil","The Tower","The Star","The Moon","The Sun",
            "Judgement","The World"
        ];
        majorNames.forEach((name, i) => {
            const id = `ar${String(i).padStart(2,'0')}`;
            cards.push({ id, name, type:'major', img:`${ASSETS_PATH}${id}.jpg` });
        });
        const suits = [{code:'wa',name:'Wands'},{code:'cu',name:'Cups'},{code:'sw',name:'Swords'},{code:'pe',name:'Pentacles'}];
        const ranks = [
            {code:'ac',name:'Ace'},{code:'02',name:'Two'},{code:'03',name:'Three'},{code:'04',name:'Four'},
            {code:'05',name:'Five'},{code:'06',name:'Six'},{code:'07',name:'Seven'},{code:'08',name:'Eight'},
            {code:'09',name:'Nine'},{code:'10',name:'Ten'},{code:'pa',name:'Page'},{code:'kn',name:'Knight'},
            {code:'qu',name:'Queen'},{code:'ki',name:'King'}
        ];
        suits.forEach(suit => {
            ranks.forEach(rank => {
                const id = `${suit.code}${rank.code}`;
                cards.push({ id, name:`${rank.name} of ${suit.name}`, type:'minor', img:`${ASSETS_PATH}${id}.jpg` });
            });
        });
        return cards;
    };

    const FULL_DECK = generateCards();
    let currentDeck = [];
    let pickedCards  = [];
    let assetsReady  = false;
    let assetsFailed = false;
    let cameraReady  = false;
    let cameraError  = false;

    // ─────────────────────────────────────────────────────────────────
    //  2. Asset Loading
    // ─────────────────────────────────────────────────────────────────
    function setAssetProgress(progress, label) {
        const pct  = Math.max(0, Math.min(100, Math.round(progress)));
        const text = document.getElementById('asset-progress-text');
        const bar  = document.getElementById('asset-progress-bar');
        if (text) text.innerText = label ? `${label} ${pct}%` : `${pct}%`;
        if (bar)  bar.style.width = `${pct}%`;
    }

    function updateIdleStatus() {
        if (currentState !== STATE.IDLE) return;
        if (cameraError) return;
        const status = document.getElementById('status-text');
        if (!status) return;
        if (assetsFailed)  { status.innerText = "资源加载失败，点击重试"; return; }
        if (!assetsReady)  { status.innerText = "资源加载中..."; return; }
        if (cameraReady)   { status.innerText = "握拳 1秒 开始"; }
    }

    function preloadDeckAssets() {
        const loader   = document.getElementById('asset-loader');
        const retryBtn = document.getElementById('asset-retry-btn');
        if (retryBtn) retryBtn.style.display = 'none';
        if (loader)   loader.style.display   = 'flex';
        assetsReady = false; assetsFailed = false;
        setAssetProgress(0); updateIdleStatus();

        const images = Array.from(new Set(FULL_DECK.map(c => c.img).filter(Boolean)));
        const total  = images.length;
        let done = 0, fail = 0;
        if (total === 0) { assetsReady = true; if (loader) loader.style.display='none'; updateIdleStatus(); return; }

        images.forEach(src => {
            const img = new Image();
            img.decoding = 'async';
            const tick = () => {
                const p = ((++done + fail) / total) * 100;
                setAssetProgress(p);
                if (done + fail === total) finish();
            };
            const tickF = () => {
                fail++;
                const p = ((done + fail) / total) * 100;
                setAssetProgress(p);
                if (done + fail === total) finish();
            };
            img.onload  = tick;
            img.onerror = tickF;
            img.src = src;
        });

        function finish() {
            if (fail > 0) {
                assetsFailed = true;
                setAssetProgress(100,"加载失败");
                if (retryBtn) { retryBtn.style.display='inline-block'; retryBtn.onclick=()=>preloadDeckAssets(); }
                updateIdleStatus(); return;
            }
            assetsReady = true;
            setAssetProgress(100,"加载完成");
            if (loader) loader.style.display = 'none';
            updateIdleStatus();
        }
    }

    // ─────────────────────────────────────────────────────────────────
    //  3. State Machine
    // ─────────────────────────────────────────────────────────────────
    const STATE = { IDLE:'IDLE', INTRO:'INTRO', PICKING:'PICKING', REVEALING:'REVEALING', INTERPRETING:'INTERPRETING' };
    let currentState = STATE.IDLE;
    let currentIndex = 0;
    let velocity     = 0;
    let targetIndex  = 0;

    // ─────────────────────────────────────────────────────────────────
    //  4. Stars
    // ─────────────────────────────────────────────────────────────────
    function initStars() {
        const canvas = document.getElementById('stars-canvas');
        const ctx    = canvas.getContext('2d');
        let width, height, stars = [];
        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            stars = [];
            for (let i=0;i<200;i++) stars.push({x:Math.random()*width,y:Math.random()*height,size:Math.random()*2,opacity:Math.random(),speed:Math.random()*0.5});
        }
        function animate() {
            ctx.clearRect(0,0,width,height);
            stars.forEach(s => {
                ctx.globalAlpha = s.opacity;
                ctx.fillStyle   = 'white';
                ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fill();
                s.y -= s.speed;
                if (s.y < 0) s.y = height;
                if (Math.random() > 0.95) s.opacity = Math.random();
            });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', resize);
        resize(); animate();
    }

    // ─────────────────────────────────────────────────────────────────
    //  5. Deck rendering
    // ─────────────────────────────────────────────────────────────────
    const scene = document.getElementById('scene');

    function shuffle(arr) {
        for (let i=arr.length-1;i>0;i--) {
            const j=Math.floor(Math.random()*(i+1));
            [arr[i],arr[j]]=[arr[j],arr[i]];
        }
        return arr;
    }

    function createCardElement(card, index) {
        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';
        wrapper.dataset.index = index;
        const inner = document.createElement('div');
        inner.className = 'card-inner';
        const back  = document.createElement('div'); back.className  = 'card-face card-back';
        const front = document.createElement('div'); front.className = 'card-face card-front';
        front.style.backgroundImage = `url('${card.img}')`;
        inner.appendChild(back); inner.appendChild(front); wrapper.appendChild(inner);
        return wrapper;
    }

    function renderDeck() {
        scene.innerHTML = '';
        if (currentState === STATE.PICKING || currentState === STATE.INTRO) {
            currentDeck.forEach((card, i) => scene.appendChild(createCardElement(card, i)));
            updateCardPositions();
        } else if (currentState === STATE.REVEALING || currentState === STATE.INTERPRETING) {
            pickedCards.forEach((item, i) => {
                const el = createCardElement(item.card, i);
                el.classList.add('picked-card');
                scene.appendChild(el);
            });
            updatePickedPositions();
        }
    }

    function updateCardPositions() {
        if (currentState !== STATE.PICKING && currentState !== STATE.INTRO) return;
        const cards = document.querySelectorAll('.card-wrapper');
        const width = window.innerWidth;
        const cardWidthPx = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--card-width')) || 200;
        const compactMedia = window.matchMedia && window.matchMedia('(orientation: landscape) and (max-height: 520px)').matches;
        const isMobile = width <= 480 || compactMedia;
        const gap = Math.min(Math.max(cardWidthPx*(isMobile?.85:1.15), width*(isMobile?.12:.18)), cardWidthPx*(isMobile?1.25:2));
        const visibleSideCount = Math.ceil((width/2)/(gap*0.5))+3;

        cards.forEach((card, i) => {
            if (card.classList.contains('picked')) return;
            const dist = i - currentIndex;
            if (Math.abs(dist) > visibleSideCount) { card.style.display='none'; return; }
            else card.style.display='block';
            const x  = dist * gap;
            const z  = -Math.pow(Math.abs(dist),1.3)*50;
            let rotateY = Math.max(-45, Math.min(45, dist*5));
            let scale = 1;
            const isSelected = Math.round(currentIndex) === i;
            if (Math.abs(dist)<0.5) {
                scale = (isMobile?1.06:1.2) - Math.abs(dist)*(isMobile?.22:.4);
                card.style.zIndex = 1000;
            } else {
                scale = 1 - Math.min(Math.abs(dist)*0.08, 0.4);
                card.style.zIndex = 1000 - Math.floor(Math.abs(dist)*10);
            }
            isSelected ? card.classList.add('selected') : card.classList.remove('selected');
            if (isPalmHeld && chargeTargetIndex !== null && i === chargeTargetIndex) {
                scale *= chargeExtraScale;
                card.style.zIndex = 2000;
            }
            card.style.transform = `translateX(${x}px) translateZ(${z}px) rotateY(${rotateY}deg) scale(${scale})`;
        });
    }

    function updatePickedPositions() {
        const cards = document.querySelectorAll('.card-wrapper');
        const width = window.innerWidth;
        const compactMedia = window.matchMedia && window.matchMedia('(orientation: landscape) and (max-height: 520px)').matches;
        const spread = (width<=480||compactMedia) ? Math.min(width*0.18,180) : Math.min(width*0.3,400);
        const positions = [-spread,0,spread];
        const labels    = ["过去","现在","未来"];

        cards.forEach((card, i) => {
            if (i < pickedCards.length) {
                const picked = pickedCards[i];
                setTimeout(() => {
                    card.classList.add('flipped');
                    if (picked.reversed) {
                        const front = card.querySelector('.card-front');
                        if (front) front.style.transform = 'rotateX(180deg)';
                    }
                }, i*500+500);
            }
            card.style.transform = `translateX(${positions[i]}px) scale(1.1)`;
            card.style.zIndex = 10;
            if (!card.querySelector('.label')) {
                const label = document.createElement('div');
                label.className = 'label';
                label.innerText = labels[i];
                Object.assign(label.style,{position:'absolute',bottom:'-40px',width:'100%',textAlign:'center',color:'#d4af37',textShadow:'0 0 5px black',fontSize:'1.2rem'});
                card.appendChild(label);
            }
        });
    }

    // ─────────────────────────────────────────────────────────────────
    //  6. Gesture Logic
    //     ✋ Open Palm (hold 1s) = SELECT card  (in PICKING)
    //     ✊ Fist     (hold 1s) = START / INTERPRET  (in IDLE / INTERPRETING)
    // ─────────────────────────────────────────────────────────────────
    let lastHandX = -1;
    let lastHandY = -1;

    // Palm-hold → Select card
    let isPalmHeld        = false;
    let palmHoldStart     = 0;
    let chargeTargetIndex = null;
    let chargeExtraScale  = 1;
    const SELECTION_HOLD_TIME = 1000; // 1 second

    // Fist-hold → Start / Interpret
    let isFistHeld    = false;
    let fistHoldStart = 0;
    const ACTION_HOLD_TIME = 1000;

    const FRICTION        = 0.92;
    const MAX_SCROLL_SPEED = 0.2;

    function isFist(lm) {
        const wrist = lm[0];
        let d = 0;
        [8,12,16,20].forEach(idx => {
            const t = lm[idx];
            d += Math.sqrt((t.x-wrist.x)**2+(t.y-wrist.y)**2);
        });
        return (d/4) < 0.23;
    }

    function isOpenPalm(lm) {
        const wrist = lm[0];
        let d = 0;
        [8,12,16,20].forEach(idx => {
            const t = lm[idx];
            d += Math.sqrt((t.x-wrist.x)**2+(t.y-wrist.y)**2);
        });
        return (d/4) > 0.4;
    }

    function spawnChargeParticles(rect) {
        const cx = rect.left+rect.width/2;
        const cy = rect.top+rect.height/2;
        for (let i=0;i<2;i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = (cx+(Math.random()-.5)*rect.width*.9)+'px';
            p.style.top  = (cy+(Math.random()-.5)*rect.height*.9)+'px';
            const sz = 2+Math.random()*6;
            p.style.width = p.style.height = sz+'px';
            if (Math.random()>.6) { p.style.background='var(--accent-gold)'; p.style.boxShadow='0 0 8px var(--accent-gold)'; }
            document.body.appendChild(p);
            setTimeout(()=>p.remove(),800);
        }
    }

    function spawnActionParticles() {
        for (let i=0;i<5;i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random()*window.innerWidth+'px';
            p.style.top  = Math.random()*window.innerHeight+'px';
            const sz = 3+Math.random()*8;
            p.style.width = p.style.height = sz+'px';
            p.style.background = 'var(--accent-gold)';
            p.style.boxShadow  = '0 0 10px var(--accent-gold)';
            p.style.opacity    = '0.8';
            p.style.zIndex     = '9999';
            p.animate([{transform:'translateY(0) scale(1)',opacity:0.8},{transform:'translateY(-100px) scale(0)',opacity:0}],{duration:1000+Math.random()*1000,easing:'ease-out'});
            document.body.appendChild(p);
            setTimeout(()=>p.remove(),2000);
        }
    }

    function spawnTrail(x, y) {
        const t = document.createElement('div');
        t.className = 'cursor-trail';
        t.style.left = x+'px'; t.style.top = y+'px';
        const hue = (Date.now()/10)%360;
        t.style.background = `hsla(${hue},80%,60%,0.8)`;
        t.style.boxShadow  = `0 0 10px hsla(${hue},80%,60%,0.8)`;
        document.body.appendChild(t);
        setTimeout(()=>t.remove(),500);
    }

    function handleGesture(lm) {
        if (currentState !== STATE.PICKING && currentState !== STATE.INTERPRETING && currentState !== STATE.IDLE) return;

        const palm = lm[9];
        const x = palm.x, y = palm.y;
        if (lastHandX === -1) { lastHandX = x; lastHandY = y; return; }

        const cursor  = document.getElementById('hand-cursor');
        const screenX = (1-x)*window.innerWidth;
        const screenY = y*window.innerHeight;

        cursor.style.display = 'block';
        cursor.style.left    = screenX+'px';
        cursor.style.top     = screenY+'px';

        const moved = Math.sqrt((x-lastHandX)**2+(y-lastHandY)**2);
        if (moved > 0.005) spawnTrail(screenX, screenY);

        // ── IDLE / INTERPRETING:  ✊ Fist = Start or Show question panel ──
        if (currentState === STATE.IDLE || currentState === STATE.INTERPRETING) {
            const pContainer = document.getElementById('charge-progress-container');
            const pBar       = document.getElementById('charge-progress-bar');

            if (isFist(lm)) {
                if (!isFistHeld) {
                    isFistHeld = true; fistHoldStart = Date.now();
                    pContainer.style.display = 'block'; pBar.style.width = '0%';
                }
                const elapsed  = Date.now()-fistHoldStart;
                const progress = Math.min(elapsed/ACTION_HOLD_TIME,1.0);
                if (Math.random()<0.5) spawnActionParticles();
                pBar.style.width = (progress*100)+'%';

                if (elapsed > ACTION_HOLD_TIME) {
                    if (currentState === STATE.IDLE) {
                        startGame();
                    } else {
                        // Show question panel instead of calling AI directly
                        showQuestionPanel();
                    }
                    isFistHeld = false; fistHoldStart = 0;
                    pContainer.style.display = 'none';
                }
            } else {
                if (isFistHeld) {
                    isFistHeld = false; fistHoldStart = 0;
                    pContainer.style.display = 'none'; pBar.style.width = '0%';
                    if (currentState === STATE.IDLE) updateIdleStatus();
                    else document.getElementById('status-text').innerText = "握拳 1秒 解读命运";
                }
            }
            lastHandX = x; lastHandY = y;
            return;
        }

        // ── PICKING:  scroll + ✋ Open Palm (1s hold) = Select ──
        const width = window.innerWidth;

        // Scroll zones
        let targetV = 0;
        if (screenX < width*0.33) {
            const intensity = Math.min((width*0.33-screenX)/(width*0.33),1);
            targetV = -intensity*MAX_SCROLL_SPEED;
            highlightDirection('left');
        } else if (screenX > width*0.66) {
            const intensity = Math.min((screenX-width*0.66)/(width*0.34),1);
            targetV = intensity*MAX_SCROLL_SPEED;
            highlightDirection('right');
        } else {
            targetV = 0;
            if (!isPalmHeld) resetHighlights();
        }
        velocity = velocity*0.8 + targetV*0.2;

        // Selection: open palm in centre zone
        const inCenterZone  = screenX > width*0.33 && screenX < width*0.66;
        const palmDetected  = isOpenPalm(lm);

        if (palmDetected && inCenterZone) {
            if (!isPalmHeld) {
                isPalmHeld = true; palmHoldStart = Date.now();
                chargeTargetIndex = Math.round(currentIndex);
                chargeExtraScale  = 1;
                highlightDirection('select');
            }
            const elapsed  = Date.now()-palmHoldStart;
            const progress = Math.min(elapsed/SELECTION_HOLD_TIME,1.0);
            chargeExtraScale = 1+progress*0.15;

            const cards = document.querySelectorAll('.card-wrapper');
            cards.forEach(card => {
                if (parseInt(card.dataset.index) === chargeTargetIndex) {
                    const gs = 30+progress*100;
                    const ga = 0.8+progress*0.2;
                    card.style.boxShadow = `0 0 ${gs}px rgba(255,255,255,${ga}), 0 0 ${gs*.5}px rgba(255,255,255,1), inset 0 0 30px rgba(255,255,255,0.5)`;
                    card.style.filter   = `brightness(${1+progress*1.5})`;
                    card.style.zIndex   = 2000;
                    spawnChargeParticles(card.getBoundingClientRect());
                } else {
                    card.style.filter    = '';
                    card.style.boxShadow = '';
                }
            });

            if (elapsed > SELECTION_HOLD_TIME) {
                selectCard();
                isPalmHeld = false; palmHoldStart = 0;
                chargeTargetIndex = null; chargeExtraScale = 1;
                const ring = document.createElement('div');
                Object.assign(ring.style,{position:'absolute',left:screenX+'px',top:screenY+'px',width:'100px',height:'100px',border:'4px solid white',borderRadius:'50%',transform:'translate(-50%,-50%)',animation:'pulseRing 0.5s ease-out'});
                document.body.appendChild(ring);
                setTimeout(()=>ring.remove(),500);
            }
        } else {
            if (isPalmHeld) {
                isPalmHeld = false; palmHoldStart = 0;
                chargeTargetIndex = null; chargeExtraScale = 1;
                resetHighlights();
                document.querySelectorAll('.card-wrapper').forEach(c=>{c.style.filter='';c.style.boxShadow='';});
            }
        }

        lastHandX = x; lastHandY = y;
    }

    // ─────────────────────────────────────────────────────────────────
    //  7. Game Loop
    // ─────────────────────────────────────────────────────────────────
    function gameLoop() {
        if (currentState === STATE.INTRO) {
            const dist = targetIndex - currentIndex;
            currentIndex += dist*0.05;
            if (Math.abs(dist)<0.1) {
                currentIndex = targetIndex;
                currentState = STATE.PICKING;
                document.getElementById('status-text').innerText = "移到左右区域滚动 · 张开手掌选牌";
                document.getElementById('gesture-hint').style.display = 'flex';
                document.getElementById('picked-zone').style.display  = 'flex';
            }
            updateCardPositions();
        }
        if (currentState === STATE.PICKING) {
            if (isPalmHeld && chargeTargetIndex !== null) {
                currentIndex = chargeTargetIndex; velocity = 0;
            } else {
                currentIndex += velocity;
                velocity     *= FRICTION;
                if (Math.abs(velocity)<0.0001) velocity = 0;
                if (currentIndex < 0)                    { currentIndex = 0;                    velocity = -velocity*0.5; }
                if (currentIndex > currentDeck.length-1) { currentIndex = currentDeck.length-1; velocity = -velocity*0.5; }
            }
            updateCardPositions();
        }
        requestAnimationFrame(gameLoop);
    }

    function highlightDirection(dir) {
        resetHighlights();
        if (dir==='left')   document.getElementById('zone-left').classList.add('active');
        if (dir==='right')  document.getElementById('zone-right').classList.add('active');
        if (dir==='select') { document.getElementById('zone-center').classList.add('active'); document.getElementById('icon-select').classList.add('active'); }
    }
    function resetHighlights() {
        ['zone-left','zone-right','zone-center'].forEach(id=>document.getElementById(id).classList.remove('active'));
        document.getElementById('icon-select').classList.remove('active');
    }

    requestAnimationFrame(gameLoop);

    function navigateDeck(dir) {
        velocity += dir*0.1;
        if (dir<0) highlightDirection('left');
        if (dir>0) highlightDirection('right');
        setTimeout(resetHighlights,200);
    }

    // ─────────────────────────────────────────────────────────────────
    //  8. Card Selection & Flow
    // ─────────────────────────────────────────────────────────────────
    function selectCard() {
        if (currentState !== STATE.PICKING) return;
        const idx  = Math.round(currentIndex);
        if (idx<0 || idx>=currentDeck.length) return;
        const card = currentDeck[idx];
        if (pickedCards.some(p=>p.card.id===card.id)) return;

        document.querySelectorAll('.card-wrapper').forEach(el=>{
            if (parseInt(el.dataset.index)===idx) {
                el.classList.add('picked'); el.style.opacity='0';
            }
        });

        const isReversed = Math.random()<0.3;
        pickedCards.push({ card, reversed:isReversed, position:['过去','现在','未来'][pickedCards.length] });
        document.getElementById('status-text').innerText = `已选卡牌 ${pickedCards.length}/3`;

        const slot = document.getElementById(`slot-${pickedCards.length-1}`);
        if (slot) {
            slot.classList.add('filled');
            const mini = document.createElement('div');
            mini.className = 'mini-card';
            mini.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2rem;color:rgba(212,175,55,0.5);">✦</div>`;
            slot.appendChild(mini);
        }

        if (pickedCards.length === 3) setTimeout(finishPicking,1000);
    }

    function finishPicking() {
        currentState = STATE.REVEALING;
        document.getElementById('status-text').innerText = "命运已揭示";
        document.getElementById('gesture-hint').style.display  = 'none';
        document.getElementById('picked-zone').style.opacity   = '0';
        renderDeck();

        setTimeout(()=>{
            currentState = STATE.INTERPRETING;
            const token  = localStorage.getItem('deepseek_token');
            if (token) {
                document.getElementById('status-text').innerText = "握拳 1秒，开启命运解读";
            } else {
                document.getElementById('status-text').innerText = "命运已定 (配置 Token 可获取 AI 解读)";
            }
        }, 2500);
    }

    // ─────────────────────────────────────────────────────────────────
    //  9. Question Panel
    // ─────────────────────────────────────────────────────────────────
    function showQuestionPanel() {
        const token = localStorage.getItem('deepseek_token');
        if (!token) { alert("请先在设置中配置 DeepSeek API Key"); return; }
        document.getElementById('question-panel').style.display = 'block';
        document.getElementById('question-input').value = '';
        // Allow keyboard input
        document.getElementById('question-input').focus();
    }

    function confirmQuestion(useInput) {
        document.getElementById('question-panel').style.display = 'none';
        const question = useInput ? document.getElementById('question-input').value.trim() : '';
        const token    = localStorage.getItem('deepseek_token');
        if (token) getAIInterpretation(token, question);
    }

    // ─────────────────────────────────────────────────────────────────
    //  10. AI Interpretation (DeepSeek)
    // ─────────────────────────────────────────────────────────────────
    async function getAIInterpretation(token, userQuestion='') {
        document.getElementById('loading-spinner').style.display = 'block';

        const questionBlock = userQuestion
            ? `\n\n**求问者的问题：**\n"${userQuestion}"\n\n请围绕此问题展开深入解读，给予有针对性的洞见与建议。`
            : '';

        const prompt = `你是一位精通神秘学、荣格心理学与象征符号的资深塔罗占卜师。我抽取了三张牌，分别代表"过去"、"现在"和"未来"（时间之流牌阵）。
            
1. 过去 (The Past): ${pickedCards[0].card.name} (${pickedCards[0].reversed?'逆位':'正位'})
2. 现在 (The Present): ${pickedCards[1].card.name} (${pickedCards[1].reversed?'逆位':'正位'})
3. 未来 (The Future): ${pickedCards[2].card.name} (${pickedCards[2].reversed?'逆位':'正位'})
${questionBlock}

请用中文（简体）为我解读这组牌阵。你的语言风格应当神秘、优雅、富有哲理且充满同理心。

请按以下 Markdown 格式输出：

### 🔮 整体启示
（用一段充满意境的引言，总结三张牌共同构成的能量场或核心主题，100字左右）

---

### 🃏 牌面深度解析

#### 1. 过去之因：${pickedCards[0].card.name} ${pickedCards[0].reversed?'(逆)':'(正)'}
*   **牌面意象**：（简述牌面视觉元素及其象征意义）
*   **核心含义**：（解读此牌在"过去"位置的含义）

#### 2. 当下之境：${pickedCards[1].card.name} ${pickedCards[1].reversed?'(逆)':'(正)'}
*   **牌面意象**：（简述牌面视觉元素及其象征意义）
*   **核心含义**：（解读此牌在"现在"位置的含义）

#### 3. 未来之果：${pickedCards[2].card.name} ${pickedCards[2].reversed?'(逆)':'(正)'}
*   **牌面意象**：（简述牌面视觉元素及其象征意义）
*   **核心含义**：（解读此牌在"未来"位置的含义）

---

### 💡 命运指引${userQuestion?`\n（围绕"${userQuestion}"给出具体洞见与行动建议）`:''}
（综合三张牌，给出具体且富有启发性的建议）

> （最后附上一句简短而有力的箴言）`;

        const modal   = document.getElementById('interpretation-modal');
        const content = document.getElementById('interpretation-content');
        content.innerHTML = '';
        modal.style.display = 'block';

        // Show question being answered if provided
        if (userQuestion) {
            content.innerHTML = `<div style="background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.3);border-radius:10px;padding:12px 16px;margin-bottom:18px;font-size:0.9rem;color:rgba(212,175,55,0.85);">✦ 针对问题：<em>"${userQuestion}"</em></div>`;
        }

        try {
            const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${token}` },
                body: JSON.stringify({
                    model: "deepseek-chat",
                    messages: [
                        { role:"system", content:"你是一位精通神秘学、心理学与象征符号的资深塔罗占卜师。语言神秘、优雅、富有哲理且充满同理心。用中文为求问者解读牌面，不仅解释表层含义，更深入剖析心理投射与灵性指引。如果求问者提出了具体问题，优先围绕此问题展开有针对性的解读。" },
                        { role:"user", content:prompt }
                    ],
                    stream: true
                })
            });

            if (!response.ok) throw new Error("神谕连接失败: "+response.statusText);

            const reader  = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let fullText  = "";
            const headerHtml = content.innerHTML; // Preserve question header

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value,{stream:true});
                for (const line of chunk.split('\n')) {
                    if (!line.startsWith('data: ')) continue;
                    const jsonStr = line.slice(6);
                    if (jsonStr==='[DONE]') break;
                    try {
                        const json = JSON.parse(jsonStr);
                        if (json.choices?.[0]?.delta?.content) {
                            fullText += json.choices[0].delta.content;
                            const parsed = (window.marked?.parse) ? window.marked.parse(fullText) : fullText;
                            content.innerHTML = headerHtml + parsed;
                        }
                    } catch(e) { /* skip */ }
                }
            }

            document.getElementById('status-text').innerText = "命运已揭晓";

        } catch(e) {
            console.error(e);
            content.innerHTML += `<p style="color:#e06060;margin-top:12px;">连接中断：${e.message}</p>`;
        } finally {
            document.getElementById('loading-spinner').style.display = 'none';
        }
    }

    // ─────────────────────────────────────────────────────────────────
    //  11. Camera / MediaPipe
    // ─────────────────────────────────────────────────────────────────
    async function setupCamera() {
        const video = document.getElementById('webcam-preview');
        const hands = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.7, minTrackingConfidence:0.7 });
        hands.onResults(r => {
            if (r.multiHandLandmarks?.length > 0) handleGesture(r.multiHandLandmarks[0]);
        });
        return new Camera(video, {
            onFrame: async () => { await hands.send({image:video}); },
            width:320, height:240
        });
    }

    async function initCameraFlow() {
        try {
            const cam = await setupCamera();
            await cam.start();
            cameraReady = true; cameraError = false;
            document.getElementById('start-btn').style.display = 'none';
            updateIdleStatus();
        } catch(e) {
            console.error(e);
            cameraReady = false; cameraError = true;
            document.getElementById('status-text').innerText = "需要摄像头权限以进行手势控制";
            const btn = document.getElementById('start-btn');
            btn.style.display = 'block'; btn.innerText = '允许摄像头';
            btn.onclick = () => initCameraFlow();
        }
    }

    // ─────────────────────────────────────────────────────────────────
    //  12. Start Game
    // ─────────────────────────────────────────────────────────────────
    function startGame() {
        if (assetsFailed) { preloadDeckAssets(); return; }
        if (!assetsReady)  { updateIdleStatus(); return; }
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('status-text').innerText   = "命运之轮开始转动...";
        currentDeck  = shuffle([...FULL_DECK]);
        pickedCards  = [];
        currentState = STATE.INTRO;
        targetIndex  = Math.floor(currentDeck.length/2);
        currentIndex = currentDeck.length+5;
        renderDeck(); updateCardPositions();
    }

    // ─────────────────────────────────────────────────────────────────
    //  13. Settings Modal
    // ─────────────────────────────────────────────────────────────────
    const settingsBtn       = document.getElementById('settings-btn');
    const settingsModal     = document.getElementById('settings-modal');
    const saveSettingsBtn   = document.getElementById('save-settings-btn');
    const closeSettingsBtn  = document.getElementById('close-settings-btn');
    const tokenInput        = document.getElementById('api-token-input');

    function updateTokenStatus() {
        const t = localStorage.getItem('deepseek_token');
        tokenInput.value = t || '';
    }
    updateTokenStatus();

    settingsBtn.addEventListener('click', () => { updateTokenStatus(); settingsModal.style.display='block'; });
    closeSettingsBtn.addEventListener('click', () => { settingsModal.style.display='none'; });
    saveSettingsBtn.addEventListener('click', () => {
        const apiToken = tokenInput.value.trim();
        localStorage.setItem('deepseek_token', apiToken);
        settingsModal.style.display = 'none';
        alert("配置已保存到本地");
        if (currentState === STATE.INTERPRETING) {
            document.getElementById('status-text').innerText = apiToken ? "握拳 1秒，开启命运解读" : "命运已定 (配置 Token 可获取 AI 解读)";
        }
    });

    // ─────────────────────────────────────────────────────────────────
    //  14. Boot
    // ─────────────────────────────────────────────────────────────────
    preloadDeckAssets();
    initCameraFlow();
    initStars();

    window.addEventListener('keydown', e => {
        if (currentState === STATE.PICKING) {
            if (e.key==='ArrowLeft')  navigateDeck(-1);
            if (e.key==='ArrowRight') navigateDeck(1);
            if (e.key==='ArrowUp'||e.key===' ') selectCard();
        }
    });

    // Allow clicking interpret button as fallback
    document.getElementById('interpret-btn').addEventListener('click', () => showQuestionPanel());
    </script>
</body>
</html>
