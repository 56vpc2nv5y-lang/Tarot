<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Mystic Tarot | 神秘塔罗</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --card-width: clamp(110px, 18vw, 190px);
            --card-height: calc(var(--card-width) * 1.75);
            --bg: #04040e;
            --gold: #c8a84b;
            --gold-dim: rgba(200,168,75,0.5);
            --gold-glow: rgba(200,168,75,0.25);
            --ink: #0c0c1e;
            --text: #ddd8cc;
            --text-dim: #7a7568;
        }
        @media (max-width: 768px) and (orientation: portrait) { :root { --card-width: clamp(85px, 23vw, 140px); } }
        @media (orientation: landscape) and (max-height: 520px) { :root { --card-width: clamp(88px, 24vh, 130px); } }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background: var(--bg);
            font-family: 'Noto Serif SC', Georgia, serif;
            color: var(--text);
            user-select: none;
            touch-action: none;
        }

        /* ── Stars ── */
        #stars-canvas { position: absolute; inset: 0; z-index: 0; opacity: 0.7; }
        #fog-layer {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 45%;
            background: linear-gradient(to top, rgba(4,4,14,0.95), transparent);
            z-index: 1; pointer-events: none;
        }

        /* ── Loader ── */
        #asset-loader {
            position: fixed; inset: 0; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
            background: rgba(4,4,14,0.96); backdrop-filter: blur(8px);
        }
        .loader-title { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--gold); letter-spacing: 3px; }
        #asset-progress-wrap {
            width: min(300px, 80vw); height: 3px;
            background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden;
        }
        #asset-progress-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--gold-dim), var(--gold));
            transition: width 0.2s linear;
        }

        /* ── Main Scene ── */
        #game-container {
            position: absolute; inset: 0; z-index: 10;
            perspective: 1400px;
            display: flex; align-items: center; justify-content: center;
        }
        #scene {
            width: 100%; height: 58vh; position: relative;
            transform-style: preserve-3d;
            display: flex; justify-content: center; align-items: center;
            cursor: grab;
        }
        #scene:active { cursor: grabbing; }

        /* ── Cards ── */
        .card-wrapper {
            position: absolute;
            width: var(--card-width); height: var(--card-height);
            transform-style: preserve-3d;
            transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer; border-radius: 12px;
        }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.85s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 12px;
        }
        .card-wrapper.flipped .card-inner { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 12px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.7);
            overflow: hidden;
            border: 1.5px solid rgba(200,168,75,0.2);
        }
        .card-back {
            background: 
                repeating-linear-gradient(135deg, #0f0f22 0px, #0f0f22 8px, #0c0c1c 8px, #0c0c1c 16px);
            display: flex; align-items: center; justify-content: center;
        }
        .card-back-inner {
            width: 75%; height: 88%;
            border: 1px solid rgba(200,168,75,0.25);
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(ellipse at center, rgba(200,168,75,0.06) 0%, transparent 70%);
        }
        .card-back-symbol {
            font-size: 2rem; color: rgba(200,168,75,0.3);
            text-shadow: 0 0 20px rgba(200,168,75,0.2);
        }
        .card-front {
            background-color: #f5f0e8;
            transform: rotateY(180deg);
            background-size: cover; background-position: center;
        }

        /* ── UI Layer ── */
        #ui-layer {
            position: absolute; inset: 0; z-index: 20;
            pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 20px;
        }

        /* Header */
        #header { text-align: center; padding-top: 12px; }
        .site-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.4rem, 3.5vw, 2rem);
            font-weight: 400; letter-spacing: 6px; color: var(--gold);
            text-shadow: 0 0 30px var(--gold-glow), 0 0 60px var(--gold-glow);
        }
        #status-text {
            margin-top: 8px; font-size: 0.9rem; color: var(--text-dim);
            letter-spacing: 1px; min-height: 1.4em;
        }

        /* Charge bar */
        #charge-wrap {
            display: none; margin-top: 10px;
            width: 160px; margin-left: auto; margin-right: auto;
        }
        #charge-label { font-size: 0.72rem; color: var(--gold-dim); letter-spacing: 2px; margin-bottom: 5px; text-align: center; }
        #charge-track {
            height: 3px; background: rgba(255,255,255,0.1); border-radius: 999px; overflow: hidden;
        }
        #charge-bar { height: 100%; width: 0%; background: var(--gold); transition: width 0.08s linear; }

        /* Footer controls */
        #controls {
            pointer-events: auto;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            padding-bottom: 24px;
        }

        /* Gesture hints */
        #gesture-hints {
            display: none;
            gap: 20px; justify-content: center; flex-wrap: wrap;
            pointer-events: none;
        }
        .g-chip {
            display: flex; align-items: center; gap: 7px;
            background: rgba(12,12,30,0.7); backdrop-filter: blur(6px);
            border: 1px solid rgba(200,168,75,0.2); border-radius: 20px;
            padding: 5px 13px; font-size: 0.75rem; color: var(--gold-dim); letter-spacing: 1px;
        }
        .g-chip .em { font-size: 1rem; }

        /* Picked zone */
        #picked-zone {
            position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
            display: none; gap: 16px; z-index: 50; pointer-events: none;
        }
        .picked-slot {
            width: calc(var(--card-width) * 0.48);
            height: calc(var(--card-height) * 0.48);
            border: 1.5px dashed rgba(200,168,75,0.25);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.25); transition: border-color 0.4s, background 0.4s;
        }
        .picked-slot.filled { border-style: solid; border-color: var(--gold); background: rgba(0,0,0,0.5); }
        .mini-card {
            width: 100%; height: 100%; border-radius: 7px;
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            animation: flyIn 0.45s cubic-bezier(0.22,1,0.36,1);
        }
        @keyframes flyIn { from { transform: translateY(-280px) scale(1.4); opacity: 0; } to { transform: none; opacity: 1; } }

        /* Labels on picked cards */
        .card-pos-label {
            position: absolute; bottom: -32px; width: 100%; text-align: center;
            font-size: 0.85rem; color: var(--gold); letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
        }

        /* Cursor trail / hand cursor */
        #hand-cursor {
            position: absolute; width: 18px; height: 18px;
            border: 1.5px solid var(--gold); border-radius: 50%;
            pointer-events: none; z-index: 1000;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 12px var(--gold-glow);
            display: none;
        }
        .cursor-trail {
            position: absolute; width: 8px; height: 8px;
            background: var(--gold-glow); border-radius: 50%;
            pointer-events: none; z-index: 999;
            animation: fadeTrail 0.45s forwards;
        }
        @keyframes fadeTrail { to { opacity: 0; transform: scale(0.1); } }
        .particle {
            position: absolute; border-radius: 50%; pointer-events: none; z-index: 2001;
            animation: riseOut 0.9s ease-out forwards;
        }
        @keyframes riseOut {
            0%   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%,-160px) scale(0.1); }
        }

        /* Buttons */
        .btn {
            font-family: 'Cinzel', serif;
            background: rgba(12,12,30,0.8); backdrop-filter: blur(4px);
            border: 1px solid var(--gold); color: var(--gold);
            padding: 9px 28px; font-size: 0.85rem; cursor: pointer;
            transition: background 0.25s, box-shadow 0.25s, color 0.25s;
            letter-spacing: 2px; border-radius: 24px; pointer-events: auto;
        }
        .btn:hover { background: var(--gold); color: var(--ink); box-shadow: 0 0 20px var(--gold-glow); }
        .btn-ghost {
            background: transparent; border-color: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.35);
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6); box-shadow: none; }
        .btn-primary {
            background: var(--gold); color: var(--ink); font-weight: 600;
            box-shadow: 0 0 20px var(--gold-glow);
        }
        .btn-primary:hover { box-shadow: 0 0 35px rgba(200,168,75,0.5); }

        /* Spinner */
        .spinner {
            width: 28px; height: 28px; border-radius: 50%;
            border: 2.5px solid rgba(255,255,255,0.1);
            border-left-color: var(--gold);
            animation: spin 0.9s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ════════════════════════════════
           Question Modal
        ════════════════════════════════ */
        .modal-backdrop {
            position: fixed; inset: 0; z-index: 500;
            background: rgba(4,4,14,0.75); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center;
        }
        .modal-backdrop.open { display: flex; }

        .modal-box {
            background: #08081a;
            border: 1px solid rgba(200,168,75,0.35);
            border-radius: 18px; padding: 32px 28px;
            width: min(560px, 92vw);
            max-height: 90vh; overflow-y: auto;
            box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 30px rgba(200,168,75,0.05);
            animation: modalIn 0.35s cubic-bezier(0.22,1,0.36,1);
        }
        @keyframes modalIn { from { opacity:0; transform: scale(0.94) translateY(12px); } to { opacity:1; transform: none; } }

        .modal-title {
            font-family: 'Cinzel', serif;
            color: var(--gold); font-size: 1.1rem; letter-spacing: 3px;
            margin-bottom: 6px;
        }
        .modal-sub { font-size: 0.82rem; color: var(--text-dim); margin-bottom: 20px; line-height: 1.6; }

        /* Tone selector */
        .tone-row {
            display: flex; gap: 10px; margin-bottom: 18px;
        }
        .tone-btn {
            flex: 1; padding: 9px 6px; border-radius: 10px; cursor: pointer;
            border: 1px solid rgba(200,168,75,0.2); background: rgba(255,255,255,0.03);
            color: var(--text-dim); font-size: 0.78rem; transition: all 0.2s; text-align: center;
            letter-spacing: 0.5px; line-height: 1.5;
        }
        .tone-btn:hover { border-color: rgba(200,168,75,0.5); color: var(--text); }
        .tone-btn.active {
            border-color: var(--gold); background: rgba(200,168,75,0.12);
            color: var(--gold);
        }
        .tone-btn .tone-icon { font-size: 1.1rem; display: block; margin-bottom: 3px; }

        /* Textarea */
        .q-textarea {
            width: 100%; padding: 12px 14px; min-height: 80px; resize: none;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(200,168,75,0.2);
            color: var(--text); font-family: 'Noto Serif SC', serif; font-size: 0.95rem;
            border-radius: 10px; outline: none; transition: border-color 0.2s;
            line-height: 1.6;
        }
        .q-textarea::placeholder { color: rgba(255,255,255,0.2); }
        .q-textarea:focus { border-color: rgba(200,168,75,0.55); }

        .modal-btn-row { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }

        /* ════════════════════════════════
           Reading Modal (Interpretation)
        ════════════════════════════════ */
        #reading-modal .modal-box {
            max-width: 760px;
            padding: 28px 28px 24px;
        }

        /* 3-card header row */
        #reading-cards-row {
            display: flex; gap: 14px; justify-content: center;
            margin-bottom: 24px; flex-wrap: wrap;
        }
        .reading-card-item {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
        }
        .reading-card-img {
            width: clamp(68px, 9vw, 90px);
            height: calc(clamp(68px, 9vw, 90px) * 1.75);
            border-radius: 7px; background-size: cover; background-position: center;
            border: 1px solid rgba(200,168,75,0.3);
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }
        .reading-card-img.reversed { transform: rotate(180deg); }
        .reading-card-pos { font-size: 0.72rem; color: var(--gold); letter-spacing: 2px; }
        .reading-card-name { font-size: 0.7rem; color: var(--text-dim); max-width: 80px; text-align: center; line-height: 1.3; }

        /* Streaming text area */
        #reading-content {
            font-size: 1rem; line-height: 1.85;
            color: var(--text);
            border-top: 1px solid rgba(200,168,75,0.1);
            padding-top: 20px;
            min-height: 60px;
        }
        #reading-content h3 {
            font-family: 'Cinzel', serif; color: var(--gold);
            font-size: 0.95rem; letter-spacing: 2px;
            margin: 20px 0 10px; padding-bottom: 8px;
            border-bottom: 1px solid rgba(200,168,75,0.1);
        }
        #reading-content h4 { color: #b8a87c; font-size: 0.9rem; margin: 14px 0 6px; }
        #reading-content p { margin-bottom: 12px; }
        #reading-content ul, #reading-content ol { padding-left: 18px; margin-bottom: 12px; }
        #reading-content li { margin-bottom: 6px; }
        #reading-content blockquote {
            border-left: 2px solid var(--gold-dim); padding: 8px 16px;
            color: var(--text-dim); font-style: italic;
            background: rgba(200,168,75,0.04); border-radius: 0 6px 6px 0;
            margin: 14px 0;
        }
        #reading-content strong { color: #d4c688; }
        #reading-content hr { border: none; border-top: 1px solid rgba(200,168,75,0.12); margin: 18px 0; }

        /* Follow-up section */
        #followup-section {
            display: none;
            margin-top: 22px; padding-top: 18px;
            border-top: 1px solid rgba(200,168,75,0.12);
        }
        .followup-label { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 10px; letter-spacing: 1px; }

        /* Chat history */
        #chat-history { display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px; }
        .chat-user {
            align-self: flex-end; background: rgba(200,168,75,0.1);
            border: 1px solid rgba(200,168,75,0.2); border-radius: 12px 12px 3px 12px;
            padding: 9px 14px; font-size: 0.88rem; color: var(--text); max-width: 85%;
        }
        .chat-ai {
            align-self: flex-start; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 3px 12px 12px 12px;
            padding: 9px 14px; font-size: 0.88rem; color: var(--text); max-width: 95%;
            line-height: 1.7;
        }
        .chat-ai p { margin-bottom: 6px; }
        .chat-ai p:last-child { margin-bottom: 0; }

        .followup-input-row { display: flex; gap: 8px; }
        #followup-input {
            flex: 1; padding: 9px 13px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(200,168,75,0.2);
            color: var(--text); font-family: 'Noto Serif SC', serif; font-size: 0.88rem;
            border-radius: 8px; outline: none; transition: border-color 0.2s;
        }
        #followup-input::placeholder { color: rgba(255,255,255,0.2); }
        #followup-input:focus { border-color: rgba(200,168,75,0.5); }
        #followup-send {
            padding: 9px 16px; border-radius: 8px; font-size: 0.85rem; white-space: nowrap;
        }

        /* Reading close row */
        #reading-action-row {
            display: flex; gap: 10px; margin-top: 20px; justify-content: space-between; align-items: center; flex-wrap: wrap;
        }
        #reading-status-note { font-size: 0.75rem; color: var(--text-dim); }

        /* ════════════════════════════════
           Settings Modal
        ════════════════════════════════ */
        #settings-modal .modal-box { max-width: 400px; text-align: center; }
        #settings-modal input[type=password] {
            width: 100%; padding: 10px 14px; margin: 14px 0;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(200,168,75,0.25);
            color: var(--text); border-radius: 8px; font-size: 0.95rem; outline: none;
            transition: border-color 0.2s;
        }
        #settings-modal input:focus { border-color: rgba(200,168,75,0.6); }
        #settings-modal a { color: var(--gold); }

        /* Settings gear */
        #settings-btn {
            position: absolute; top: 18px; right: 18px;
            width: 38px; height: 38px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(12,12,30,0.6); border: 1px solid transparent;
            color: var(--gold); cursor: pointer; z-index: 1000;
            pointer-events: auto; transition: transform 0.4s, border-color 0.2s, background 0.2s;
        }
        #settings-btn:hover { transform: rotate(90deg); border-color: var(--gold); background: rgba(200,168,75,0.1); }

        /* Webcam */
        #webcam-preview {
            position: absolute; bottom: 18px; right: 18px;
            width: 140px; height: 105px;
            border: 1px solid rgba(200,168,75,0.3);
            opacity: 0.45; border-radius: 8px; transform: scaleX(-1); z-index: 100;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(200,168,75,0.2); border-radius: 3px; }

        /* Pulse ring animation */
        @keyframes pulseRing {
            0%   { transform: translate(-50%,-50%) scale(0.4); opacity: 1; }
            100% { transform: translate(-50%,-50%) scale(2.2); opacity: 0; }
        }
    </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div id="fog-layer"></div>

<!-- Loader -->
<div id="asset-loader">
    <div class="loader-title">神秘塔罗 · 加载中</div>
    <div id="asset-progress-wrap"><div id="asset-progress-bar"></div></div>
    <div id="asset-progress-text" style="font-size:0.8rem;color:var(--text-dim)">0%</div>
    <button id="asset-retry-btn" class="btn" style="display:none;margin-top:8px">重试加载</button>
</div>

<!-- Main UI -->
<div id="ui-layer">
    <div id="settings-btn" title="配置 API Key">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg>
    </div>
    <div id="hand-cursor"></div>

    <div id="header">
        <div class="site-title">神秘塔罗</div>
        <div id="status-text">正在启动…</div>
        <div id="charge-wrap">
            <div id="charge-label">蓄力中</div>
            <div id="charge-track"><div id="charge-bar"></div></div>
        </div>
    </div>

    <div id="picked-zone">
        <div class="picked-slot" id="slot-0"></div>
        <div class="picked-slot" id="slot-1"></div>
        <div class="picked-slot" id="slot-2"></div>
    </div>

    <div id="gesture-hints" style="display:none;margin-bottom:4px">
        <div class="g-chip"><span class="em">✋</span> 张开手掌 选牌</div>
        <div class="g-chip"><span class="em">✊</span> 握拳 1s 开始/解读</div>
        <div class="g-chip"><span class="em">◀ ▶</span> 手移边缘 滚动</div>
    </div>

    <div id="controls">

<script>
'use strict';

// ═══════════════════════════════════════════
//  CONFIG & CARD DATA
// ═══════════════════════════════════════════
const ASSETS_PATH = 'assets/tarot/pkt/';

const generateCards = () => {
    const cards = [];
    const majorNames = [
        "The Fool","The Magician","The High Priestess","The Empress","The Emperor",
        "The Hierophant","The Lovers","The Chariot","Strength","The Hermit",
        "Wheel of Fortune","Justice","The Hanged Man","Death","Temperance",
        "The Devil","The Tower","The Star","The Moon","The Sun",
        "Judgement","The World"
    ];
    majorNames.forEach((name,i) => {
        const id = `ar${String(i).padStart(2,'0')}`;
        cards.push({ id, name, type:'major', img:`${ASSETS_PATH}${id}.jpg` });
    });
    const suits = [{code:'wa',name:'Wands'},{code:'cu',name:'Cups'},{code:'sw',name:'Swords'},{code:'pe',name:'Pentacles'}];
    const ranks = [
        {code:'ac',name:'Ace'},{code:'02',name:'Two'},{code:'03',name:'Three'},{code:'04',name:'Four'},
        {code:'05',name:'Five'},{code:'06',name:'Six'},{code:'07',name:'Seven'},{code:'08',name:'Eight'},
        {code:'09',name:'Nine'},{code:'10',name:'Ten'},{code:'pa',name:'Page'},{code:'kn',name:'Knight'},
        {code:'qu',name:'Queen'},{code:'ki',name:'King'}
    ];
    suits.forEach(s => ranks.forEach(r => {
        const id = `${s.code}${r.code}`;
        cards.push({ id, name:`${r.name} of ${s.name}`, type:'minor', img:`${ASSETS_PATH}${id}.jpg` });
    }));
    return cards;
};

const FULL_DECK = generateCards();
let currentDeck = [], pickedCards = [], cardElements = [];
let assetsReady = false, assetsFailed = false, cameraReady = false, cameraError = false;

// ═══════════════════════════════════════════
//  ASSET LOADING
// ═══════════════════════════════════════════
function setProgress(p, label) {
    const pct = Math.round(Math.max(0,Math.min(100,p)));
    const bar = document.getElementById('asset-progress-bar');
    const txt = document.getElementById('asset-progress-text');
    if (bar) bar.style.width = pct+'%';
    if (txt) txt.innerText = (label||'') + ' ' + pct + '%';
}

function preloadDeckAssets() {
    const loader = document.getElementById('asset-loader');
    const retry  = document.getElementById('asset-retry-btn');
    if (retry) retry.style.display = 'none';
    setProgress(0);

    const imgs = Array.from(new Set(FULL_DECK.map(c=>c.img)));
    const total = imgs.length;
    if (!total) { assetsReady=true; if(loader) loader.style.display='none'; updateIdleStatus(); return; }

    let done=0, fail=0;
    imgs.forEach(src => {
        const img = new Image();
        const tick = () => { done++; const p=((done+fail)/total)*100; setProgress(p); if(done+fail===total) finish(); };
        const ftick= () => { fail++; const p=((done+fail)/total)*100; setProgress(p); if(done+fail===total) finish(); };
        img.onload=tick; img.onerror=ftick; img.src=src;
    });

    function finish() {
        if (fail>0) {
            assetsFailed=true; setProgress(100,'加载失败');
            if(retry){ retry.style.display='inline-block'; retry.onclick=preloadDeckAssets; }
        } else {
            assetsReady=true; setProgress(100,'完成');
            setTimeout(()=>{ if(loader) loader.style.display='none'; updateIdleStatus(); },300);
        }
    }
}

function updateIdleStatus() {
    if (currentState!==STATE.IDLE || cameraError) return;
    const s = document.getElementById('status-text');
    if (!s) return;
    if (assetsFailed) { s.innerText="资源加载失败，点击重试"; return; }
    if (!assetsReady) { s.innerText="资源加载中…"; return; }
    s.innerText = cameraReady ? "握拳 1 秒开始，或点击按钮" : "点击按钮开始体验";
    document.getElementById('start-btn').style.display = 'inline-block';
}

// ═══════════════════════════════════════════
//  STATE MACHINE
// ═══════════════════════════════════════════
const STATE = { IDLE:'IDLE', INTRO:'INTRO', PICKING:'PICKING', REVEALING:'REVEALING', INTERPRETING:'INTERPRETING' };
let currentState = STATE.IDLE;
let currentIndex = 0, velocity = 0, targetIndex = 0;

// ═══════════════════════════════════════════
//  STARS BACKGROUND
// ═══════════════════════════════════════════
function initStars() {
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let W,H,stars=[];
    const resize = () => {
        W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight;
        stars = Array.from({length:180},()=>({ x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.6, o:Math.random(), s:Math.random()*0.4 }));
    };
    const draw = () => {
        ctx.clearRect(0,0,W,H);
        stars.forEach(s=>{
            ctx.globalAlpha=s.o; ctx.fillStyle='#fff';
            ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,6.28); ctx.fill();
            s.y-=s.s; if(s.y<0) s.y=H;
            if(Math.random()>0.97) s.o=Math.random();
        });
        requestAnimationFrame(draw);
    };
    window.addEventListener('resize',resize); resize(); draw();
}

// ═══════════════════════════════════════════
//  SCENE / CARDS
// ═══════════════════════════════════════════
const scene = document.getElementById('scene');

function createCardEl(card, index) {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrapper'; wrap.dataset.index = index;
    const inner = document.createElement('div'); inner.className = 'card-inner';
    const back  = document.createElement('div'); back.className  = 'card-face card-back';
    const bInner= document.createElement('div'); bInner.className= 'card-back-inner';
    const bSym  = document.createElement('div'); bSym.className  = 'card-back-symbol'; bSym.textContent='✦';
    bInner.appendChild(bSym); back.appendChild(bInner);
    const front = document.createElement('div'); front.className = 'card-face card-front';
    front.style.backgroundImage = `url('${card.img}')`;
    inner.appendChild(back); inner.appendChild(front); wrap.appendChild(inner);
    return wrap;
}

function renderDeck() {
    scene.innerHTML=''; cardElements=[];
    if (currentState===STATE.PICKING || currentState===STATE.INTRO) {
        currentDeck.forEach((card,i)=>{
            const el=createCardEl(card,i);
            el.addEventListener('pointerup', e=>handleCardClick(i,e));
            scene.appendChild(el); cardElements.push(el);
        });
        updateCardPositions();
    } else if (currentState===STATE.REVEALING || currentState===STATE.INTERPRETING) {
        pickedCards.forEach((item,i)=>{
            const el=createCardEl(item.card,i);
            scene.appendChild(el); cardElements.push(el);
        });
        updatePickedPositions();
    }
}

function updateCardPositions() {
    if (currentState!==STATE.PICKING && currentState!==STATE.INTRO) return;
    const W=window.innerWidth;
    const cw = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--card-width'))||180;
    const mobile = W<=480;
    const gap = Math.min(Math.max(cw*(mobile?.85:1.1), W*(mobile?.12:.17)), cw*(mobile?1.2:1.9));
    const sideCount = Math.ceil((W/2)/(gap*.5))+3;

    cardElements.forEach((card,i)=>{
        if (card.classList.contains('picked')) return;
        const dist = i-currentIndex;
        if (Math.abs(dist)>sideCount) { card.style.display='none'; return; }
        card.style.display='block';
        const x = dist*gap;
        const z = -Math.pow(Math.abs(dist),1.3)*45;
        const ry = Math.max(-42, Math.min(42, dist*5));
        let sc = Math.abs(dist)<.5
            ? (mobile?1.05:1.18)-Math.abs(dist)*(mobile?.2:.38)
            : 1-Math.min(Math.abs(dist)*.08,.4);
        card.style.zIndex = Math.abs(dist)<.5 ? 1000 : 1000-Math.floor(Math.abs(dist)*10);
        Math.round(currentIndex)===i ? card.classList.add('selected') : card.classList.remove('selected');
        if (isPalmHeld && chargeTargetIdx===i) { sc*=chargeScale; card.style.zIndex=2000; }
        card.style.transform=`translateX(${x}px) translateZ(${z}px) rotateY(${ry}deg) scale(${sc})`;
    });
}

function updatePickedPositions() {
    const W=window.innerWidth;
    const spread = W<=480 ? Math.min(W*.17,170) : Math.min(W*.28,380);
    const xPos=[−spread,0,spread];
    const labels=["过去","现在","未来"];
    cardElements.forEach((card,i)=>{
        card.style.transform=`translateX(${xPos[i]}px) scale(1.08)`;
        card.style.zIndex=10;
        if (i<pickedCards.length) {
            const p=pickedCards[i];
            setTimeout(()=>{
                card.classList.add('flipped');
                if (p.reversed) { const f=card.querySelector('.card-front'); if(f) f.style.transform='rotateX(180deg)'; }
            }, i*500+500);
        }
        if (!card.querySelector('.card-pos-label')) {
            const lbl=document.createElement('div');
            lbl.className='card-pos-label'; lbl.textContent=labels[i];
            card.appendChild(lbl);
        }
    });
}

// ═══════════════════════════════════════════
//  GESTURE / INTERACTION
//  ✊ Fist   → START (IDLE) / INTERPRET (INTERPRETING)
//  ✋ Palm   → SELECT card (PICKING)
//  Move to edges → scroll
// ═══════════════════════════════════════════
let lastHX=-1, lastHY=-1;

// Palm = select
let isPalmHeld=false, palmHoldStart=0, chargeTargetIdx=null, chargeScale=1;
const SELECT_TIME = 1000;

// Fist = action
let isFistHeld=false, fistHoldStart=0;
const ACTION_TIME = 1000;

// Mouse/touch drag
let isDragging=false, hasDragged=false, lastPX=0;
const FRICTION=0.92;

const gc = document.getElementById('game-container');
gc.addEventListener('pointerdown', e=>{ if(currentState!==STATE.PICKING) return; isDragging=true; hasDragged=false; lastPX=e.clientX; });
window.addEventListener('pointermove', e=>{
    if (!isDragging||currentState!==STATE.PICKING) return;
    const dx=e.clientX-lastPX;
    if (Math.abs(dx)>3) hasDragged=true;
    velocity-=dx*.003; lastPX=e.clientX;
    highlightDir(dx<0?'right':dx>0?'left':null);
    setTimeout(resetHL,200);
});
window.addEventListener('pointerup',()=>{ isDragging=false; });

function handleCardClick(index, e) {
    if (currentState!==STATE.PICKING || hasDragged) return;
    const center=Math.round(currentIndex);
    if (index===center) { lockedIdx=index; selectCard(); highlightDir('select'); setTimeout(resetHL,500); }
    else { currentIndex=index; velocity=0; }
}
let lockedIdx=null;

function isHandFist(lm) {
    const w=lm[0];
    return [8,12,16,20].reduce((s,i)=>s+Math.hypot(lm[i].x-w.x,lm[i].y-w.y),0)/4 < 0.23;
}
function isHandPalm(lm) {
    const w=lm[0];
    return [8,12,16,20].reduce((s,i)=>s+Math.hypot(lm[i].x-w.x,lm[i].y-w.y),0)/4 > 0.4;
}

function spawnParticles(rect) {
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    for(let i=0;i<3;i++){
        const p=document.createElement('div'); p.className='particle';
        const sz=2+Math.random()*6;
        Object.assign(p.style,{
            width:sz+'px', height:sz+'px',
            left:(cx+(Math.random()-.5)*rect.width*.8)+'px',
            top:(cy+(Math.random()-.5)*rect.height*.8)+'px',
            background: Math.random()>.5?'var(--gold)':'#fff',
            boxShadow:`0 0 8px ${Math.random()>.5?'var(--gold)':'#fff'}`
        });
        document.body.appendChild(p); setTimeout(()=>p.remove(),900);
    }
}
function spawnActionParticles() {
    for(let i=0;i<4;i++){
        const p=document.createElement('div'); p.className='particle';
        const sz=3+Math.random()*7;
        Object.assign(p.style,{
            width:sz+'px', height:sz+'px',
            left:Math.random()*window.innerWidth+'px',
            top:Math.random()*window.innerHeight+'px',
            background:'var(--gold)', boxShadow:'0 0 10px var(--gold)',
            zIndex:9999
        });
        document.body.appendChild(p); setTimeout(()=>p.remove(),1400);
    }
}

function handleGesture(lm) {
    if (![STATE.IDLE,STATE.PICKING,STATE.INTERPRETING].includes(currentState)) return;
    const x=lm[9].x, y=lm[9].y;
    if (lastHX===-1) { lastHX=x; lastHY=y; return; }

    const sx=(1-x)*window.innerWidth, sy=y*window.innerHeight;
    const cur=document.getElementById('hand-cursor');
    cur.style.display='block'; cur.style.left=sx+'px'; cur.style.top=sy+'px';

    if (Math.hypot(x-lastHX,y-lastHY)>.005) spawnTrail(sx,sy);

    const cw=document.getElementById('charge-wrap');
    const cb=document.getElementById('charge-bar');

    // ── IDLE / INTERPRETING: Fist=action ──
    if (currentState===STATE.IDLE || currentState===STATE.INTERPRETING) {
        if (isHandFist(lm)) {
            if (!isFistHeld) {
                isFistHeld=true; fistHoldStart=Date.now();
                cw.style.display='block'; cb.style.width='0%';
                document.getElementById('charge-label').textContent='蓄力中…';
            }
            const p=Math.min((Date.now()-fistHoldStart)/ACTION_TIME,1.0);
            cb.style.width=(p*100)+'%';
            if (Math.random()<.4) spawnActionParticles();
            if (p>=1.0) {
                isFistHeld=false; cw.style.display='none';
                if (currentState===STATE.IDLE) startGame();
                else showQuestionModal();
            }
        } else {
            if (isFistHeld) { isFistHeld=false; cw.style.display='none'; cb.style.width='0%'; }
        }
        lastHX=x; lastHY=y; return;
    }

    // ── PICKING: scroll + palm=select ──
    const W=window.innerWidth;
    if (sx<W*.33) {
        velocity=-Math.min((W*.33-sx)/(W*.33),1)*.2;
        highlightDir('left');
    } else if (sx>W*.66) {
        velocity=Math.min((sx-W*.66)/(W*.34),1)*.2;
        highlightDir('right');
    } else {
        if(!isPalmHeld) resetHL();
    }

    const inCenter = sx>W*.33 && sx<W*.66;
    if (isHandPalm(lm) && inCenter) {
        if (!isPalmHeld) {
            isPalmHeld=true; palmHoldStart=Date.now();
            chargeTargetIdx=Math.round(currentIndex); chargeScale=1;
            cw.style.display='block'; cb.style.width='0%';
            document.getElementById('charge-label').textContent='选牌中…';
            highlightDir('select');
        }
        const p=Math.min((Date.now()-palmHoldStart)/SELECT_TIME,1.0);
        chargeScale=1+p*.15; cb.style.width=(p*100)+'%';
        cardElements.forEach(el=>{
            if (parseInt(el.dataset.index)===chargeTargetIdx) {
                el.style.boxShadow=`0 0 ${30+p*90}px rgba(255,255,255,${.7+p*.3})`;
                el.style.filter=`brightness(${1+p*1.6})`; el.style.zIndex=2000;
                spawnParticles(el.getBoundingClientRect());
            } else { el.style.filter=''; el.style.boxShadow=''; }
        });
        if (p>=1.0) {
            lockedIdx=chargeTargetIdx;
            selectCard();
            isPalmHeld=false; palmHoldStart=0; chargeTargetIdx=null; chargeScale=1;
            cw.style.display='none';
            // burst ring
            const ring=document.createElement('div');
            Object.assign(ring.style,{position:'absolute',left:sx+'px',top:sy+'px',width:'80px',height:'80px',border:'3px solid var(--gold)',borderRadius:'50%',transform:'translate(-50%,-50%)',animation:'pulseRing .5s ease-out',pointerEvents:'none',zIndex:9999});
            document.body.appendChild(ring); setTimeout(()=>ring.remove(),500);
        }
    } else {
        if (isPalmHeld) {
            isPalmHeld=false; palmHoldStart=0; chargeTargetIdx=null; chargeScale=1;
            cw.style.display='none'; resetHL();
            cardElements.forEach(el=>{ el.style.filter=''; el.style.boxShadow=''; });
        }
    }
    lastHX=x; lastHY=y;
}

function spawnTrail(x,y) {
    const t=document.createElement('div'); t.className='cursor-trail';
    t.style.left=x+'px'; t.style.top=y+'px';
    const h=(Date.now()/10)%360;
    t.style.background=`hsla(${h},70%,60%,.7)`;
    document.body.appendChild(t); setTimeout(()=>t.remove(),450);
}

function highlightDir(dir) {
    // lightweight visual feedback via status text
}
function resetHL() {}

// ═══════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════
function gameLoop() {
    if (currentState===STATE.INTRO) {
        currentIndex+=(targetIndex-currentIndex)*.05;
        if (Math.abs(targetIndex-currentIndex)<.1) {
            currentIndex=targetIndex; currentState=STATE.PICKING;
            document.getElementById('status-text').innerText="将手移到屏幕边缘滚动  ·  张开手掌选牌";
            document.getElementById('gesture-hints').style.display='flex';
            document.getElementById('picked-zone').style.display='flex';
        }
        updateCardPositions();
    }
    if (currentState===STATE.PICKING && !isDragging) {
        if (isPalmHeld && chargeTargetIdx!==null) { currentIndex=chargeTargetIdx; velocity=0; }
        else {
            currentIndex+=velocity; velocity*=FRICTION;
            if (Math.abs(velocity)<.0001) velocity=0;
            if (currentIndex<0)                    { currentIndex=0;                    velocity*=-.5; }
            if (currentIndex>currentDeck.length-1) { currentIndex=currentDeck.length-1; velocity*=-.5; }
        }
        updateCardPositions();
    }
    requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

function selectCard() {
    if (currentState!==STATE.PICKING) return;
    const idx=lockedIdx!==null?lockedIdx:Math.round(currentIndex);
    lockedIdx=null;
    if (idx<0||idx>=currentDeck.length) return;
    const card=currentDeck[idx];
    if (pickedCards.some(p=>p.card.id===card.id)) return;

    cardElements.forEach(el=>{
        if (parseInt(el.dataset.index)===idx) { el.classList.add('picked'); el.style.opacity='0'; el.style.filter=''; el.style.boxShadow=''; }
    });

    pickedCards.push({ card, reversed:Math.random()<.3, position:['过去','现在','未来'][pickedCards.length] });
    document.getElementById('status-text').innerText=`已选 ${pickedCards.length} / 3 张`;

    const slot=document.getElementById(`slot-${pickedCards.length-1}`);
    if (slot) {
        slot.classList.add('filled');
        const mini=document.createElement('div');
        mini.className='mini-card';
        mini.innerHTML='<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:rgba(200,168,75,.4)">✦</div>';
        slot.appendChild(mini);
    }
    if (pickedCards.length===3) setTimeout(finishPicking,900);
}

function finishPicking() {
    currentState=STATE.REVEALING;
    document.getElementById('status-text').innerText="命运已定…";
    document.getElementById('gesture-hints').style.display='none';
    document.getElementById('picked-zone').style.opacity='0';
    renderDeck();
    setTimeout(()=>{
        currentState=STATE.INTERPRETING;
        const token=localStorage.getItem('deepseek_token');
        document.getElementById('status-text').innerText = token
            ? "握拳 1 秒 → 开启命运解读"
            : "配置 API Key 后可获取 AI 解读（右上角⚙）";
    },2500);
}

// ═══════════════════════════════════════════
//  AI READING  ── REDESIGNED PROMPTS
// ═══════════════════════════════════════════

// Conversation history for follow-up
let conversationHistory = [];

function buildSystemPrompt(tone) {
    const toneGuide = {
        balanced: `你是一位经验丰富的塔罗咨询师。你的解读方式是：先用塔罗牌的象征系统帮助来访者看清处境，再落地到非常实际的行动建议。你说话温暖、坦诚、有洞察力。你会直接说"你现在面临的是……"，而不是堆砌玄幻词汇。你适度使用塔罗意象，但核心是帮助对方想清楚问题。`,
        practical: `你是一位理性、直接的咨询顾问，恰好擅长用塔罗牌的框架来结构化分析问题。你的风格像一个非常聪明的朋友在认真帮你分析处境——说人话，给建议，不绕弯子。你会指出真正的问题所在，给出优先级最高的1-2个具体行动。避免一切玄幻、诗意的表达。`,
        poetic: `你是一位融合荣格心理学和塔罗象征系统的解读者。你的语言有一定诗意，但不空洞——你用意象来触及来访者内心深处的感受，帮助他们看见自己的内在模式。你会提出有深度的问题引导对方自我反思，语言优美但每句话都有实质。`
    };
    return toneGuide[tone] || toneGuide.balanced;
}

function buildReadingPrompt(question, tone) {
    const cards = pickedCards.map((p,i)=>`${['过去','现在','未来'][i]}位置：**${p.card.name}**（${p.reversed?'逆位':'正位'}）`).join('\n');
    const questionLine = question
        ? `来访者的问题：「${question}」`
        : `来访者没有提出具体问题，请综合解读三张牌呈现的整体处境与建议。`;

    const toneInstructions = {
        balanced: `
输出格式要求（用 Markdown）：
### 🔮 整体处境
（2-3句话概括三张牌揭示的核心主题，结合来访者的问题，语言直接）

---

### 牌面解析

**过去 · ${pickedCards[0].card.name}**
- 在这件事上，过去发生了什么 / 什么模式在起作用（30-50字，具体）

**现在 · ${pickedCards[1].card.name}**
- 当前真正面临的核心挑战或机遇是什么（30-50字，具体）

**未来 · ${pickedCards[2].card.name}**
- 如果保持现状，最可能的走向；以及如果做出改变，可能的不同结果（40-60字）

---

### 💡 给你的建议
（最重要的2-3条具体可操作的建议，用列表形式，每条建议要让人能马上知道怎么做）

> 一句话总结（有力、温暖、接地气，避免说教感）`,

        practical: `
输出格式（简洁，务实）：
### 核心判断
（1-2句话直接说你认为对方真正的问题是什么）

### 三张牌告诉你的事
- **过去**（${pickedCards[0].card.name}）：（一句话）
- **现在**（${pickedCards[1].card.name}）：（一句话，点出核心矛盾）
- **未来**（${pickedCards[2].card.name}）：（一句话，说清选择的代价或机会）

### 优先行动
（最重要的1-2件事，要非常具体，比如"本周内做一件事"的级别）

### 需要警惕的
（1条最容易踩的坑）`,

        poetic: `
输出格式（有深度，引导反思）：
### ✨ 牌阵的整体意象
（用一段有质感的文字，描述三张牌共同构成的能量场或内心图景，触及来访者可能的内在感受）

---

### 三个时间的切片

**过去的种子 · ${pickedCards[0].card.name}**
（这张牌在问：什么样的经历或模式种下了今天的处境？）

**当下的十字路口 · ${pickedCards[1].card.name}**
（这张牌映照的是当前内心深处真实的状态，可能和表面呈现的不同）

**未来的可能 · ${pickedCards[2].card.name}**
（不是预言，而是一种可能性——如果你愿意的话）

---

### 一个值得思考的问题
（提出一个能帮助来访者深度自我反思的问题）

> （一句有意境又落地的话作为结尾）`
    };

    return `${questionLine}

三张牌（过去-现在-未来牌阵）：
${cards}

${toneInstructions[tone]||toneInstructions.balanced}`;
}

function buildFollowupSystemPrompt(tone) {
    const base = buildSystemPrompt(tone);
    return base + `\n\n接下来是针对已完成的塔罗解读的追问环节。你已经知道三张牌的信息。来访者可能会问更深入的问题、寻求更具体的建议，或者分享新信息。请保持之前的解读视角，给出有针对性的回答。回答要简洁（100-200字为宜），不要重复之前已说过的内容。`;
}

async function startReading() {
    const token = localStorage.getItem('deepseek_token');
    if (!token) { document.getElementById('settings-modal').classList.add('open'); return; }

    const question = document.getElementById('user-question').value.trim();
    const tone = selectedTone;

    // Reset conversation
    conversationHistory = [];

    // Build reading modal header (card images)
    const row = document.getElementById('reading-cards-row');
    row.innerHTML='';
    pickedCards.forEach(p=>{
        const item=document.createElement('div'); item.className='reading-card-item';
        const img=document.createElement('div');
        img.className='reading-card-img'+(p.reversed?' reversed':'');
        img.style.backgroundImage=`url('${p.card.img}')`;
        const pos=document.createElement('div'); pos.className='reading-card-pos'; pos.textContent=p.position;
        const name=document.createElement('div'); name.className='reading-card-name'; name.textContent=p.card.name+(p.reversed?'\n(逆)':'');
        item.append(img,pos,name); row.appendChild(item);
    });
    if (question) {
        const qTag=document.createElement('div');
        qTag.style.cssText='width:100%;text-align:center;font-size:.78rem;color:var(--gold-dim);margin-top:-8px;margin-bottom:4px;font-style:italic;';
        qTag.textContent=`「${question}」`;
        row.after(qTag);
    }

    const content = document.getElementById('reading-content');
    content.innerHTML = '<div style="color:var(--text-dim);font-size:.85rem;text-align:center;padding:20px 0">神谕连接中…</div>';
    document.getElementById('reading-modal').classList.add('open');
    document.getElementById('followup-section').style.display='none';
    document.getElementById('chat-history').innerHTML='';
    document.getElementById('reading-status-note').textContent='';

    const sysPrompt = buildSystemPrompt(tone);
    const userMsg   = buildReadingPrompt(question, tone);

    conversationHistory.push({ role:'user', content:userMsg });

    try {
        const fullText = await streamToElement(token, sysPrompt, conversationHistory, content);
        conversationHistory.push({ role:'assistant', content:fullText });
        document.getElementById('followup-section').style.display='block';
        document.getElementById('reading-status-note').textContent='解读完成 · 可在下方继续追问';
    } catch(e) {
        content.innerHTML+=`<p style="color:#e06060;margin-top:12px;">连接中断：${e.message}</p>`;
    }
}

async function streamToElement(token, systemPrompt, messages, targetEl) {
    const resp = await fetch('https://api.deepseek.com/chat/completions', {
        method:'POST',
        headers:{ 'Content-Type':'application/json','Authorization':`Bearer ${token}` },
        body:JSON.stringify({
            model:'deepseek-chat',
            messages:[{role:'system',content:systemPrompt},...messages],
            stream:true,
            temperature:0.72,
            presence_penalty:0.15,
            max_tokens:1500
        })
    });
    if (!resp.ok) throw new Error(resp.statusText);

    const reader=resp.body.getReader(), dec=new TextDecoder();
    let full='';
    targetEl.innerHTML='';

    while(true){
        const {done,value}=await reader.read();
        if(done) break;
        for(const line of dec.decode(value,{stream:true}).split('\n')){
            if(!line.startsWith('data: ')) continue;
            const js=line.slice(6);
            if(js==='[DONE]') break;
            try{
                const j=JSON.parse(js);
                const delta=j.choices?.[0]?.delta?.content||'';
                if(delta){ full+=delta; targetEl.innerHTML=window.marked?window.marked.parse(full):full; }
            }catch{}
        }
    }
    return full;
}

// ── Follow-up Chat ──
async function sendFollowup() {
    const token=localStorage.getItem('deepseek_token');
    const input=document.getElementById('followup-input');
    const q=input.value.trim();
    if (!q||!token) return;
    input.value='';

    const hist=document.getElementById('chat-history');
    const userBubble=document.createElement('div'); userBubble.className='chat-user'; userBubble.textContent=q;
    hist.appendChild(userBubble);

    const aiBubble=document.createElement('div'); aiBubble.className='chat-ai'; aiBubble.innerHTML='<span style="color:var(--text-dim)">思考中…</span>';
    hist.appendChild(aiBubble);
    hist.scrollTop=hist.scrollHeight;

    conversationHistory.push({role:'user',content:q});

    try{
        const sysPrompt=buildFollowupSystemPrompt(selectedTone);
        const fullText=await streamToElement(token, sysPrompt, conversationHistory, aiBubble);
        conversationHistory.push({role:'assistant',content:fullText});
    } catch(e){
        aiBubble.innerHTML=`<span style="color:#e06060">请求失败：${e.message}</span>`;
    }
    hist.scrollTop=hist.scrollHeight;
}

document.getElementById('followup-send').addEventListener('click', sendFollowup);
document.getElementById('followup-input').addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendFollowup(); } });

});

//  CAMERA / MEDIAPIPE
// ═══════════════════════════════════════════
async function initCamera() {
    try{
        const vid=document.getElementById('webcam-preview');
        const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:.7,minTrackingConfidence:.7});
        hands.onResults(r=>{ if(r.multiHandLandmarks?.length) handleGesture(r.multiHandLandmarks[0]); });
        const cam=new Camera(vid,{onFrame:async()=>await hands.send({image:vid}),width:320,height:240});
        await cam.start();
        cameraReady=true; cameraError=false; updateIdleStatus();
    }catch(e){
        console.warn('Camera unavailable, using mouse/touch fallback',e);
        cameraReady=false; cameraError=true;
        updateIdleStatus();
    }
}

function startGame() {
    if (!assetsReady) { updateIdleStatus(); return; }
    document.getElementById('start-btn').style.display='none';
    document.getElementById('status-text').innerText='命运之轮转动…';
    currentDeck=[...FULL_DECK].sort(()=>Math.random()-.5);
    pickedCards=[];
    currentState=STATE.INTRO;
    targetIndex=Math.floor(currentDeck.length/2);
    currentIndex=currentDeck.length+5;
    renderDeck();
}
document.getElementById('start-btn').addEventListener('click',startGame);

    if (currentState===STATE.PICKING){
        if(e.key==='ArrowLeft')  { velocity-=.12; }
        if(e.key==='ArrowRight') { velocity+=.12; }
        if(e.key===' '||e.key==='ArrowUp') { e.preventDefault(); lockedIdx=Math.round(currentIndex); selectCard(); }
    }
    if (currentState===STATE.INTERPRETING && e.key==='Enter') showQuestionModal();
});
