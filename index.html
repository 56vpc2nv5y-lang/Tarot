<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天启塔罗 · 完整体验</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
<style>
:root{
  --bg:#06030f;--gold:#c9922a;--gold-lt:#f0c060;
  --gold-dim:rgba(201,146,42,.4);--gold-glow:rgba(201,146,42,.18);
  --text:#e8ddc8;--text-mid:#a89878;--text-dim:#6a6050;
  --border:rgba(201,146,42,.2);--surface:rgba(255,255,255,.03);
  --purple:rgba(180,100,220,.7);--purple-dim:rgba(180,100,220,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh}
#app{max-width:500px;margin:0 auto;padding:28px 20px 50px}
.screen{animation:sIn .35s ease-out}
@keyframes sIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* Header */
.app-hdr{text-align:center;margin-bottom:22px}
.app-title{font-family:'Cinzel Decorative',serif;font-size:1.2rem;letter-spacing:4px;
  background:linear-gradient(180deg,var(--gold-lt),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 16px rgba(201,146,42,.4))}
.app-sub{font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:8px;color:var(--gold-dim);margin-top:4px}

/* Insight badge */
.insight{background:rgba(201,146,42,.06);border:1px solid rgba(201,146,42,.18);
  border-radius:8px;padding:9px 13px;font-size:.68rem;color:rgba(201,146,42,.65);
  line-height:1.7;margin-bottom:16px;font-style:italic}
.insight b{font-style:normal;color:rgba(201,146,42,.9);font-weight:500}

/* Divider */
.div{height:1px;background:linear-gradient(90deg,transparent,rgba(201,146,42,.18),transparent);margin:16px 0}

/* Section label */
.slbl{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:3px;color:var(--gold-dim);margin-bottom:9px}

/* Back nav */
.back{font-family:'Cinzel',serif;font-size:.62rem;color:var(--text-dim);cursor:pointer;
  display:inline-flex;align-items:center;gap:5px;letter-spacing:1px;margin-bottom:18px}
.back:hover{color:var(--text-mid)}

/* Cards row */
.cards-row{display:flex;gap:10px;justify-content:center;margin:18px 0}
.card-col{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;max-width:130px}
.tcard{
  width:100%;aspect-ratio:.58;border-radius:10px;
  border:1px solid var(--border);
  background:linear-gradient(145deg,#0c0a20,#080618);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 7px;text-align:center;
  transition:transform .3s,box-shadow .3s;
  position:relative;overflow:hidden;
}
.tcard:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(201,146,42,.15)}
.tcard::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(-45deg,transparent 0,transparent 6px,rgba(255,255,200,.015) 6px,rgba(255,255,200,.015) 7px)}
.tcard.rev{transform:rotate(180deg)}
.tcard.rev:hover{transform:rotate(180deg) translateY(-4px)}
.tcard-back-sym{font-size:2rem;color:rgba(201,146,42,.18);text-shadow:0 0 16px rgba(201,146,42,.2)}
.tcard-suit{font-size:1.4rem;color:rgba(201,146,42,.3);margin-bottom:7px}
.tcard-name{font-size:.68rem;color:var(--gold-lt);letter-spacing:.5px;line-height:1.4;text-shadow:0 0 10px rgba(201,146,42,.3)}
.tcard-revbadge{font-size:.5rem;color:rgba(201,146,42,.45);margin-top:5px;letter-spacing:1px}
.card-pos-lbl{font-family:'Cinzel',serif;font-size:.58rem;color:var(--text-dim);letter-spacing:2px}
.tcard.revealed{animation:cardIn .4s ease-out}
@keyframes cardIn{from{opacity:0;transform:scale(.85) rotateY(90deg)}to{opacity:1;transform:none}}
.tcard.rev.revealed{animation:cardInRev .4s ease-out}
@keyframes cardInRev{from{opacity:0;transform:scale(.85) rotate(180deg)}to{opacity:1;transform:rotate(180deg)}}

/* Mini cards (in interpret/retro) */
.mini-cards{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
.mini-card{flex:1;max-width:100px;border-radius:8px;border:1px solid var(--border);
  background:linear-gradient(145deg,#0c0a20,#080618);
  padding:9px 6px;text-align:center}
.mini-suit{font-size:1rem;color:rgba(201,146,42,.28);margin-bottom:4px}
.mini-name{font-size:.6rem;color:var(--gold-lt);line-height:1.35}
.mini-pos{font-size:.52rem;color:var(--text-dim);letter-spacing:1px;margin-top:3px}
.mini-rev{font-size:.48rem;color:rgba(201,146,42,.4)}

/* Q input */
.q-input{width:100%;background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-family:'Cormorant Garamond',serif;font-size:.95rem;font-style:italic;
  border-radius:10px;padding:12px 14px;resize:none;min-height:72px;outline:none;line-height:1.7;
  transition:border-color .2s}
.q-input::placeholder{color:rgba(255,255,255,.18);font-style:italic}
.q-input:focus{border-color:rgba(201,146,42,.45)}

/* Intent badge */
.ibadge{display:inline-flex;align-items:center;gap:4px;font-family:'Cinzel',serif;
  font-size:.6rem;letter-spacing:1px;padding:3px 10px;border-radius:12px;margin-top:7px;transition:all .25s}
.ibadge.relationship{background:rgba(220,80,120,.1);border:1px solid rgba(220,80,120,.3);color:rgba(220,120,160,.85)}
.ibadge.career{background:rgba(80,140,220,.1);border:1px solid rgba(80,140,220,.3);color:rgba(100,160,240,.85)}
.ibadge.decision{background:rgba(80,200,140,.1);border:1px solid rgba(80,200,140,.3);color:rgba(80,200,140,.85)}
.ibadge.general{background:rgba(201,146,42,.1);border:1px solid rgba(201,146,42,.25);color:rgba(201,146,42,.8)}

/* Tone buttons */
.tone-row{display:flex;gap:8px;margin:12px 0}
.tbtn{flex:1;padding:9px 6px;border-radius:8px;cursor:pointer;
  border:1px solid rgba(201,146,42,.15);background:rgba(255,255,200,.02);
  color:var(--text-dim);font-size:.68rem;font-family:'Cormorant Garamond',serif;
  text-align:center;transition:all .2s;line-height:1.5}
.tbtn:hover{border-color:rgba(201,146,42,.4);color:var(--text)}
.tbtn.active{border-color:var(--gold);background:rgba(201,146,42,.1);color:var(--gold-lt)}

/* Buttons */
.btn{width:100%;font-family:'Cinzel',serif;background:rgba(8,4,26,.85);
  border:1px solid rgba(201,146,42,.45);color:var(--gold-lt);
  padding:11px 24px;font-size:.78rem;letter-spacing:2px;border-radius:22px;
  cursor:pointer;transition:all .22s;margin-top:10px;text-shadow:0 0 10px rgba(201,146,42,.3)}
.btn:hover{background:rgba(201,146,42,.15);box-shadow:0 0 20px rgba(201,146,42,.18)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-ghost{background:transparent;border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.3);text-shadow:none}
.btn-ghost:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.55);box-shadow:none}
.btn-solid{background:linear-gradient(135deg,var(--gold),#b8820a);color:#04060f;
  font-weight:600;border-color:var(--gold-lt);box-shadow:0 0 22px rgba(201,146,42,.3);text-shadow:none}
.btn-solid:hover{box-shadow:0 0 40px rgba(201,146,42,.5)}
.btn-purple{border-color:rgba(180,100,220,.5);color:rgba(200,140,255,.85);background:var(--purple-dim)}
.btn-purple:hover{background:rgba(180,100,220,.2);box-shadow:0 0 20px rgba(180,100,220,.2);text-shadow:none}

/* Interpretation area */
.iarea{border:1px solid rgba(201,146,42,.15);border-radius:10px;background:var(--surface);
  padding:16px;min-height:80px;font-style:italic;line-height:1.95;font-size:.93rem;color:var(--text)}
.iarea h3{font-family:'Cinzel',serif;font-size:.84rem;color:var(--gold-lt);
  letter-spacing:2px;margin:18px 0 9px;padding-bottom:7px;
  border-bottom:1px solid rgba(201,146,42,.1);font-style:normal;text-shadow:0 0 12px rgba(201,146,42,.2)}
.iarea h4{font-family:'Cinzel',serif;font-size:.78rem;color:var(--gold);margin:12px 0 5px;font-style:normal}
.iarea p{margin-bottom:9px}
.iarea ul,.iarea ol{padding-left:16px;margin-bottom:9px}
.iarea li{margin-bottom:4px}
.iarea blockquote{border-left:2px solid rgba(201,146,42,.35);padding:7px 14px;
  color:var(--text-mid);background:rgba(201,146,42,.04);border-radius:0 7px 7px 0;margin:12px 0}
.iarea strong{color:#dbc97a}
.iarea hr{border:none;border-top:1px solid rgba(201,146,42,.1);margin:16px 0}
.cursor{display:inline-block;width:2px;height:.9em;background:rgba(201,146,42,.7);
  animation:blink .8s step-end infinite;vertical-align:text-bottom}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Journal */
.jentry{border:1px solid rgba(201,146,42,.14);border-radius:12px;padding:14px 16px;
  margin-bottom:10px;background:var(--surface);cursor:pointer;
  transition:border-color .2s,background .2s;position:relative}
.jentry:hover{border-color:rgba(201,146,42,.35);background:rgba(201,146,42,.04)}
.jdate{font-family:'Cinzel',serif;font-size:.58rem;color:var(--text-dim);letter-spacing:1px;margin-bottom:5px}
.jcards{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.jchip{font-size:.58rem;padding:2px 7px;border-radius:10px;
  border:1px solid rgba(201,146,42,.2);color:rgba(201,146,42,.6);
  background:rgba(201,146,42,.05);letter-spacing:.5px}
.jq{font-size:.82rem;font-style:italic;color:var(--text-mid);margin-bottom:5px;line-height:1.5}
.jprev{font-size:.72rem;color:var(--text-dim);line-height:1.55}
.rbadge{position:absolute;top:12px;right:14px;font-family:'Cinzel',serif;font-size:.55rem;
  padding:3px 9px;border-radius:10px;
  background:rgba(180,100,220,.12);border:1px solid rgba(180,100,220,.3);
  color:rgba(200,140,255,.85);letter-spacing:1px;
  animation:rpulse 2.5s ease-in-out infinite}
@keyframes rpulse{0%,100%{opacity:.65}50%{opacity:1}}
.empty-j{text-align:center;padding:30px 20px;color:var(--text-dim);font-style:italic;font-size:.88rem;line-height:1.85}
.empty-sym{font-size:2rem;color:rgba(201,146,42,.12);display:block;margin-bottom:14px}

/* Q display */
.qdisplay{font-style:italic;font-size:.82rem;color:rgba(201,146,42,.65);
  padding:8px 13px;border:1px solid rgba(201,146,42,.12);border-radius:8px;
  background:rgba(201,146,42,.04);margin-bottom:14px;text-align:center}

/* Retro context box */
.retro-ctx{border:1px solid rgba(180,100,220,.2);border-radius:10px;
  padding:14px;background:rgba(180,100,220,.04);margin-bottom:14px}
.retro-ttl{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:2px;
  color:rgba(180,100,220,.65);margin-bottom:9px}

/* Save confirmation */
.save-confirm{background:rgba(201,146,42,.06);border:1px solid rgba(201,146,42,.2);
  border-radius:8px;padding:10px 14px;font-family:'Cinzel',serif;font-size:.62rem;
  color:rgba(201,146,42,.7);letter-spacing:1px;text-align:center;margin-top:14px}

/* Loading */
.loading-txt{text-align:center;padding:22px 0;font-style:italic;color:rgba(201,146,42,.45);
  font-size:.82rem;letter-spacing:1px}
</style>
</head>
<body>
<div id="app"><div id="main"></div></div>
<script>
'use strict';

/* ═══════════════════════════════ DECK ═══════════════════════════════ */
const SUIT_SYM = {major:'✦',Wands:'♦',Cups:'◇',Swords:'✧',Pentacles:'◈'};
const DECK = (()=>{
  const c=[];
  ['The Fool','The Magician','The High Priestess','The Empress','The Emperor',
   'The Hierophant','The Lovers','The Chariot','Strength','The Hermit',
   'Wheel of Fortune','Justice','The Hanged Man','Death','Temperance',
   'The Devil','The Tower','The Star','The Moon','The Sun','Judgement','The World']
   .forEach((n,i)=>c.push({id:`ar${i.toString().padStart(2,'0')}`,n,suit:'major'}));
  [{s:'Wands',code:'wa'},{s:'Cups',code:'cu'},{s:'Swords',code:'sw'},{s:'Pentacles',code:'pe'}]
  .forEach(({s,code})=>
    ['Ace','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Page','Knight','Queen','King']
    .forEach((r,i)=>c.push({id:`${code}${i===0?'ac':i.toString().padStart(2,'0')}`,n:`${r} of ${s}`,suit:s}))
  );
  return c;
})();

/* ═══════════════════════════════ STATE ═══════════════════════════════ */
let S = {
  screen:'journal',
  cards:[],revealed:false,
  question:'',tone:'balanced',
  interpretation:'',loading:false,
  journals:[],
  retroId:null,retroText:null,retroLoading:false
};

/* ═══════════════════════════════ STORAGE ═══════════════════════════════ */
async function sg(k){try{const r=await window.storage.get(k);return r?.value??null}catch{return null}}
async function ss(k,v){try{await window.storage.set(k,v)}catch{}}

const DEMO_READINGS = [
  {id:'demo1',
   date:new Date(Date.now()-32*864e5).toISOString(),
   question:'我和他之间的关系，到底该不该继续？',
   cards:[{n:'The Tower',suit:'major',rev:false,pos:'过去'},{n:'The Star',suit:'major',rev:false,pos:'现在'},{n:'The World',suit:'major',rev:true,pos:'未来'}],
   intent:'relationship',tone:'balanced',
   interpretation:`### 🔮 整体处境\n这段关系正处于一个真正的转折点。过去的风暴已经过去，你正站在疗愈与可能性的入口——但未来的圆满，需要你们共同完成一些还没做完的功课。\n\n---\n\n### 牌面解析\n\n**过去 · The Tower（塔）**\n关系中经历过某种突然的震荡——一次争吵，一个秘密，或某种期待的崩塌。这场动荡虽然痛苦，却清除了一些虚假的东西。\n\n**现在 · The Star（星）**\n经历风雨之后，你内心萌发一种平静的希望。你看到了这段关系的可能性，也在慢慢疗愈之前的伤痕。这是一个脆弱但真实的时刻。\n\n**未来 · The World（世界）逆位**\n未来的圆满需要更多的工作——在沟通上，在相互理解上。逆位不代表不可能，而是提示你们还有一些重要的事情尚未完成。\n\n---\n\n### 💡 给你的建议\n- 在做决定之前，先问自己：这段关系让你成为更好的人，还是更差的人？\n- 如果想继续，需要一次真正诚实的对话，说出那些一直没说的话。\n- 无论结果如何，这段关系已经教会了你很多关于自己的事情。\n\n> 有些门关上，是因为它从来不是为你准备的。但有些门，值得你亲自去敲。`},
  {id:'demo2',
   date:new Date(Date.now()-8*864e5).toISOString(),
   question:'这个工作机会要不要抓住？风险很大，但我很心动',
   cards:[{n:'The Fool',suit:'major',rev:false,pos:'过去'},{n:'Seven of Swords',suit:'Swords',rev:false,pos:'现在'},{n:'The Sun',suit:'major',rev:false,pos:'未来'}],
   intent:'career',tone:'practical',
   interpretation:`### 核心判断\n你内心已经有了答案——心动本身就是信号。真正的问题不是"要不要"，而是"如何降低风险"。\n\n### 三张牌说的事\n- **过去（愚者）：** 你一直有想突破现状的冲动，但被谨慎压制了\n- **现在（宝剑七）：** 你正在权衡和策略性地思考，这是对的——但别把"策略"变成"逃避"\n- **未来（太阳）：** 如果你真的去做，前景是开朗的\n\n### 优先行动\n- 本周内，把这个机会的具体风险列成清单，每一条旁边写上你的应对方案\n- 找做过类似选择的人谈一次，而不是找从没冒险过的人要建议\n\n### 需要警惕的\n用"太冒险"作为不行动的理由，但真正的原因是害怕失败后没有退路。`}
];

async function initStorage(){
  const seeded=await sg('_demo_seeded');
  if(!seeded){
    for(const d of DEMO_READINGS) await ss(`rdg_${d.id}`,JSON.stringify(d));
    await ss('_journal_ids',JSON.stringify(DEMO_READINGS.map(d=>d.id)));
    await ss('_demo_seeded','1');
  }
}

async function loadJournals(){
  const raw=await sg('_journal_ids');
  const ids=raw?JSON.parse(raw):[];
  const out=[];
  for(const id of [...ids].reverse()){
    const j=await sg(`rdg_${id}`);
    if(j) out.push(JSON.parse(j));
  }
  return out;
}

async function saveReading(data){
  const id='r_'+Date.now();
  await ss(`rdg_${id}`,JSON.stringify({...data,id}));
  const raw=await sg('_journal_ids');
  const ids=raw?JSON.parse(raw):[];
  ids.push(id);
  await ss('_journal_ids',JSON.stringify(ids));
  return id;
}

/* ═══════════════════════════════ HELPERS ═══════════════════════════════ */
function drawCards(){
  return [...DECK].sort(()=>Math.random()-.5).slice(0,3)
    .map((c,i)=>({...c,rev:Math.random()<.3,pos:['过去','现在','未来'][i]}));
}

function relTime(iso){
  const d=Math.floor((Date.now()-new Date(iso).getTime())/864e5);
  if(d===0)return'今天';if(d===1)return'昨天';
  if(d<7)return`${d}天前`;if(d<30)return`${Math.floor(d/7)}周前`;
  return`${Math.floor(d/30)}个月前`;
}
function isRetro(iso){return(Date.now()-new Date(iso).getTime())>7*864e5}

function detectIntent(q){
  const t=q.toLowerCase();
  if(/感情|伴侣|恋爱|爱情|关系|喜欢|分手|复合|婚姻|另一半/.test(t))return'relationship';
  if(/工作|职业|事业|公司|老板|升职|跳槽|创业|面试|offer|钱/.test(t))return'career';
  if(/选择|决定|应该|还是|要不要|考虑|纠结|两难|该不该/.test(t))return'decision';
  return'general';
}
const INTENT_LABELS={relationship:'感情方向',career:'事业方向',decision:'决策方向',general:'通用解读'};

/* ═══════════════════════════════ AI ═══════════════════════════════ */
async function callAI(prompt){
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
  });
  const data=await res.json();
  return data.content?.[0]?.text||'解读获取失败，请重试。';
}

function buildInterpPrompt(cards,question,tone,intent){
  const cardDesc=cards.map(c=>`${c.pos}：${c.n}（${c.rev?'逆位':'正位'}）`).join('\n');
  const qLine=question?`来访者的问题：「${question}」`:'无具体问题，请综合解读';
  const intentNote={relationship:'重点关注情感模式、关系动态、沟通方式',career:'重点关注职业方向、行动时机、能量状态',decision:'重点帮助厘清选择的利弊和内心真实意愿',general:'综合解读三张牌呈现的整体处境'}[intent];
  const sys={balanced:'你是一位经验丰富的塔罗咨询师。温暖、坦诚、有洞察力。直接说"你现在面临的是……"，不堆砌玄幻词汇。',practical:'你是一位理性直接的顾问，用塔罗框架分析问题。说人话，给具体可操作建议，不绕弯子。',poetic:'你融合荣格心理学和塔罗象征。语言有诗意但不空洞，用意象触及来访者内心深处的感受，每句话都有实质。'}[tone];
  const fmt={balanced:`\n\n格式（Markdown）：\n### 🔮 整体处境\n（2-3句，直接点明）\n---\n### 牌面解析\n**过去 · ${cards[0].n}**（30-40字）\n**现在 · ${cards[1].n}**（30-40字）\n**未来 · ${cards[2].n}**（40-50字）\n---\n### 💡 给你的建议\n（2-3条具体建议）\n\n> 一句有力的总结`,practical:`\n\n格式：\n### 核心判断\n（1-2句）\n### 三张牌说的事\n- 过去（${cards[0].n}）：一句话\n- 现在（${cards[1].n}）：一句话\n- 未来（${cards[2].n}）：一句话\n### 优先行动\n（1-2件具体的事）\n### 需要警惕的\n（1条坑）`,poetic:`\n\n格式：\n### ✨ 牌阵意象\n（描述三张牌构成的内心图景）\n---\n**过去的种子 · ${cards[0].n}**\n**当下的十字路口 · ${cards[1].n}**\n**未来的可能 · ${cards[2].n}**\n---\n### 一个值得思考的问题\n\n> 有意境又落地的收尾`}[tone];
  return`${sys}\n\n${qLine}\n${intentNote}\n\n三张牌：\n${cardDesc}${fmt}`;
}

function buildRetroPrompt(entry){
  const days=Math.floor((Date.now()-new Date(entry.date).getTime())/864e5);
  return`你是一位塔罗咨询师，用户${days}天前进行了一次占卜。

当时的问题：「${entry.question||'通用解读'}」
当时的牌：${entry.cards.map(c=>`${c.pos}${c.n}`).join('，')}
当时解读摘要：${entry.interpretation.replace(/[#*>_`\n]/g,' ').substring(0,200)}

现在${days}天过去了，请写一段温暖的"回望"（100字以内）：
1. 提出一个反思性问题（当时担心的事，现在怎么样了？）
2. 从新的时间视角，给出1条新洞察
3. 一句温暖的收尾

语言真诚，不说教，不做预测。用中文。`;
}

/* ═══════════════════════════════ SCREENS ═══════════════════════════════ */
function renderJournal(){
  const J=S.journals;
  const entries=J.length?J.map(j=>`
    <div class="jentry" onclick="openRetro('${j.id}')">
      ${isRetro(j.date)?`<span class="rbadge">✦ 回望</span>`:''}
      <div class="jdate">${relTime(j.date)} · ${new Date(j.date).toLocaleDateString('zh-CN',{month:'short',day:'numeric'})}</div>
      <div class="jcards">${j.cards.map(c=>`<span class="jchip">${c.pos} ${c.n}</span>`).join('')}</div>
      ${j.question?`<div class="jq">「${j.question.length>45?j.question.slice(0,45)+'…':j.question}」</div>`:''}
      <div class="jprev">${j.interpretation.replace(/[#*>_`]/g,'').substring(0,90)}…</div>
    </div>`).join('')
    :`<div class="empty-j"><span class="empty-sym">✦</span>你的命运日志还是空白的。<br>每次解读都会自动保存在这里。<br><span style="font-size:.72rem;color:rgba(201,146,42,.28)">7天后，塔罗会邀请你回望。</span></div>`;

  document.getElementById('main').innerHTML=`<div class="screen">
    <div class="app-hdr">
      <div class="app-title">天 启 塔 罗</div>
      <div class="app-sub">命 运 日 志</div>
    </div>
    <div class="insight"><b>留存机制 ·</b> 每次解读自动存入日志。7天后触发"回望"——AI 帮你重新审视当时的问题，用时间本身作为留存钩子。</div>
    <button class="btn btn-solid" onclick="goSelect()">＋ 新的解读</button>
    ${J.length?`<div class="div" style="margin:18px 0 14px"></div><div class="slbl" style="margin-bottom:10px">过往解读</div>`:''}
    ${entries}
  </div>`;
}

function renderSelect(){
  if(!S.cards.length) S.cards=drawCards();
  const cardsHTML=S.cards.map((c,i)=>`
    <div class="card-col">
      ${S.revealed
        ?`<div class="tcard revealed ${c.rev?'rev':''}">
            <div class="tcard-suit">${SUIT_SYM[c.suit]||'✦'}</div>
            <div class="tcard-name">${c.n}</div>
            ${c.rev?`<div class="tcard-revbadge">逆位</div>`:''}
          </div>`
        :`<div class="tcard"><div class="tcard-back-sym">✦</div></div>`}
      <div class="card-pos-lbl">${c.pos}</div>
    </div>`).join('');

  document.getElementById('main').innerHTML=`<div class="screen">
    <span class="back" onclick="goJournal()">← 日志</span>
    <div class="slbl">命运之牌</div>
    <div style="font-size:.82rem;font-style:italic;color:rgba(201,146,42,.5);margin-bottom:16px;line-height:1.7">
      三张牌已从78张中随机抽取。<br>点击揭示，接受这一刻的安排。
    </div>
    <div class="cards-row" id="cards-row">${cardsHTML}</div>
    ${!S.revealed
      ?`<button class="btn" onclick="revealCards()">揭 示 命 运</button>`
      :`<button class="btn btn-solid" onclick="goQuestion()" style="margin-top:12px">这三张牌属于我 →</button>
        <button class="btn btn-ghost" onclick="resetCards()">重新抽牌</button>`}
  </div>`;
}

function revealCards(){
  S.revealed=true;
  renderSelect();
}
function resetCards(){S.cards=[];S.revealed=false;renderSelect();}

function renderQuestion(){
  const intent=S.question.length>4?detectIntent(S.question):null;
  document.getElementById('main').innerHTML=`<div class="screen">
    <span class="back" onclick="goSelect()">← 牌面</span>
    <div class="slbl">你的问题</div>
    <div style="font-size:.82rem;font-style:italic;color:rgba(201,146,42,.5);margin-bottom:12px;line-height:1.7">
      写下让你困惑的处境，解读会更有针对性。也可以跳过。
    </div>
    <textarea class="q-input" id="qinput" placeholder="例如：工作上有个重要机会但我没安全感，不敢争取…&#10;和伴侣越来越疏远，不知道是给彼此空间还是主动沟通…" oninput="onQInput(this.value)">${S.question}</textarea>
    <div id="ibadge-wrap" style="min-height:26px">${intent?`<span class="ibadge ${intent}">${INTENT_LABELS[intent]}</span>`:''}</div>
    <div class="div" style="margin:14px 0 12px"></div>
    <div class="slbl">解读风格</div>
    <div class="insight" style="margin-bottom:10px"><b>意图检测 ·</b> 根据你的问题内容自动识别方向，AI 解读会相应调整侧重点。无需手动分类。</div>
    <div class="tone-row">
      <div class="tbtn${S.tone==='balanced'?' active':''}" onclick="setTone('balanced')">⚖️ 平衡<br><span style="font-size:.6rem;opacity:.7">象征与实用</span></div>
      <div class="tbtn${S.tone==='practical'?' active':''}" onclick="setTone('practical')">🎯 务实<br><span style="font-size:.6rem;opacity:.7">直接可操作</span></div>
      <div class="tbtn${S.tone==='poetic'?' active':''}" onclick="setTone('poetic')">🌙 深度<br><span style="font-size:.6rem;opacity:.7">触及内在模式</span></div>
    </div>
    <button class="btn btn-solid" onclick="startInterp()">开 启 解 读 ✦</button>
    <button class="btn btn-ghost" onclick="S.question='';goInterp()">跳过，直接解读</button>
  </div>`;
}

function onQInput(v){
  S.question=v;
  const w=document.getElementById('ibadge-wrap');if(!w)return;
  const intent=v.length>4?detectIntent(v):null;
  w.innerHTML=intent?`<span class="ibadge ${intent}">${INTENT_LABELS[intent]}</span>`:'';
}
function setTone(t){
  S.tone=t;
  document.querySelectorAll('.tbtn').forEach((b,i)=>{
    b.className='tbtn'+(['balanced','practical','poetic'][i]===t?' active':'');
  });
}

async function renderInterp(){
  const cards=S.cards;
  document.getElementById('main').innerHTML=`<div class="screen">
    <div class="mini-cards">${cards.map(c=>`
      <div class="mini-card${c.rev?' rev':''}">
        <div class="mini-suit">${SUIT_SYM[c.suit]||'✦'}</div>
        <div class="mini-name">${c.n}</div>
        <div class="mini-pos">${c.pos}</div>
        ${c.rev?`<div class="mini-rev">(逆位)</div>`:''}
      </div>`).join('')}
    </div>
    ${S.question?`<div class="qdisplay">「${S.question}」</div>`:''}
    <div class="iarea" id="iarea"><div class="loading-txt">星辰连接中<span class="cursor"></span></div></div>
    <div id="post-actions"></div>
  </div>`;

  const intent=S.question?detectIntent(S.question):'general';
  try{
    const text=await callAI(buildInterpPrompt(cards,S.question,S.tone,intent));
    S.interpretation=text;
    const iarea=document.getElementById('iarea');
    if(iarea) iarea.innerHTML=window.marked?window.marked.parse(text):text.replace(/\n/g,'<br>');

    // Auto-save
    await saveReading({
      date:new Date().toISOString(),
      question:S.question,
      cards:cards.map(c=>({n:c.n,suit:c.suit,rev:c.rev,pos:c.pos})),
      interpretation:text,intent,tone:S.tone
    });
    S.journals=await loadJournals();

    const pa=document.getElementById('post-actions');
    if(pa) pa.innerHTML=`
      <div class="save-confirm">✦ 已自动存入命运日志 · 7天后将触发回望提醒</div>
      <div class="insight" style="margin-top:14px"><b>全链路闭环 ·</b> 从选牌到问题到解读到日志，用户无需离开页面，无需复制粘贴，零摩擦完成完整占卜旅程。</div>
      <button class="btn btn-solid" onclick="goJournal()">查看命运日志</button>
      <button class="btn btn-ghost" onclick="S.cards=[];S.revealed=false;S.question='';S.interpretation='';renderSelect()">开始新的解读</button>`;
  }catch(e){
    const iarea=document.getElementById('iarea');
    if(iarea) iarea.innerHTML=`<div style="color:#d07070;font-size:.85rem">连接失败：${e.message}</div>`;
  }
}

async function renderRetroScreen(id){
  const entry=S.journals.find(j=>j.id===id);
  if(!entry){goJournal();return;}
  const days=Math.floor((Date.now()-new Date(entry.date).getTime())/864e5);

  document.getElementById('main').innerHTML=`<div class="screen">
    <span class="back" onclick="goJournal()">← 日志</span>
    <div style="text-align:center;margin-bottom:18px">
      <div style="font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:3px;color:rgba(180,100,220,.7);margin-bottom:5px">✦ 回 望</div>
      <div style="font-family:'Cinzel',serif;font-size:.85rem;color:rgba(201,146,42,.5);letter-spacing:1px">${days}天前的问题</div>
    </div>
    <div class="retro-ctx">
      <div class="retro-ttl">当时的牌阵</div>
      <div class="mini-cards" style="margin-bottom:10px">${entry.cards.map(c=>`
        <div class="mini-card">
          <div class="mini-suit">${SUIT_SYM[c.suit]||'✦'}</div>
          <div class="mini-name">${c.n}</div>
          <div class="mini-pos">${c.pos}</div>
        </div>`).join('')}
      </div>
      ${entry.question?`<div style="font-style:italic;font-size:.78rem;color:rgba(201,146,42,.6);margin-bottom:8px">「${entry.question}」</div>`:''}
      <div style="font-size:.72rem;color:var(--text-dim);line-height:1.65">${entry.interpretation.replace(/[#*>_`]/g,'').substring(0,160)}…</div>
    </div>
    <div class="insight"><b>命运日志回望 ·</b> 这是产品最核心的留存机制：时间本身成为触发复访的理由。用户不是为了新功能回来，而是为了看清自己。</div>
    <div class="iarea" id="retroarea" style="min-height:60px;text-align:center">
      <div style="padding:14px 0;font-style:italic;color:rgba(201,146,42,.4);font-size:.82rem">${days}天过去了，重新审视这个问题…</div>
    </div>
    <button class="btn btn-purple" id="retrobtn" onclick="doRetro('${id}')">✦ AI 重新解读，看看现在的你</button>
    <div id="retro-post"></div>
  </div>`;
}

async function doRetro(id){
  const entry=S.journals.find(j=>j.id===id);if(!entry)return;
  const btn=document.getElementById('retrobtn');if(btn)btn.style.display='none';
  const area=document.getElementById('retroarea');
  if(area)area.innerHTML=`<div class="loading-txt" style="color:rgba(180,100,220,.5)">重新连接中<span class="cursor"></span></div>`;
  try{
    const text=await callAI(buildRetroPrompt(entry));
    if(area)area.innerHTML=`<div style="font-style:italic;line-height:1.95;font-size:.9rem;color:var(--text)">${text.replace(/\n/g,'<br>')}</div>`;
    const post=document.getElementById('retro-post');
    if(post)post.innerHTML=`
      <div class="div" style="margin:14px 0"></div>
      <button class="btn btn-solid" onclick="S.cards=[];S.revealed=false;S.question='';renderSelect()">带着新的眼光，开始解读</button>
      <button class="btn btn-ghost" onclick="goJournal()">回到日志</button>`;
  }catch(e){
    if(area)area.innerHTML=`<div style="color:#d07070;font-size:.85rem">连接失败：${e.message}</div>`;
  }
}

/* ═══════════════════════════════ NAVIGATION ═══════════════════════════════ */
async function goJournal(){
  S.journals=await loadJournals();
  S.screen='journal';renderJournal();
}
function goSelect(){S.screen='select';renderSelect();}
function goQuestion(){S.screen='question';renderQuestion();}
function goInterp(){S.screen='interpret';renderInterp();}
function startInterp(){S.question=document.getElementById('qinput')?.value||'';goInterp();}
function openRetro(id){S.retroId=id;S.screen='retro';renderRetroScreen(id);}

/* ═══════════════════════════════ BOOT ═══════════════════════════════ */
(async()=>{
  await initStorage();
  S.journals=await loadJournals();
  renderJournal();
})();
</script>
